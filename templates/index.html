<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper - Coastal Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Cinzel:wght@600&family=Lora:ital,wght@0,400;0,600;1,400&family=Permanent+Marker&family=Share+Tech+Mono&display=swap');

        :root {
            --sand-color: #e5c386;
            --sand-shadow: #c9a35e;
            --overlay-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--sand-color);
            overflow-x: hidden;
            font-family: 'Lora', serif;
            color: #333;
            /* Extra tall to allow panning up and down without traditional structure */
            height: 350vh; 
            cursor: pointer;
        }

        /* --- Environment (Sand & Ocean) --- */
        .coastline-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(var(--sand-shadow) 1px, transparent 1px);
            background-size: 15px 15px;
            background-position: 0 0;
        }

        #ocean-canvas {
            position: absolute;
            top: 0; right: 0;
            width: 65%; height: 100%;
            z-index: 1;
            /* Creates the wavy coastline shore edge */
            clip-path: polygon(10% 0, 100% 0, 100% 100%, 15% 100%, 0% 80%, 20% 60%, 5% 40%, 15% 20%);
            box-shadow: inset 20px 0 30px rgba(0,0,0,0.2);
        }

        .wet-sand {
            position: absolute;
            top:0; right: 60%; width: 10%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(139, 107, 36, 0.4));
            z-index: 2;
            filter: blur(8px);
        }

        /* --- Hero Section --- */
        .hero {
            position: absolute; top: 10vh; left: 5vw;
            z-index: 10; pointer-events: auto;
            width: 450px;
        }

        .signpost {
            position: relative;
            background: linear-gradient(180deg, #6b4d32 0%, #4a3219 100%);
            border-radius: 5px;
            box-shadow: 10px 10px 15px rgba(0,0,0,0.3);
            transform: rotate(-3deg);
            padding: 20px;
            text-align: center;
        }
        
        .signpost::after { /* The post staked in sand */
            content: ''; position: absolute;
            width: 30px; height: 100px;
            background: #4a3219;
            bottom: -90px; left: 50%; transform: translateX(-50%);
            z-index: -1; border-radius: 0 0 15px 15px;
        }

        .signpost h1 {
            font-family: 'Cinzel', serif; color: #eedd99;
            font-size: 2.8rem; text-shadow: -1px -1px 0 #333, 2px 2px 4px #000;
            letter-spacing: 2px;
        }

        .signpost p {
            color: rgba(255,255,255,0.8); font-size: 1.1rem;
            margin-top: 10px; font-style: italic;
        }

        .sand-note {
            margin-top: 140px; margin-left: 20px;
            width: 300px; height: 150px;
        }

        .sand-text-path {
            fill: none; stroke: #a37c35; stroke-width: 2;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawSand 4s ease-in-out forwards 0.5s;
        }

        @keyframes drawSand { to { stroke-dashoffset: 0; } }

        /* --- Bottles & Placements --- */
        .bottles-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }

        .bottle-wrapper {
            position: absolute; pointer-events: auto;
            width: 60px; height: 140px;
            transition: transform 0.4s ease; cursor: pointer;
        }

        .bottle-wrapper:hover { transform: rotate(8deg) translateY(-5px); }
        .bottle {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(135,206,235,0.4) 100%);
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 30px 30px 10px 10px / 80px 80px 10px 10px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), 5px 15px 15px rgba(0,0,0,0.3);
            position: relative; backdrop-filter: blur(2px);
        }

        .bottle-cork {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 25px;
            background: #8b5a2b; border-radius: 3px;
        }
        
        .bottle-scroll {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 80px; background: #eedd99;
            border-radius: 5px; opacity: 0.8; border-right: 2px solid #cfaa5e;
        }

        .in-water { animation: bob 3s infinite ease-in-out alternate; }
        @keyframes bob { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-10px) rotate(4deg); } }

        .ripple {
            position: absolute; bottom: -20px; left: -10px;
            width: 80px; height: 30px;
            border: 2px solid rgba(255,255,255,0); border-radius: 50%;
            transform: scale(0.5); pointer-events: none;
        }
        .bottle-wrapper:hover .ripple {
            animation: rippleEffect 1s infinite;
        }
        @keyframes rippleEffect {
            0% { transform: scale(0.5); border-color: rgba(255,255,255,0.6); }
            100% { transform: scale(1.5); border-color: rgba(255,255,255,0); }
        }

        /* Specific Bottle Placements */
        #b1 { top: 40vh; left: 30vw; } /* GlglStats - Sand edge */
        #b2 { top: 80vh; left: 42vw; } /* Ahuzat - Water */
        #b3 { top: 120vh; left: 25vw; } /* 2D Orient - Sand */
        #b4 { top: 160vh; left: 45vw; } /* Turing - Water */
        #b5 { top: 200vh; left: 32vw; } /* Rhymes - Sand Edge */
        #b6 { top: 240vh; left: 48vw; } /* Hatul - Water */
        #b7 { top: 280vh; left: 28vw; /* Meta */ backdrop-filter: hue-rotate(90deg) contrast(150%); } 
        #b8 { top: 320vh; left: 41vw; } /* Social - Water Rock */

        /* --- Footer Section --- */
        .footer-elements {
            position: absolute; bottom: 5vh; left: 15vw;
            display: flex; gap: 40px; align-items: center; z-index: 10; pointer-events: auto;
        }

        .pocket-watch {
            position: relative; width: 100px; height: 100px;
            background: radial-gradient(#fff, #f0e6d2);
            border: 10px solid #d4af37; border-radius: 50%;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
        }
        .timer-display { font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; color: #b22222; font-weight: bold; }
        .watch-ring { position:absolute; top:-25px; left:50%; transform:translateX(-50%); width:30px; height:20px; border:4px solid #d4af37; border-radius:10px 10px 0 0; }

        .sea-glass {
            width: 250px; padding: 20px;
            background: rgba(144, 238, 144, 0.4);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(144, 238, 144, 0.8), inset 0 0 20px rgba(255,255,255,0.5);
            color: #1a4a1a; font-family: 'Caveat', cursive; font-size: 1.4rem; text-align: center;
            animation: pulseGlass 4s infinite alternate;
        }
        @keyframes pulseGlass { to { box-shadow: 0 0 30px rgba(144, 238, 144, 1), inset 0 0 30px rgba(255,255,255,0.8); } }

        /* --- Modal & Parcments --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: var(--overlay-blur);
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
            display: flex; justify-content: center; align-items: center;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .parchment {
            width: 600px; max-width: 90%; min-height: 400px;
            background: #fdf5e6;
            background-image: radial-gradient(#d3b88b 1px, transparent 0);
            background-size: 40px 40px;
            border-radius: 5px; position: relative;
            box-shadow: inset 0 0 50px rgba(139, 69, 19, 0.3), 10px 20px 40px rgba(0,0,0,0.5);
            padding: 50px;
            transform: scaleY(0); transform-origin: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .modal-overlay.active .parchment { transform: scaleY(1); }
        
        .close-btn {
            position: absolute; top: 20px; right: 25px;
            font-size: 2rem; cursor: pointer; color: #8b4513; font-weight: bold; transition: 0.3s;
        }
        .close-btn:hover { color: #d2691e; transform: scale(1.2); }

        /* Scroll Custom Aesthetics */
        .parchment h2 { font-family: 'Cinzel', serif; font-size: 2rem; border-bottom: 2px solid #8b4513; padding-bottom: 10px; margin-bottom: 20px; }
        .parchment p { line-height: 1.6; margin-bottom: 20px; font-size: 1.1rem;}
        .parchment a { display: inline-block; text-decoration: none; font-weight: bold; }

        /* 1: GlglStats */
        .theme-glgl { border: 2px dashed rgba(0,0,0,0.2); box-shadow: inset 0 0 20px #8b0000; }
        .lz77-anim { display: flex; gap: 5px; margin-bottom: 20px; justify-content: center;}
        .lz77-anim span { display: inline-block; font-size: 1.5rem; animation: compress 2s infinite alternate; }
        @keyframes compress { 0% { transform: translateX(0); opacity:1;} 100% { transform: translateX(-20px); opacity:0.3; } }
        .wax-seal { background: #8b0000; color: white; padding: 10px 20px; border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); font-family: 'Cinzel', serif;}
        
        /* 2: Ahuzat */
        .theme-ahuzat::before { content:''; position:absolute; top:0;left:0;width:100%;height:100%; background: radial-gradient(circle, rgba(0,100,255,0.05), transparent); pointer-events: none;}
        .anchor-links { display: flex; gap: 20px; margin-top: 20px;}
        .anchor-links a { color: #1e90ff; font-size: 1.2rem; display: flex; align-items: center; gap: 5px; }

        /* 3: 2D Part */
        .theme-2d { background-image: linear-gradient(rgba(0,0,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,255,0.1) 1px, transparent 1px); background-size: 20px 20px; font-family: 'Share Tech Mono', monospace; }
        .blueprint-btn { background: #1e3f66; color: #fff; padding: 10px 15px; border: 1px solid #fff; border-radius: 3px; font-family: monospace; }
        
        /* 4: Turing Jest */
        .theme-jest { background-color: #eee0b5; }
        .theme-jest::after { content: '🎭'; position:absolute; font-size: 15rem; opacity: 0.05; top: 10%; left: 20%; pointer-events: none; }
        .jester-link { font-size: 2rem; text-align: center; display: block; animation: jesterPulse 1s infinite alternate; }
        @keyframes jesterPulse { to { transform: scale(1.2) rotate(10deg); } }

        /* 5: Rhymes */
        .theme-rhymes { background: #fff; font-family: 'Permanent Marker', cursive; border-radius: 0; transform: rotate(-2deg); box-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
        .tape { position: absolute; top: -10px; left: 50%; transform: translateX(-50%) rotate(-3deg); width: 100px; height: 30px; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.1); }
        .chrome-link { color: #4285F4; text-decoration: underline; font-size: 1.4rem;}

        /* 6: Hatul */
        .theme-hatul { position: relative; }
        .paw { position: absolute; font-size: 2rem; opacity: 0.2; color: #333; }
        .paw1 { top: 20%; left: 10%; transform: rotate(45deg); }
        .paw2 { top: 40%; left: 30%; transform: rotate(50deg); }
        .paw3 { top: 60%; left: 50%; transform: rotate(45deg); }
        .trivia-coin { background: linear-gradient(45deg, #ffd700, #daa520); color: #000; padding: 15px 30px; border-radius: 30px; border: 2px solid #b8860b; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        /* 7: Meta */
        .theme-meta { background: repeating-linear-gradient(45deg, #fdf5e6, #fdf5e6 10px, #f5ebd5 10px, #f5ebd5 20px); text-align: center; }
        .meta-icon { font-size: 4rem; display: block; margin: 20px auto; color: #555; }

        /* 8: Socials */
        .theme-social { background: #e0d5aa; border: 4px solid #8b4513; border-radius: 10px; }
        .treasure-map { position: relative; padding: 20px; border: 2px dashed #8b4513; }
        .social-link { display: block; font-family: 'Cinzel', serif; font-size: 1.3rem; color: #8b0000; margin: 15px 0; text-align: center; }
        .social-link::before { content: '❌ '; }
    </style>
</head>
<body>

    <!-- Environment Layer -->
    <div class="coastline-container"></div>
    <div class="wet-sand"></div>
    <canvas id="ocean-canvas"></canvas>

    <!-- Hero Content -->
    <div class="hero">
        <div class="signpost">
            <h1>Geva Kipper</h1>
            <p>Software engineer currently solving complex problems at Google.</p>
        </div>
        
        <svg class="sand-note" viewBox="0 0 400 150">
            <path class="sand-text-path" d="M 10 30 C 50 10, 100 50, 150 20 C 200 -10, 250 40, 300 20 C 350 0, 380 30, 380 30" />
            <text x="10" y="55" font-family="'Caveat', cursive" font-size="20" fill="rgba(74, 50, 25, 0.7)">
                Note: This landscape shifts like the tides.
            </text>
            <text x="10" y="85" font-family="'Caveat', cursive" font-size="20" fill="rgba(74, 50, 25, 0.7)">
                This website is re-designed each day by AI 
            </text>
            <text x="10" y="115" font-family="'Caveat', cursive" font-size="20" fill="rgba(74, 50, 25, 0.7)">
                and is thus ever-changing.
            </text>
        </svg>
    </div>

    <!-- Interactive Bottles Layer -->
    <div class="bottles-layer">
        <!-- Bottle 1: GlglStats -->
        <div class="bottle-wrapper" id="b1" onclick="openParchment('glgl')">
            <div class="bottle"><div class="bottle-cork"></div><div class="bottle-scroll"></div></div><div class="ripple"></div>
        </div>
        <!-- Bottle 2: Ahuzat (Water) -->
        <div class="bottle-wrapper in-water" id="b2" onclick="openParchment('ahuzat')">
            <div class="bottle"><div class="bottle-cork"></div><div class="bottle-scroll"></div></div><div class="ripple"></div>
        </div>
        <!-- Bottle 3: 2D Part -->
        <div class="bottle-wrapper" id="b3" onclick="openParchment('2dpart')">
            <div class="bottle"><div class="bottle-cork"></div><div class="bottle-scroll"></div></div><div class="ripple"></div>
        </div>
        <!-- Bottle 4: Turing (Water) -->
        <div class="bottle-wrapper in-water" id="b4" onclick="openParchment('turing')">
            <div class="bottle"><div class="bottle-cork"></div><div class="bottle-scroll"></div></div><div class="ripple"></div>
        </div>
        <!-- Bottle 5: Rhymes -->
        <div class="bottle-wrapper" id="b5" onclick="openParchment('rhymes')">
            <div class="bottle"><div class="bottle-cork"></div><div class="bottle-scroll"></div></div><div class="ripple"></div>
        </div>
        <!-- Bottle 6: Hatul (Water) -->
        <div class="bottle-wrapper in-water" id="b6" onclick="openParchment('hatul')">
            <div class="bottle"><div class="bottle-cork"></div><div class="bottle-scroll"></div></div><div class="ripple"></div>
        </div>
        <!-- Bottle 7: Meta -->
        <div class="bottle-wrapper" id="b7" onclick="openParchment('meta')">
            <div class="bottle"><div class="bottle-cork"></div><div class="bottle-scroll"></div></div><div class="ripple"></div>
        </div>
        <!-- Bottle 8: Socials (Water) -->
        <div class="bottle-wrapper in-water" id="b8" onclick="openParchment('social')">
            <div class="bottle"><div class="bottle-cork"></div><div class="bottle-scroll" style="background:#e0d5aa;"></div></div><div class="ripple"></div>
        </div>
    </div>

    <!-- Footer Elements -->
    <div class="footer-elements">
        <div class="pocket-watch">
            <div class="watch-ring"></div>
            <div class="timer-display" id="watch-timer">00:00:00</div>
        </div>
        <div class="sea-glass">
            "Design conceptualized by an AI, manifesting waves of code."
        </div>
    </div>

    <!-- Modal for Parchment Unfurl -->
    <div class="modal-overlay" id="modal">
        <div class="parchment" id="parchment-box">
            <span class="close-btn" onclick="closeParchment()">×</span>
            <div id="parchment-content"></div>
        </div>
    </div>

    <script>
        // --- WebGL Ocean Shader Logic ---
        const canvas = document.getElementById('ocean-canvas');
        const gl = canvas.getContext('webgl');

        function resizeCanvas() {
            canvas.width = window.innerWidth * 0.65;
            canvas.height = window.innerHeight * 3.5;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const vsSource = `
            attribute vec4 aVertexPosition;
            varying vec2 vUv;
            void main() {
                gl_Position = aVertexPosition;
                vUv = aVertexPosition.xy * 0.5 + 0.5;
            }
        `;

        const fsSource = `
            precision mediump float;
            varying vec2 vUv;
            uniform float uTime;

            void main() {
                // Base turquoise colors
                vec3 waterColor = vec3(0.0, 0.6, 0.8);
                vec3 foamColor = vec3(0.8, 0.95, 1.0);
                vec3 deepWaterColor = vec3(0.0, 0.4, 0.7);

                // Wave distortion using sine functions
                float wave1 = sin(vUv.x * 20.0 + uTime * 2.0) * 0.05;
                float wave2 = cos(vUv.y * 15.0 - uTime * 1.5) * 0.05;
                float combinedDistortion = wave1 + wave2;

                // Foam lines
                float foam = abs(sin((vUv.x - vUv.y + combinedDistortion) * 30.0 + uTime * 3.0));
                foam = smoothstep(0.8, 1.0, foam);

                // Depth gradient (closer to left edge = more shallow/foam)
                float depth = vUv.x;
                vec3 finalColor = mix(waterColor, deepWaterColor, vUv.x + combinedDistortion);
                finalColor = mix(finalColor, foamColor, foam * (1.0 - vUv.x * 0.5)); // More foam near shore

                gl_FragColor = vec4(finalColor, 0.85); // slight transparency to blend if needed
            }
        `;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            return shader;
        }

        const shaderProgram = gl.createProgram();
        gl.attachShader(shaderProgram, createShader(gl, gl.VERTEX_SHADER, vsSource));
        gl.attachShader(shaderProgram, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(shaderProgram);
        gl.useProgram(shaderProgram);

        const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
        const vertexBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        const posAttr = gl.getAttribLocation(shaderProgram, 'aVertexPosition');
        gl.enableVertexAttribArray(posAttr);
        gl.vertexAttribPointer(posAttr, 2, gl.FLOAT, false, 0, 0);

        const timeUniformLocation = gl.getUniformLocation(shaderProgram, 'uTime');

        let startTime = Date.now();
        function renderOcean() {
            const currentTime = (Date.now() - startTime) / 1000;
            gl.uniform1f(timeUniformLocation, currentTime);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(renderOcean);
        }
        renderOcean();


        // --- Modals / Parchment Content Logic ---
        const projects = {
            glgl: `
                <div class="theme-glgl" style="padding:20px; border-radius:5px;">
                    <h2>GlglStats</h2>
                    <div class="lz77-anim"><span>🎵</span><span>🎵</span><span>🎶</span> -> <span>🎼</span></div>
                    <p>A Python project visualizing LZ77 compression applied to musical notes, specifically measuring the repetitiveness of Israeli pop-chart songs.</p>
                    <div style="text-align:center; margin: 30px 0;">
                        <a href="https://glglstats.geekip.dev" target="_blank" class="wax-seal">View Live Site</a>
                    </div>
                    <iframe width="100%" height="200" src="https://www.youtube.com/embed/jrKAtOsj1Lo" frameborder="0" allowfullscreen style="border-radius:10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);"></iframe>
                </div>`,
            ahuzat: `
                <div class="theme-ahuzat">
                    <h2>Ahuzat Dibuk</h2>
                    <p>A high-impact Python scraping and data visualization project tracking Tel-Aviv parking lot occupancies.</p>
                    <p>This project gained significant traction, generating a beautiful heatmap of the city's infrastructure load.</p>
                    <div class="anchor-links">
                        <a href="https://13tv.co.il/item/news/domestic/internal/parking-902956407/" target="_blank">⚓ Channel 13</a>
                        <a href="https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm" target="_blank">⚓ Mako Link</a>
                        <a href="https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/" target="_blank">⚓ Viral Post</a>
                    </div>
                </div>`,
            '2dpart': `
                <div class="theme-2d" style="padding: 20px;">
                    <h2>2D Part Orienting</h2>
                    <p>An open-source computational geometry implementation in C++ used to generate precise push plans for polygon manipulation.</p>
                    <svg width="100" height="50" style="display:block; margin: 20px auto;">
                        <polygon points="10,10 90,10 50,40" fill="none" stroke="#1e3f66" stroke-width="2">
                            <animateTransform attributeName="transform" type="rotate" from="0 50 25" to="360 50 25" dur="4s" repeatCount="indefinite"/>
                        </polygon>
                    </svg>
                    <div style="text-align: center; margin-top:30px;">
                        <a href="https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/" target="_blank" class="blueprint-btn">VIEW SOURCE & DOCS</a>
                    </div>
                </div>`,
            turing: `
                <div class="theme-jest">
                    <h2>The Turing Jest</h2>
                    <p>An LMSYS-like arena framework where advanced LLMs compete in making and explaining puns, rated by human users.</p>
                    <p>Step right up and test the comedic capabilities of modern intelligence!</p>
                    <br>
                    <a href="https://jest.geekip.dev" target="_blank" class="jester-link" style="text-decoration:none;">🃏 Play the Jest</a>
                </div>`,
            rhymes: `
                <div class="theme-rhymes theme-glgl" style="border:none; box-shadow:none;">
                    <div class="tape"></div>
                    <h2 style="border-bottom: 2px solid black;">Rhymes of Israel</h2>
                    <p>A fun Chrome extension utilizing an LLM to dynamically rewrite standard Israeli news headlines into comedic, catchy rhymes!</p>
                    <p>Doodle your way through the daily news.</p>
                    <div style="text-align: center; margin-top: 40px;">
                        <a href="https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb" target="_blank" class="chrome-link">
                           Get it on Chrome Web Store 🚀
                        </a>
                    </div>

        const modal = document.getElementById('modal');

        const parchmentContent = document.getElementById('parchment-content');

        // Play pop sound (synthesized to avoid external assets)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playPop() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        window.openParchment = function(key) {
            playPop();
            // Reset classes
            parchmentBox.className = 'parchment'; 
            parchmentContent.innerHTML = projects[key];
            modal.classList.add('active');
        }

        window.closeParchment = function() { modal.classList.remove('active'); }

        // Close on background click
        modal.addEventListener('click', (e) => {

        // --- Pocket Watch Timer Logic ---
        const watchTimer = document.getElementById('watch-timer');
        const targetDate = new Date('2026-07-21T02:00:36Z').getTime(); // Using UTC for consistency

        function updateWatch() {
            const now = Date.now();
            // The prompt asks for an exact tick flipping seamlessly since the timestamp.
            // We use absolute difference so it continuously ticks regardless if the observer
            // is technically pre or post 2026 in real-world time.
            const diff = Math.abs(now - targetDate); 

            const totalSeconds = Math.floor(diff / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const fH = hours.toString().padStart(2, '0');
            const fM = minutes.toString().padStart(2, '0');
            const fS = seconds.toString().padStart(2, '0');

            watchTimer.textContent = `${fH}:${fM}:${fS}`;
        }
        
        setInterval(updateWatch, 1000);
        updateWatch();
