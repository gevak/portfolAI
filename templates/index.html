<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper - 3D Escape Room Portfolio</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --obsidian: #0b0c10;
            --steel: #1f2833;
            --neon-cyan: #66fcf1;
            --neon-teal: #45a29e;
            --neon-red: #ff3b3f;
            --glass-bg: rgba(11, 12, 16, 0.65);
            --glass-border: rgba(102, 252, 241, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--obsidian);
            font-family: 'Inter', sans-serif;
            color: #fff;
            user-select: none;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- Header (Holographic) --- */
        #header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.8), 0 0 20px rgba(102, 252, 241, 0.4);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 0.2rem;
            margin-bottom: 5px;
        }

        .header-desc {
            font-size: 0.9rem;
            color: #d1d5db;
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: var(--neon-red);
            text-shadow: 0 0 5px var(--neon-red);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { opacity: 1; transform: translate(0); }
            2% { transform: translate(-2px, 1px); }
            4% { transform: translate(2px, -1px); }
            6% { transform: translate(0); opacity: 0.8; }
            50% { opacity: 1; }
            95% { opacity: 1; }
            96% { opacity: 0; }
            97% { opacity: 1; filter: hue-rotate(90deg); }
            98% { filter: hue-rotate(0deg); }
            100% { opacity: 1; }
        }

        /* --- UI Card (Frosted Glass) --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10%;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .ui-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 2rem;
            width: 450px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(102, 252, 241, 0.1);
            pointer-events: auto;
            transform: translateY(20px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        #ui-layer.active {
            opacity: 1;
        }
        #ui-layer.active .ui-card {
            transform: translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Orbitron';
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: var(--neon-cyan);
            color: var(--obsidian);
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            font-size: 1.8rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }

        .card-desc {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #ddd;
            margin-bottom: 1.5rem;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 15px;
            background: rgba(31, 40, 51, 0.8);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            text-decoration: none;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .action-link:hover {
            background: var(--neon-cyan);
            color: var(--obsidian);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* --- Footer (Steel Door & Timer) --- */
        #footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 10;
            background: linear-gradient(to bottom, #111 0%, #2a2d34 10%", var(--steel) 100%);
            border-top: 4px solid #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
        }

        .timer {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.8rem;
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red), 0 0 20px rgba(255, 59, 63, 0.5);
            letter-spacing: 0.1rem;
            margin-bottom: 5px;
        }

        .plaque-text {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            background: -webkit-linear-gradient(#aaa, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Cursor Hint */
        #cursor-hint {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            transition: all 0.2s;
        }
        #cursor-hint.interactable {
            border-color: var(--neon-cyan);
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(102, 252, 241, 0.2);
        }
    </style>
</head>
<body>

    <!-- WebGL Canvas Container -->
    <div id="webgl-container"></div>
    <div id="cursor-hint"></div>

    <!-- Holographic Header -->
    <div id="header">
        <h1>Geva Kipper</h1>
        <p class="header-desc">Currently building the future of web infrastructure as a Software Engineer at Google.</p>
        <p class="subtitle">Warning: Room layout is re-designed daily by AI and is thus ever-changing.</p>
    </div>

    <!-- Frosted Glass UI Overlay -->
    <div id="ui-layer">
        <div class="ui-card">
            <button class="close-btn" id="close-btn">RETURN</button>
            <h2 class="card-title" id="card-title">Project Name</h2>
            <p class="card-desc" id="card-desc">Project description goes here...</p>
            <div class="links-container" id="card-links">
                <!-- Links injected via JS -->
            </div>
        </div>
    </div>

    <!-- Footer Timer Plaque -->
    <div id="footer">
        <div class="timer" id="timer-display">0000:00:00:00</div>
        <div class="plaque-text">Escape Room Environment Architected and Hallucinated by AI</div>
    </div>

    <!-- Import Maps for Modern Three.js and GSAP via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <!-- Main Logic -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Data Configuration ---
        const projects = [
            {
                title: "GlglStats",
                desc: "A Python project measuring the repetitiveness of Israeli pop-chart songs using LZ77 compression and visualizing repetition patterns. Encased within a vintage, golden 3D tape deck retrofitted with LED data audio dials.",
                links: [
                    { label: "Launch Simulator", url: "https://glglstats.geekip.dev" },
                    { label: "PyData TLV Presentation", url: "https://www.youtube.com/watch?v=jrKAtOsj1Lo" }
                ]
            },
            {
                title: "Ahuzat Dibuk",
                desc: "A Python scraping and data visualization piece analyzing car parking lot occupancy, represented here as a glowing miniature topographical map of Tel-Aviv under a glass cloche.",
                links: [
                    { label: "Channel 13 Coverage", url: "https://13tv.co.il/item/news/domestic/internal/parking-902956407/" },
                    { label: "Mako Coverage", url: "https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm" },
                    { label: "Secret Tel-Aviv Origin", url: "https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/" }
                ]
            },
            {
                title: "2D Part Orienting",
                desc: "A C++ implementation algorithm in an open-source computational geometry library used for constructing push plans. Simulated by a levitating kinetic polygon suspended and oriented inside rotating metal rings.",
                links: [
                    { label: "Initialize Push Plan (TAU CGL)", url: "https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/" }
                ]
            },
            {
                title: "The Turing Jest",
                desc: "An LMSYS-like arena where LLMs compete at making and explaining puns, rated by users. Bound within a dual-faced digital theater mask executing simulated reasoning checks.",
                links: [
                    { label: "Enter The Arena", url: "https://jest.geekip.dev" }
                ]
            },
            {
                title: "Rhymes of Israel",
                desc: "A Chrome extension utilizing an LLM to rewrite Israeli news headlines into comedic, high-school yearbook-style rhymes. Morphs dynamically into a glowing digital news tablet.",
                links: [
                    { label: "Install Module (Chrome Store)", url: "https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb" }
                ]
            },
            {
                title: "Hatul Basak",
                desc: "A Hebrew port of catfishing.net and Wikipedia-based Trivia game (AI-generated daily challenges & custom themes). Disguised as an interactable obsidian scatter-puzzle.",
                links: [
                    { label: "Execute Game Terminal", url: "https://hatulbasak.geekip.dev" }
                ]
            },
            {
                title: "The Simulation Meta",
                desc: "You are looking at it. This very site is an intricately coded 3D environment architected as a sleek, futuristic escape room to house my digital consciousness and portfolio.",
                links: [
                    { label: "∞ Recurse Simulation", url: "https://geekip.dev" }
                ]
            },
            {
                title: "Security & Biometrics matrix",
                desc: "Developer social indexing node. Validating handprint biometrics grants access to source communications matrix.",
                links: [
                    { label: "GitHub Access", url: "https://github.com/gevak" },
                    { label: "LinkedIn Access", url: "https://linkedin.com/in/gevakip" },
                    { label: "Facebook Access", url: "https://facebook.com/geva.kipper" }
                ]
            }
        ];

        // --- Scene Setup ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0b0c10, 0.03);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        const centerPos = new THREE.Vector3(0, 1.6, 0); // Player head height
        camera.position.copy(centerPos);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.enableZoom = false; // Zoom handled by GSAP
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        // Restrict camera to look around from center
        controls.target.set(0, 1.6, -1);

        // --- Materials & Styling ---
        const matObsidian = new THREE.MeshPhysicalMaterial({ color: 0x050508, roughness: 0.1, metalness: 0.8, clearcoat: 1.0 });
        const matSteel = new THREE.MeshStandardMaterial({ color: 0x22252a, roughness: 0.6, metalness: 0.7 });
        const matGold = new THREE.MeshStandardMaterial({ color: 0xc5a059, roughness: 0.2, metalness: 1.0 });
        const matGlass = new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 0.9, opacity: 1, metalness: 0, roughness: 0.1, ior: 1.5, thickness: 0.5, transparent: true });

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x0a101f, 1.5);
        scene.add(ambientLight);
        
        const centerLight = new THREE.PointLight(0x66fcf1, 5, 20);
        centerLight.position.set(0, 8, 0);
        centerLight.castShadow = true;
        scene.add(centerLight);

        // --- Environment (The Vault) ---
        // Floor
        const floorGeo = new THREE.CylinderGeometry(20, 20, 1, 64);
        const floor = new THREE.Mesh(floorGeo, matObsidian);
        floor.position.y = -0.5;
        floor.receiveShadow = true;
        scene.add(floor);

        // Walls
        const wallGeo = new THREE.CylinderGeometry(20, 20, 15, 64, 1, true);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.9, side: THREE.BackSide });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.y = 7;
        scene.add(wall);

        // --- Interactive Objects Array ---
        const interactables = [];
        const radius = 12; // Distance from center

        // Utilities to build stylized geometries
        function addPedestal(position, angle) {
            const pedGeo = new THREE.CylinderGeometry(0.8, 1, 1.2, 8);
            const pedestal = new THREE.Mesh(pedGeo, matSteel);
            pedestal.position.copy(position);
            pedestal.position.y = 0.6; // sit on floor
            pedestal.lookAt(0, 0.6, 0);
            pedestal.receiveShadow = true;
            pedestal.castShadow = true;
            scene.add(pedestal);

            // Add a neon ring around pedestal
            const ringGeo = new THREE.TorusGeometry(1.2, 0.05, 16, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x45a29e });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.copy(pedestal.position);
            ring.position.y = 0.05;
            scene.add(ring);

            return pedestal.position.clone().setY(1.5); // Return surface position
        }

        function createHitbox(mesh, index) {
            const geo = new THREE.BoxGeometry(2, 2.5, 2);
            const mat = new THREE.MeshBasicMaterial({ visible: false }); // Invisible to eye, visible to raycaster
            const hitbox = new THREE.Mesh(geo, mat);
            hitbox.position.copy(mesh.position);
            hitbox.userData = { id: index };
            scene.add(hitbox);
            interactables.push(hitbox);
        }

        // Object 0: GlglStats (Tape Deck)
        function buildTapeDeck(pos, index) {
            const group = new THREE.Group();
            group.position.copy(pos);
            const deck = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 1), matGold);
            deck.castShadow = true;
            group.add(deck);
            
            // Waveform visualizer
            const waveGroup = new THREE.Group();
            for(let i=0; i<10; i++) {
                const bar = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0x66fcf1}));
                bar.position.set(-0.6 + i*0.13, 0.3, 0);
                waveGroup.add(bar);
            }
            group.add(waveGroup);
            
            group.userData.anim = (time) => {
                waveGroup.children.forEach((bar, i) => {
                    const h = 0.1 + Math.abs(Math.sin(time*5 + i)) * 0.4;
                    bar.scale.y = h * 10;
                    bar.position.y = 0.25 + (h / 2);
                });
            };
            scene.add(group);
            createHitbox(group, index);
            return group;
        }

        // Object 1: Ahuzat Dibuk (Map/Cloche)
        function buildMapCloche(pos, index) {
            const group = new THREE.Group();
            group.position.copy(pos);
            
            const cloche = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2), matGlass);
            cloche.position.y = -0.2;
            group.add(cloche);

            const mapData = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.2, 16, 16), new THREE.MeshStandardMaterial({ color: 0x880000, emissive: 0x220000, wireframe: true}));
            mapData.rotation.x = -Math.PI / 2;
            mapData.position.y = -0.19;
            group.add(mapData);

            let heatActive = false;
            group.userData.trigger = () => { heatActive = !heatActive };
            group.userData.anim = (time) => {
                if(heatActive) {
                    mapData.material.color.setHex(0x00ff00);
                    mapData.material.emissive.setHex(0x004400);
                } else {
                    mapData.material.color.setHex(0xff0000);
                    mapData.material.emissive.setHex(0x220000);
                }
            };
            scene.add(group);
            createHitbox(group, index);
            return group;
        }

        // Object 2: 2D Part Orienting
        function buildKineticPolygon(pos, index) {
            const group = new THREE.Group();
            group.position.copy(pos);

            const ring1 = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.05, 16, 32), matSteel);
            const ring2 = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.05, 16, 32), matSteel);
            const poly = new THREE.Mesh(new THREE.IcosahedronGeometry(0.3), new THREE.MeshStandardMaterial({color: 0x66fcf1, emissive: 0x114444}));
            
            group.add(ring1, ring2, poly);

            group.userData.anim = (time) => {
                ring1.rotation.x = time;
                ring1.rotation.y = time * 0.5;
                ring2.rotation.y = -time;
                ring2.rotation.z = time * 0.8;
                poly.rotation.x = time * 0.2;
            };
            scene.add(group);
            createHitbox(group, index);
            return group;
        }

        // Object 3: The Turing Jest (Masks)
        function buildMasks(pos, index) {
            const group = new THREE.Group();
            group.position.copy(pos);

            const matMask = new THREE.MeshStandardMaterial({color: 0xeeeeee, roughness: 0.4});
            const mask1 = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 16, 0, Math.PI, 0, Math.PI), matMask);
            mask1.position.set(-0.3, 0, 0);
            mask1.rotation.y = -Math.PI/4;

            const mask2 = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 16, 0, Math.PI, 0, Math.PI), matObsidian);
            mask2.position.set(0.3, 0, 0);
            mask2.rotation.y = Math.PI/4;

            group.add(mask1, mask2);
            
            group.userData.anim = (time) => {
                mask1.position.y = Math.sin(time * 2) * 0.1;
                mask2.position.y = Math.cos(time * 2) * 0.1;
            };
            scene.add(group);
            createHitbox(group, index);
            return group;
        }

        // Object 4: Rhymes of Israel (Yearbook -> Tablet)
        function buildYearbook(pos, index) {
            const group = new THREE.Group();
            group.position.copy(pos);

            const book = new THREE.Mesh(new THREE.BoxGeometry(1, 0.15, 1.4), new THREE.MeshStandardMaterial({color: 0x000033}));
            const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1.2), new THREE.MeshBasicMaterial({color: 0x45a29e}));
            screen.rotation.x = -Math.PI / 2;
            screen.position.y = 0.08;
            group.add(book, screen);

            group.userData.trigger = () => {
                gsap.to(screen.material.color, {r: 0.4, g: 0.98, b: 0.94, duration: 0.5}); // glow up
            }
            scene.add(group);
            createHitbox(group, index);
            return group;
        }

        // Object 5: Hatul Basak (Puzzle Box)
        function buildPuzzleBox(pos, index) {
            const group = new THREE.Group();
            group.position.copy(pos);

            const box = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), matObsidian);
            group.add(box);

            const pieces = [];
            const pMat = new THREE.MeshStandardMaterial({color: 0xffffff});
            for(let i=0; i<5; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), pMat);
                p.position.set((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2);
                group.add(p);
                pieces.push({mesh: p, orig: p.position.clone()});
            }

            let scattered = true;
            group.userData.trigger = () => {
                scattered = !scattered;
                pieces.forEach(p => {
                    if(!scattered) {
                         gsap.to(p.mesh.position, {x:0, y:0, z:0, duration: 1, ease: "back.inOut(1.7)"});
                    } else {
                         gsap.to(p.mesh.position, {x: p.orig.x, y: p.orig.y, z: p.orig.z, duration: 1});
                    }
                });
            };
            scene.add(group);
            createHitbox(group, index);
            return group;
        }

        // Object 6: The Simulation Meta (Mirror)
        function buildMirror(pos, index) {
            const group = new THREE.Group();
            group.position.copy(pos);

            const frame = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.8, 0.1), matSteel);
            const mirrorMat = new THREE.MeshPhysicalMaterial({roughness: 0, metalness: 1, color: 0xaaaaaa});
            const glass = new THREE.Mesh(new THREE.PlaneGeometry(1, 1.6), mirrorMat);
            glass.position.z = 0.06;
            group.add(frame, glass);

            group.userData.trigger = () => {
                gsap.to(glass.scale, {x: 0.9, y: 0.9, duration: 0.2, yoyo: true, repeat: 1});
            }
            scene.add(group);
            createHitbox(group, index);
            return group;
        }

        // Object 7: Security Matrix (Terminal)
        function buildTerminal(pos, index) {
            const group = new THREE.Group();
            group.position.copy(pos);

            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1.5, 8), matSteel);
            base.rotation.x = Math.PI / 4;
            const panel = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 1), new THREE.MeshBasicMaterial({color: 0xff3b3f}));
            panel.position.set(0, 0.4, 0.4);
            panel.rotation.x = -Math.PI / 4;
            group.add(base, panel);

            group.userData.anim = (time) => {
                panel.material.color.setHSL(0, 1, 0.3 + Math.abs(Math.sin(time*4))*0.2); // Pulse red
            };
            scene.add(group);
            createHitbox(group, index);
            return group;
        }

        const buildFunctions = [buildTapeDeck, buildMapCloche, buildKineticPolygon, buildMasks, buildYearbook, buildPuzzleBox, buildMirror, buildTerminal];
        const activeObjectScripts = [];

        // Distribute objects in a circle
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const basePos = new THREE.Vector3(x, 0, z);
            
            const surfacePos = addPedestal(basePos, angle);
            const objGroup = buildFunctions[i](surfacePos, i);

            // Add local light
            const pLight = new THREE.PointLight(0x45a29e, 1, 4);
            pLight.position.copy(surfacePos).add(new THREE.Vector3(0, 1, 0));
            scene.add(pLight);

            // Orient towards center
            objGroup.lookAt(0, surfacePos.y, 0);
            
            if(objGroup.userData.anim) {
                activeObjectScripts.push(objGroup.userData.anim);
            }
        }

        // Add Exit Door behind Terminal (Object 7 is at index 7)
        const doorGeo = new THREE.BoxGeometry(4, 8, 1);
        const door = new THREE.Mesh(doorGeo, matSteel);
        const doorAngle = (7 / 8) * Math.PI * 2;
        door.position.set(Math.cos(doorAngle) * 19, 4, Math.sin(doorAngle) * 19);
        door.lookAt(0, 4, 0);
        scene.add(door);

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isUIVisible = false;
        let animationActive = true;

        const cursorHint = document.getElementById('cursor-hint');

        window.addEventListener('pointermove', (e) => {
            if(isUIVisible) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactables);
            
            if(intersects.length > 0) {
                cursorHint.classList.add('interactable');
                document.body.style.cursor = 'pointer';
            } else {
                cursorHint.classList.remove('interactable');
                document.body.style.cursor = 'default';
            }
        });

        window.addEventListener('pointerdown', (e) => {
            if(isUIVisible || e.target.closest('#ui-layer')) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactables);

            if(intersects.length > 0) {
                const targetObj = intersects[0].object;
                const dataIndex = targetObj.userData.id;
                
                // Trigger assigned animation if exists (find group associated with hitbox)
                // Hitbox shares exact position with group. 
                const siblings = scene.children.filter(c => c.type === 'Group' && c.position.distanceTo(targetObj.position) < 0.1);
                if(siblings[0] && siblings[0].userData.trigger) {
                    siblings[0].userData.trigger();
                }

                focusCameraOn(targetObj, dataIndex);
            }
        });

        function focusCameraOn(targetMesh, dataIndex) {
            isUIVisible = true;
            controls.enabled = false;
            cursorHint.style.opacity = 0;

            const tPos = targetMesh.position.clone();
            // Calculate a position slightly in front and up from the object, facing it from the center
            const dirToCenter = new THREE.Vector3(0, tPos.y, 0).sub(tPos).normalize();
            const camPos = tPos.clone().add(dirToCenter.multiplyScalar(4)).add(new THREE.Vector3(0, 1, 0));

            // Animate Camera Position
            gsap.to(camera.position, {
                x: camPos.x,
                y: camPos.y,
                z: camPos.z,
                duration: 1.5,
                ease: "power3.inOut"
            });

            // Animate Camera LookAt target
            gsap.to(controls.target, {
                x: tPos.x,
                y: tPos.y,
                z: tPos.z,
                duration: 1.5,
                ease: "power3.inOut",
                onUpdate: () => controls.update(),
                onComplete: () => showUI(dataIndex)
            });
        }

        const uiLayer = document.getElementById('ui-layer');
        const uiTitle = document.getElementById('card-title');
        const uiDesc = document.getElementById('card-desc');
        const uiLinks = document.getElementById('card-links');

        function showUI(index) {
            const data = projects[index];
            uiTitle.innerText = data.title;
            uiDesc.innerText = data.desc;
            
            uiLinks.innerHTML = '';
            data.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = "_blank";
                a.className = "action-link";
                a.innerText = link.label;
                uiLinks.appendChild(a);
            });

            uiLayer.classList.add('active');
        }

        document.getElementById('close-btn').addEventListener('click', () => {
            uiLayer.classList.remove('active');
            
            // Revert Camera
            gsap.to(camera.position, {
                x: centerPos.x,
                y: centerPos.y,
                z: centerPos.z,
                duration: 1.5,
                ease: "power3.inOut"
            });

            // Look forward slightly
            const forward = new THREE.Vector3(0, 1.6, -1);
            gsap.to(controls.target, {
                x: forward.x,
                y: forward.y,
                z: forward.z,
                duration: 1.5,
                ease: "power3.inOut",
                onComplete: () => {
                    controls.enabled = true;
                    isUIVisible = false;
                    cursorHint.style.opacity = 1;
                }
            });
        });

        // --- Timer Logic ---
        const timerDisplay = document.getElementById('timer-display');
        // Calculate duration Since specific date. Counting UP acting as "locked in elapsed time".
        const startDate = new Date('2026-04-20T02:03:25Z').getTime();

        function updateTimer() {
            const now = Date.now();
            let ms = Math.abs(now - startDate); // Use absolute to force count up representation

            const hours = Math.floor(ms / (1000 * 60 * 60));
            ms -= hours * 1000 * 60 * 60;
            const mins = Math.floor(ms / (1000 * 60));
            ms -= mins * 1000 * 60;
            const secs = Math.floor(ms / 1000);
            ms -= secs * 1000;
            const frames = Math.floor(ms / 16); // Approx 60fps frame count representation for style

            const pad = (num, size) => ('000000' + num).slice(-size);
            timerDisplay.innerText = `${pad(hours, 4)}:${pad(mins, 2)}:${pad(secs, 2)}:${pad(frames, 2)}`;
            requestAnimationFrame(updateTimer);
        }
        updateTimer();

        // --- Main Render Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();

            if(animationActive) {
                // Execute individual object procedural animations
                activeObjectScripts.forEach(script => script(elapsedTime));
                
                // Slow rotation of vault ambient mechanics could go here.
            }

            if(!isUIVisible) {
                controls.update(); // only allow user view adjustment when UI is closed
            }
            
            renderer.render(scene, camera);
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
