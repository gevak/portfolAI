<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geva Kipper - Digital Portfolio Space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Rajdhani:wght@400;600&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #07070a;
            --metal-base: #222328;
            --metal-highlight: #3a3c42;
            --metal-shadow: #0f1013;
            --neon-blue: #0ff;
            --neon-pink: #f0f;
            --neon-red: #ff3333;
            --neon-green: #39ff14;
            --glass-bg: rgba(20, 25, 30, 0.45);
            --glass-border: rgba(0, 255, 255, 0.2);
            --font-title: 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: var(--font-body);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1500px;
        }

        /* Ambient Generative Lighting */
        .ambient-light {
            position: absolute;
            top: 0; left: 0;right: 0; bottom: 0;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 40%, rgba(0, 255, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 60%, rgba(255, 0, 255, 0.08) 0%, transparent 40%);
            animation: shiftAmbient 12s infinite alternate linear;
            pointer-events: none;
        }
        @keyframes shiftAmbient {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* --- Vending Machine Body --- */
        .machine-wrapper {
            position: relative;
            z-index: 1;
            width: 900px;
            max-width: 96vw;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--metal-highlight) 0%, var(--metal-base) 40%, var(--metal-shadow) 100%);
            border: 2px solid #444;
            border-radius: 12px 12px 4px 4px;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.9),
                inset 0 0 15px rgba(255,255,255,0.05),
                inset 2px 2px 5px rgba(255,255,255,0.1),
                inset -5px -5px 15px rgba(0,0,0,0.8);
        }

        /* Header */
        .header-panel {
            padding: 15px 25px;
            border-bottom: 2px solid #111;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
            background: linear-gradient(to bottom, #1a1a1e, #111);
            border-radius: 10px 10px 0 0;
        }

        .logo-sign {
            font-family: var(--font-title);
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 10px;
            position: relative;
        }
        .logo-sign::after {
            content:''; position: absolute; bottom:-5px; left:20%; width:60%; height:2px;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .lcd-screen {
            background: #001511;
            border: 2px inset #333;
            border-radius: 4px;
            padding: 8px 15px;
            font-family: var(--font-mono);
            color: var(--neon-blue);
            text-align: center;
            font-size: 0.9rem;
            text-shadow: 0 0 5px rgba(0,255,255,0.5);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: #0a0a0a;
            border: 1px solid #222;
            border-radius: 3px;
        }
        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding: 4px 0;
            font-family: var(--font-mono);
            color: var(--neon-red);
            font-size: 0.75rem;
            text-transform: uppercase;
            text-shadow: 0 0 4px var(--neon-red);
            animation: ticker 25s linear infinite;
        }
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Central Core */
        .core-panel {
            flex-grow: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            background: #111216;
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Glass Windows & Shelves */
        .glass-viewport {
            flex-grow: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 10px 0;
            position: relative;
            overflow: hidden;
        }

        .shelf {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 30%;
            position: relative;
            border-bottom: 4px solid #333;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5), inset 0 2px 0 #555;
        }

        .slot {
            position: relative;
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CSS Coils */
        .coil {
            width: 100%; height: 30px;
            border: 3px solid #ccc;
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            box-shadow: 0 5px 5px rgba(0,0,0,0.6);
            border-bottom-color: #777;
            border-top-color: #fff;
            transform: rotateX(75deg);
            z-index: 2;
            transition: transform 0.8s ease-in-out;
        }
        .coil.spin { transform: rotateX(75deg) rotateZ(360deg); }

        /* Vending Items Styling */
        .item {
            position: relative;
            z-index: 1;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s, opacity 0.3s;
            bottom: 15px;
            filter: drop-shadow(0px 10px 5px rgba(0,0,0,0.8));
        }
        .item:hover { transform: translateY(-5px); filter: drop-shadow(0px 15px 10px var(--neon-blue)); }
        
        /* Item Fall Animation Class */
        .falling {
            animation: dropIntoTray 0.7s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
        }
        @keyframes dropIntoTray {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            80% { transform: translateY(180px) scale(0.6); opacity: 1; filter: blur(2px); }
            100% { transform: translateY(220px) scale(0.4); opacity: 0; filter: blur(5px); }
        }

        /* SVG Props Styling */
        .prop { width: 50px; height: 50px; }
        .prop-cassette rect { fill: #222; stroke: var(--neon-pink); stroke-width: 2; }
        .prop-cassette circle { fill: var(--neon-blue); }
        .prop-meter { fill: linear-gradient(to bottom, #bbb, #555); stroke: #222; stroke-width: 2; }
        .prop-meter circle { fill: var(--neon-red); }
        .prop-cube polygon { fill: none; stroke: var(--neon-blue); stroke-width: 2; }
        .prop-mask path { fill: none; stroke: #9d00ff; stroke-width: 2; }
        .prop-book rect { fill: rgba(255,255,255,0.1); stroke: var(--neon-green); stroke-width: 2; }
        .prop-book line { stroke: var(--neon-green); stroke-width: 1; }
        .prop-mini rect { fill: #111; stroke: #fff; stroke-width: 1; }
        .prop-mini circle { fill: var(--neon-blue); }
        .prop-cards rect { fill: rgba(0,255,255,0.2); stroke: var(--neon-blue); stroke-width: 1.5; transform-origin: center; }

        /* Keypad */
        .keypad-panel {
            width: 120px;
            background: #18191d;
            border: 2px solid #333;
            border-radius: 6px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            align-content: start;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .key-btn {
            background: linear-gradient(to bottom, #333, #111);
            border: 1px solid #555;
            color: #ccc;
            font-family: var(--font-mono);
            font-size: 1rem;
            padding: 8px 0;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 0 #000;
            transition: all 0.1s;
        }
        .key-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #000;
            color: var(--neon-blue);
            border-color: var(--neon-blue);
        }

        /* Tray */
        .tray-door {
            height: 100px;
            background: #09090b;
            margin: 0px 20px 20px;
            border: 4px inset #444;
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 30px 30px rgba(0,0,0,1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }
        .tray-door.glow {
            box-shadow: inset 0 30px 40px rgba(0,0,0,0.8), 0 0 30px rgba(0, 255, 255, 0.4);
        }
        .tray-door::after {
            content: 'PUSH';
            font-family: var(--font-body);
            color: #333;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* Maintenance Panel (Footer) */
        .maintenance-panel {
            height: 50px;
            background: #111;
            border-top: 2px solid #333;
            border-radius: 0 0 8px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }
        .plaque {
            font-family: var(--font-body);
            font-size: 0.75rem;
            color: #666;
            text-shadow: -1px -1px 0 #000, 1px 1px 0 #222;
        }
        .stopwatch {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
            background: #001100;
            padding: 3px 10px;
            border-radius: 3px;
            border: 1px inset #333;
        }

        /* --- Modal Panel (Glassmorphism) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .modal-overlay.active {
            pointer-events: all;
            opacity: 1;
        }

        .modal-card {
            background: rgba(15, 17, 26, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 550px;
            max-width: 90vw;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-top: 2px solid rgba(0, 255, 255, 0.8);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
            transform: scale(0.5) translateY(200px);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #e0e0e0;
        }
        .modal-overlay.active .modal-card {
            transform: scale(1) translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: none;
            border: none;
            color: var(--neon-red);
            font-family: var(--font-mono);
            font-size: 1.2rem;
            cursor: pointer;
            text-shadow: 0 0 5px var(--neon-red);
            transition: transform 0.2s;
        }
        .close-btn:hover { transform: scale(1.2); }

        .modal-title {
            font-family: var(--font-title);
            color: #fff;
            text-transform: uppercase;
            font-size: 1.6rem;
            margin-bottom: 10px;
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }
        
        .modal-desc {
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #aaa;
        }

        .action-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .neon-btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: inset 0 0 5px rgba(0, 255, 255, 0.1);
        }
        .neon-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }
        .neon-btn.pink { border-color: var(--neon-pink); color: var(--neon-pink); }
        .neon-btn.pink:hover { background: var(--neon-pink); color: #000; box-shadow: 0 0 15px var(--neon-pink); }

        .yt-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid #333;
            margin-top: 15px;
        }
        .yt-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* Large Social Icons specifically for Item 7 */
        .social-matrix {
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
        }
        .social-matrix a {
            color: #fff;
            opacity: 0.7;
            transition: transform 0.3s, opacity 0.3s, filter 0.3s;
        }
        .social-matrix a:hover {
            transform: translateY(-8px);
            opacity: 1;
            filter: drop-shadow(0 0 15px var(--neon-blue));
        }
        .social-icon { width: 60px; height: 60px; fill: currentColor; }
    </style>
</head>

        let isAnimating = false;
        let currentItem = null;

        function triggerVend(id) {
            if (isAnimating) return;
            isAnimating = true;

            const itemNode = document.querySelector(`.item[data-id="${id}"]`);
            if(!itemNode) { isAnimating = false; return; }
            
            currentItem = itemNode;
            const coilNode = itemNode.previousElementSibling;
            const trayNode = document.getElementById('dispenserTray');

            // 1. Mechanism Spin
            if(coilNode) coilNode.classList.add('spin');

            // 2. Drop Sequence
            setTimeout(() => {
                itemNode.classList.add('falling');
                
                // 3. Tray Glow & Data Load
                setTimeout(() => {
                    trayNode.classList.add('glow');
                    openInterface(id);
                }, 600); // Wait for fall drop to hit bottom
                
            }, 500); // Delay after spin start
        }

        function openInterface(id) {
            const data = database[id];
            const modal = document.getElementById('interfaceModal');
            const targetHtml = `
                <div class="modal-title">${data.title}</div>
                <div class="modal-desc">${data.desc}</div>
                ${data.html}
            `;
            
            document.getElementById('modalContent').innerHTML = targetHtml;
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('interfaceModal');
            const trayNode = document.getElementById('dispenserTray');
            
            modal.classList.remove('active');
            
            // Re-rack the item cleanly in the background
            setTimeout(() => {
                trayNode.classList.remove('glow');
                if(currentItem) {
                    currentItem.classList.remove('falling');
                    const coilNode = currentItem.previousElementSibling;
                    if(coilNode) coilNode.classList.remove('spin');
                    currentItem = null;
                }
                isAnimating = false;
            }, 400); // Wait for glassmorphism modal to shrink
        }

        // Temporal Grounding Stopwatch logic
        const targetDate = new Date('2026-03-26T01:50:53').getTime();
        const timerDisplay = document.getElementById('temporalTimer');

        setInterval(() => {
            const now = new Date().getTime();
            const elapsed = Math.abs(now - targetDate);
            
            let totalSeconds = Math.floor(elapsed / 1000);
            let hours = Math.floor(totalSeconds / 3600);
            totalSeconds %= 3600;
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;

            timerDisplay.innerText = 
                String(hours).padStart(2, '0') + ':' + 
                String(minutes).padStart(2, '0') + ':' + 
                String(seconds).padStart(2, '0');
        }, 1000);
    </script>
