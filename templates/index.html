<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper | Engineering Portfolio</title>
    <!-- Use Google Fonts for premium typography styling -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #0b0c10;
            --machine-bg: #1c1c24;
            --glass-bg: rgba(20, 20, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-amber: #ffbf00;
            --neon-blue: #00e5ff;
            --neon-pink: #ff0055;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --modal-glass: rgba(15, 15, 20, 0.65);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #262633 0%, var(--bg-color) 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1500px;
        }

        /* ---------------- Vending Machine Structure ---------------- */
        .machine-container {
            width: 95vw;
            max-width: 960px;
            height: 85vh;
            max-height: 800px;
            background: linear-gradient(145deg, #1f1f2a, #121217);
            border-radius: 20px;
            box-shadow: 
                0 40px 100px rgba(0,0,0,0.9), 
                inset 0 0 0 2px #333,
                inset 0 10px 30px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            transform-style: preserve-3d;
            border-bottom: 8px solid #000;
        }

        /* ---------------- Header & Marquee ---------------- */
        .m-header {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.6);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-bottom: 2px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(255,var(--neon-blue),0.1);
        }
        .m-header h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            margin-bottom: 5px;
        }
        .m-header .sub-heading {
            color: var(--text-sub);
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .marquee-box {
            width: 100%;
            height: 30px;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            border-top: 1px solid #222;
        }
        .marquee-text {
            color: var(--neon-amber);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.85rem;
            white-space: nowrap;
            animation: scrollText 15s linear infinite;
        }
        @keyframes scrollText {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* ---------------- Machine Body ---------------- */
        .m-body {
            flex-basis: 100%;
            display: flex;
            flex-direction: row;
            padding: 20px;
            gap: 20px;
            height: calc(100% - 170px);
        }

        /* Left Side: Glass Window & Tray */
        .m-left {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .m-window {
            flex-grow: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: inset 0 0 50px rgba(0,var(--neon-blue),0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        /* Grid and Coils */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            height: 100%;
            gap: 15px;
        }
        .slot {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 800px;
            cursor: pointer;
        }
        .coil {
            position: absolute;
            width: 60px;
            height: 90%;
            bottom: -5%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 15px,
                #888 15px,
                #ccc 18px,
                #555 20px,
                transparent 20px
            );
            border-radius: 30px;
            z-index: 0;
            opacity: 0.8;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.5);
        }

        /* Snacks Base styling */
        .snack {
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .slot:hover .snack {
            transform: scale(1.15) translateZ(30px);
            filter: brightness(1.2);
        }
        .slot:hover::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 60%);
            z-index: 5;
            pointer-events: none;
        }

        /* Animations */
        @keyframes dropSnack {
            0% { transform: scale(1.15) translateZ(30px) translateY(0) rotate(0); }
            20% { transform: scale(1.15) translateZ(40px) translateY(-10px) rotate(-5deg); }
            100% { transform: scale(0.9) translateY(80vh) rotate(35deg); opacity: 0; }
        }
        .snack.falling {
            animation: dropSnack 0.8s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
            pointer-events: none;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            top: -20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--neon-blue);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 20;
            white-space: nowrap;
        }
        .slot:hover .tooltip {
            opacity: 1;
            transform: translateY(0);
        }

        /* Distinct Snack CSS Art */
        /* 1. Chips (GlglStats) */
        .snack-chips {
            width: 50px;
            height: 70px;
            background: linear-gradient(135deg, #ff0055, #ffaa00);
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 2px 2px 10px rgba(0,0,0,0.3);
            clip-path: polygon(5% 0, 95% 0, 100% 3%, 100% 97%, 95% 100%, 5% 100%, 0 97%, 0 3%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .snack-chips::before { content: 'ZIP'; font-weight: 800; color: #fff; font-size: 0.8rem; transform: rotate(-15deg); }

        /* 2. Cans (Ahuzat Dibuk) */
        .snack-can {
            width: 40px;
            height: 75px;
            background: linear-gradient(to right, #2a2a2a 0%, #666 20%, #888 50%, #666 80%, #2a2a2a 100%);
            border-radius: 6px;
            border-top: 3px solid #ccc; border-bottom: 3px solid #ccc;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .snack-can::after { content: 'HEAT'; width:100%; text-align:center; color: #f00; font-weight: 900; font-size:0.7rem; letter-spacing: 1px; transform: rotate(90deg); }

        /* 3. Origami Box (2D Part) */
        .snack-origami {
            width: 50px;
            height: 50px;
            background: #4facfe;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.2);
            position: relative;
        }
        .snack-origami::after { content:''; position:absolute; width:100%; height:100%; border: 1px solid rgba(255,255,255,0.4); }

        /* 4. Fortune Cookie Wrapper (Gest) */
        .snack-cookie {
            width: 65px;
            height: 40px;
            background: radial-gradient(ellipse at center, #ffd700, #b8860b);
            border-radius: 50px 50px 15px 15px;
            box-shadow: inset 0 -4px 10px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.3);
            display: flex; align-items:center; justify-content:center;
            border: 1px solid #cca100;
        }

        /* 5. Juicebox (Rhymes) */
        .snack-juice {
            width: 40px;
            height: 65px;
            background: #a18cd1;
            box-shadow: -10px 0 0 #8972bb, 5px 5px 10px rgba(0,0,0,0.4);
            transform: translateX(5px);
            position: relative;
        }
        .snack-juice::before { content:''; position:absolute; top:-5px; right: 5px; width:4px; height: 15px; background: #fff; transform: rotate(15deg); border-radius: 2px; }

        /* 6. Minimalist Tin (Cat Treat) */
        .snack-tin {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #e0e0e0 40%, #bdbdbd 100%);
            border: 3px solid #9e9e9e;
            border-radius: 50%;
            box-shadow: 0 8px 0 #757575, 0 15px 10px rgba(0,0,0,0.4);
            transform: translateY(-4px);
        }

        /* 7. Mirrored Blister (Meta) */
        .snack-blister {
            width: 50px;
            height: 70px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.3), 0 5px 15px rgba(0,0,0,0.2);
            border-radius: 8px;
            display: flex; align-items:center; justify-content:center;
        }
        .snack-blister::after { content: '♾️'; font-size: 1.2rem; filter: drop-shadow(0 0 5px #fff); }

        /* 8. Gummy Combo (Social) */
        .snack-gummy {
            width: 50px; height: 75px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            display: flex; flex-direction: column; align-items:center; justify-content:space-evenly;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
        .candy { width: 18px; height: 18px; border-radius: 50%; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.4); }
        .candy.c1 { background: var(--neon-pink); }
        .candy.c2 { background: var(--neon-blue); }
        .candy.c3 { background: var(--neon-amber); }

        /* Bottom Push Tray */
        .tray-container {
            height: 80px;
            background: #111;
            border-radius: 8px;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
            position: relative;
            transform-style: preserve-3d;
            perspective: 500px;
        }
        .push-door {
            width: 80%;
            height: 80%;
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid #333;
            margin: auto;
            position: absolute;
            top: 10%; left: 10%;
            border-radius: 4px;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #555;
            text-shadow: -1px -1px 0 #000, 1px 1px 0 #666;
            transform-origin: top;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 2px 10px rgba(255,255,255,0.05);
        }
        .push-door.door-open {
            transform: rotateX(55deg);
        }

        /* Right Side: Numpad & LCD */
        .m-right {
            width: 140px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .lcd-screen {
            background: #001100;
            height: 50px;
            border-radius: 4px;
            border: 2px solid #222;
            box-shadow: inset 0 0 10px #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }
        .lcd-text {
            color: #0f0;
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            text-shadow: 0 0 5px #0f0;
            letter-spacing: 1px;
        }
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .key {
            background: linear-gradient(#333, #1a1a1a);
            border: 1px solid #000;
            height: 30px;
            border-radius: 4px;
            color: #888;
            display: flex; align-items:center; justify-content:center;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: 0.2s;
            cursor: pointer;
        }
        .key:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
            background: #2a2a35;
        }

        /* ---------------- Footer Engraving ---------------- */
        .m-footer {
            height: 40px;
            background: linear-gradient(to bottom, #2a2a2a, #111);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .engraved-text {
            color: #333;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.1), -1px -1px 0 rgba(0,0,0,0.8);
        }

        /* ---------------- Fullscreen Modal ---------------- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--modal-glass);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: rgba(25, 25, 35, 0.85);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,255,255,0.05);
            transform: scale(0.8) translateY(50px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 20px;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal-close:hover { color: #fff; }

        /* Generic Modal Body Styling */
        .modal-content h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--neon-blue);
        }
        .modal-content p {
            font-size: 1rem;
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 25px;
        }
        
        /* Modal Custom Elements */
        .actions { display: flex; flex-wrap: wrap; gap: 15px; }
        .btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .btn:hover { background: var(--neon-blue); color: #000; border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }

        .clipping-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .clip {
            background: #eee; color: #111; padding: 15px 10px; text-decoration: none; font-family: serif; font-weight: bold; font-size: 0.9rem; text-align: center;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.6); transition: 0.2s; border-left: 3px solid #111;
        }
        .clip:nth-child(1) { transform: rotate(-2deg); }
        .clip:nth-child(2) { transform: rotate(1deg); }
        .clip:nth-child(3) { transform: rotate(-1.5deg); }
        .clip:hover { transform: scale(1.05) rotate(0); z-index: 2; position: relative; }

        .terminal { background: #0a0a0a; color: #0f0; font-family: 'Space Mono', monospace; padding: 20px; border-radius: 8px; border: 1px solid #333; line-height: 1.5; font-size: 0.9rem;}
        .terminal a { color: var(--neon-amber); text-decoration: none; display: block; margin-top: 15px; }
        .terminal a:hover { text-decoration: underline; }

        .emoji-btn { display: inline-block; font-size: 3rem; text-decoration: none; animation: pulse 2s infinite; transition: 0.2s; }
        .emoji-btn:hover { transform: scale(1.2); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .social-card { display: flex; gap: 20px; }
        .s-link { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 8px; color: #fff; text-decoration: none; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .s-link:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); transform: translateY(-3px); }

    </style>
</head>
<body>

    <div id="scene">
        <div class="machine-container">
            
            <!-- Header section -->
            <div class="m-header">
                <h1>Geva Kipper</h1>
                <div class="sub-heading">Currently crafting elegant engineering solutions at Google.</div>
                <div class="marquee-box">
                    <div class="marquee-text">WARNING: Website UI and inventory re-designed each day by AI. Always ever-changing.</div>
                </div>
            </div>

            <!-- Body Section -->
            <div class="m-body">
                <div class="m-left">
                    <!-- Glass Window Inventory Grid -->
                    <div class="m-window">
                        <div class="grid">
                            <!-- JS will inject slots here to keep main logic accessible -->
                        </div>
                    </div>
                    
                    <!-- PUSH Door Tray -->
                    <div class="tray-container">
                        <div class="push-door" id="push-door">PUSH</div>

                <div class="m-right">
                    <!-- LCD Screen -->

            <!-- Footer -->
            <div class="m-footer">
                <div class="engraved-text">Concept, architecture, and design autonomously generated by OpenAI o3-mini.</div>
            </div>

        </div>
    </div>

    <!-- Global Modal Overlay -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <div id="modal-body"></div>
        </div>
    </div>

                    <p>A fully localized Hebrew port of the popular catfishing.net trivia game. It generates daily Wikipedia trivia challenges infused with AI, enabling users to create rich, themed wordbook puzzles interactively.</p>
                    <div class="actions">
                        <a href="https://hatulbasak.geekip.dev" target="_blank" class="btn">Play Daily Puzzle</a>
                    </div>
                `
            },
            {
                id: 'meta',
                title: 'Meta Portfolio',
                cssClass: 'snack-blister',
                html: `
                    <h2>Meta Portfolio</h2>
                    <p>A self-referential digital artifact acknowledging the site you are currently navigating. You selected the element representing the digital vending machine containing the element itself.</p>
                    <div style="text-align: center; margin-top: 30px;">
                        <a href="https://geekip.dev" class="emoji-btn" style="filter: drop-shadow(0 0 10px #fff);">♾️</a>
                    </div>
                `
            },
            {
                id: 'social',
                title: 'Social Sampler',
                cssClass: 'snack-gummy',
                html: `
                    <h2>Digital Business Card</h2>
                    <p>Select a digital channel to review architectural commits, career history, or social connectivity.</p>
                    <div class="social-card">
                        <a href="https://github.com/gevak" target="_blank" class="s-link">
                            <span style="font-size:1.5rem">🐙</span> GitHub
                        </a>
                        <a href="https://linkedin.com/in/gevakip" target="_blank" class="s-link">
                            <span style="font-size:1.5rem">💼</span> LinkedIn
                        </a>
                        <a href="https://facebook.com/geva.kipper" target="_blank" class="s-link">
                            <span style="font-size:1.5rem">📘</span> Facebook
                        </a>
                    </div>
                `
            }
        ];

        /* ---------------- Machine Initialization ---------------- */
        const gridElement = document.querySelector('.grid');
        let currentActiveSnack = null;

        // Build the inventory
        projectBase.forEach((proj, index) => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.dataset.index = index;

            // Generate Gummy Candy inner divs specifically if it's the social tab
            let innerHTML = '';
            if(proj.cssClass === 'snack-gummy') {
                innerHTML = `<div class="candy c1"></div><div class="candy c2"></div><div class="candy c3"></div>`;
            }

            slot.innerHTML = `
                <div class="coil"></div>
                <div class="snack ${proj.cssClass}">${innerHTML}</div>
                <div class="tooltip">${proj.title}</div>
            `;
            
            slot.addEventListener('click', handleSnackPurchase);
            gridElement.appendChild(slot);
        });

        /* ---------------- Interactions & Animations ---------------- */
        function handleSnackPurchase(e) {
            const slot = e.currentTarget;
            const snack = slot.querySelector('.snack');
            const dataIndex = slot.dataset.index;
            
            // Prevent double dispensing
            if(snack.classList.contains('falling')) return;
            
            // Trigger drop
            snack.classList.add('falling');
            currentActiveSnack = snack;

            // Open push door slightly after snack starts dropping
            const door = document.getElementById('push-door');
            setTimeout(() => { door.classList.add('door-open'); }, 400);
            setTimeout(() => { door.classList.remove('door-open'); }, 900);

            // Unfurl modal after drop completes
            setTimeout(() => {
                openModal(projectBase[dataIndex]);
            }, 850);
        }

        const modalDiv = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');

        function openModal(projectData) {
            modalBody.innerHTML = projectData.html;
            modalDiv.classList.add('active');
        }

        function closeModal() {
            modalDiv.classList.remove('active');
            // Restock item invisibly so it's ready for next interaction
            if(currentActiveSnack) {
                setTimeout(() => {
                    currentActiveSnack.classList.remove('falling');
                    currentActiveSnack = null;
                }, 400); // Wait for transition fade
            }
        }

        /* ---------------- LCD Stopwatch Logic ---------------- */
        const lcdClock = document.getElementById('lcd-clock');
        const targetDate = new Date("2026-07-15T01:48:00Z").getTime();
        
        function updateClock() {
            const now = Date.now();
            const diff = Math.abs(targetDate - now); // Absolute elapsed tracking
            
            const seconds = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            const minutes = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
            const hours = Math.floor((diff / 1000 / 60 / 60)).toString().padStart(2, '0');
            
            lcdClock.textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        setInterval(updateClock, 1000);
        updateClock(); // Init immediately

    </script>
