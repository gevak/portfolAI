<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geva Kipper | Software Engineer</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables */
        :root {
            --clr-midnight: #020024;
            --clr-amethyst: #4b1248;
            --clr-cyan: #00d4ff;
            --clr-pink: #ff007f;
            --clr-green: #00ff7f;
            --clr-red: #ff3b3b;
            
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Global & Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: var(--clr-midnight);
            color: #ffffff;
            touch-action: none; /* Prevents scroll on drag */
        }

        /* Fluid Background Animation */
        #fluid-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1; overflow: hidden;
            background: var(--clr-midnight);
        }
        .blob {
            position: absolute; filter: blur(90px); border-radius: 50%;
            animation: moveBlobs 20s infinite alternate cubic-bezier(0.5, 0, 0.5, 1);
        }
        .blob1 { width: 60vw; height: 60vw; background: var(--clr-amethyst); top: -10%; left: -10%; }
        .blob2 { width: 50vw; height: 50vw; background: rgba(0, 212, 255, 0.4); bottom: -20%; right: -10%; animation-duration: 25s; animation-direction: alternate-reverse; }
        .blob3 { width: 40vw; height: 40vw; background: rgba(255, 0, 127, 0.2); top: 40%; left: 30%; animation-duration: 30s; }

        @keyframes moveBlobs {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10vw, 15vh) scale(1.2); }
        }

        /* Layout Structure */
        #app-container {
            display: flex; flex-direction: column; height: 100vh; position: relative;
        }

        /* Header */
        header {
            text-align: center; padding: 2vh 1rem; z-index: 10;
        }
        h1 {
            font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8), 0 0 20px rgba(0, 212, 255, 0.4);
            margin-bottom: 5px;
        }
        .subtitle { font-size: clamp(0.85rem, 1.5vw, 1rem); color: rgba(255,255,255,0.8); margin-bottom: 8px;}
        .typewriter-container {
            font-family: 'Fira Code', monospace;
            color: var(--clr-pink); font-size: clamp(0.7rem, 1.2vw, 0.85rem);
            min-height: 1.5em; display: flex; justify-content: center;
        }
        .cursor { display: inline-block; width: 8px; background: var(--clr-pink); margin-left: 2px; animation: blink 1s step-end infinite;}
        @keyframes blink { 50% { opacity: 0; } }

        /* Main Center & Deck */
        main {
            flex-grow: 1; position: relative; display: flex;
            justify-content: center; align-items: center; z-index: 5;
        }
        
        #card-stack {
            position: relative; width: 90vw; max-width: 380px; height: 62vh;
            perspective: 1000px;
        }

        #end-message {
            position: absolute; text-align: center; font-size: 1.5rem; font-weight: 600;
            color: var(--clr-cyan); opacity: 0; transition: opacity 1s ease;
            text-shadow: 0 0 10px var(--clr-cyan); pointer-events: none;
        }

        /* The Card */
        .card {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--glass-shadow); display: flex; flex-direction: column;
            overflow: hidden; cursor: grab; transition: transform 0.3s ease, opacity 0.3s ease;
            transform-origin: 50% 100%; user-select: none;
        }
        .card.dragging { transition: none; cursor: grabbing; }
        
        /* Card Internals */
        .card-header { height: 45%; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column;}
        .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; color: #fff;}
        .card-bio { font-size: 0.85rem; line-height: 1.4; color: rgba(255,255,255,0.75); margin-bottom: 15px; flex-grow: 1;}
        .card-links { display: flex; flex-wrap: wrap; gap: 8px; }
        
        .card-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 12px; border-radius: 20px; color: #fff; text-decoration: none;
            font-size: 0.75rem; font-weight: 600; transition: background 0.2s; pointer-events: auto;
            text-align: center; flex: 1 1 calc(50% - 8px); display: flex; justify-content: center; align-items: center;
        }

        /* Stamps */
        .stamp {
            position: absolute; top: 30px; font-weight: 800; font-size: 3rem;
            border-radius: 10px; padding: 5px 15px; opacity: 0; pointer-events: none; z-index: 100;
        }
        .stamp.pass { color: var(--clr-red); border: 4px solid var(--clr-red); right: 20px; transform: rotate(15deg); box-shadow: 0 0 10px rgba(255,59,59,0.5); text-shadow: 0 0 10px var(--clr-red);}
        .stamp.match { color: var(--clr-green); border: 4px solid var(--clr-green); left: 20px; transform: rotate(-15deg); box-shadow: 0 0 10px rgba(0,255,127,0.5); text-shadow: 0 0 10px var(--clr-green);}

        /* Pre-styled Card Backgrounds (CSS Art) */
        .bg-waveform { background: linear-gradient(0deg, #111, #222); display: flex; gap: 4px; align-items:flex-end; padding: 20px; width:100%; height:100%;}
        .bg-waveform div { width: 15px; background: var(--clr-cyan); border-radius: 4px 4px 0 0; animation: vol 1s infinite alternate; opacity: 0.8;}
        .bg-waveform div:nth-child(1) { height: 40%; animation-delay: 0.1s; } .bg-waveform div:nth-child(2) { height: 80%; animation-delay: 0.4s; } .bg-waveform div:nth-child(3) { height: 30%; animation-delay: 0.2s; } .bg-waveform div:nth-child(4) { height: 90%; animation-delay: 0.5s; } .bg-waveform div:nth-child(5) { height: 50%; animation-delay: 0.3s; }
        @keyframes vol { to { height: 10%; } }

        .bg-heatmap { background: radial-gradient(circle at 70% 30%, rgba(255, 0, 127, 0.5), transparent 60%), linear-gradient(to right, #000, #1a001a); position:relative; }
        .bg-heatmap::after { content:''; position:absolute; inset:0; background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,255,127,0.1) 10px, rgba(0,255,127,0.1) 12px); }

        .bg-geometry { background: #0f172a; position: relative;}
        .bg-geometry .shape1 { position: absolute; width:100px; height:100px; border: 2px solid var(--clr-cyan); clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); animation: spin 20s linear infinite;}
        .bg-geometry .shape2 { position: absolute; width:80px; height:80px; border: 2px solid var(--clr-pink); clip-path: polygon(0 0, 100% 0, 50% 100%); left: 60%; top: 40%;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .bg-jest { background: radial-gradient(circle, #2a0845, #6441A5); font-size: 4rem; display:flex; gap:10px; text-shadow: 0 0 20px #fff;}
        .bg-rhymes { background: linear-gradient(135deg, #e6e6e6 50%, #4285F4 50%); position: relative; }
        .bg-rhymes::after { content: '📰 🔁 🌐'; font-size: 2.5rem; position:absolute; filter: drop-shadow(2px 4px 6px black);}

        .bg-hatul { background: #111; font-size: 4rem; display: flex; justify-content: center; align-items: center;}
        .bg-hatul::before { content: ''; position:absolute; width:80px; height:80px; background:rgba(0, 212, 255, 0.4); border-radius:50%; filter: blur(5px);}

        .bg-meta { background: #000; box-shadow: inset 0 0 0 10px #1a1a1a, inset 0 0 0 20px #333, inset 0 0 0 30px #4d4d4d, inset 0 0 0 40px var(--clr-midnight); }
        .bg-meta::after { content:'{ ∞ }'; font-size:2rem; font-family:'Fira Code'; color:var(--clr-cyan); }
        
        .bg-profile { background: linear-gradient(145deg, #111, #000); display: flex; justify-content: center; align-items:center; }
        .bg-profile::after { content:'👨‍💻'; font-size: 5rem; opacity: 0.9; text-shadow: 0 0 20px #fff;}

        /* Matched Projects Tray */
        #matches-tray {
            position: absolute; right: 0; top: 15%; height: 70%; width: max(200px, 15vw);
            background: rgba(0,0,0,0.4); border-left: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); padding: 15px; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20; border-radius: 20px 0 0 20px; overflow-y: auto; pointer-events: none;
        }
        #matches-tray.active { transform: translateX(0); pointer-events: auto;}
        .tray-title { font-size: 0.9rem; font-weight: 700; color: var(--clr-green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; text-shadow: 0 0 5px rgba(0,255,127,0.5);}
        
        .match-item {
            background: var(--glass-bg); padding: 10px; border-radius: 12px;
            margin-bottom: 10px; border: 1px solid rgba(0,255,127,0.3);
            animation: slideIn 0.3s ease forwards; opacity: 0; transform: translateX(20px);
        }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
        .match-item h4 { font-size: 0.85rem; margin-bottom: 5px; color:#fff;}
        .match-item a { display: block; font-size: 0.7rem; color: var(--clr-cyan); text-decoration: none; margin-bottom: 3px; word-break: break-all;}
        .match-item a:hover { text-decoration: underline; }

        /* Footer */
        footer {
            height: 60px; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 2vw; border-top: 1px solid var(--glass-border); z-index: 10;
        }
        .footer-left { font-size: clamp(0.55rem, 1vw, 0.75rem); color: #aaa; text-transform: uppercase;}
        .footer-right { font-family: 'Orbitron', sans-serif; font-size: clamp(0.8rem, 1.5vw, 1.2rem); color: var(--clr-cyan); text-shadow: 0 0 8px rgba(0, 212, 255, 0.6);}

        /* Responsive constraints */
        @media (max-width: 768px) {
            #matches-tray { width: 150px; }
            .card-btn { flex: 1 1 100%; padding: 8px; }
        }
    </style>
</head>
<body>

    <div id="fluid-bg">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div id="app-container">
        <!-- Header -->
        <header>
            <h1>Geva Kipper</h1>
            <div class="subtitle">Software Engineer currently building and innovating at Google.</div>
            <div class="typewriter-container">
                <span id="typewriter-text"></span><span class="cursor"></span>
            </div>
        </header>

        <!-- Matched Tray -->
        <aside id="matches-tray">
            <div class="tray-title">Matched Projects</div>
            <div id="match-list"></div>
        </aside>

        <!-- Core Mechanics (Card Stack) -->
        <main>
            <div id="card-stack"></div>
            <div id="end-message">No more profiles in your area<br><br><span style="color:#fff; font-size:1rem;">Check your Matches!</span></div>
        </main>

        <!-- Temporal Footer -->
        <footer>
            <div class="footer-left">Design engineered & hallucinated by Large Language Model</div>
            <div class="footer-right" id="stopwatch">00:00:00</div>
        </footer>
    </div>

    <script>
        /* --- Data Configuration --- */
        const cardData = [
            {
                id: "glglstats", title: "GlglStats", bgClass: "bg-waveform", bgContent: `<div></div><div></div><div></div><div></div><div></div>`,
                bio: "Python project measuring repetitiveness in Israeli pop-charts using LZ77 compression and pattern data visualizations.",
                links: [
                    { text: "Live Site", url: "https://glglstats.geekip.dev" },
                    { text: "PyData TLV Presentation", url: "https://www.youtube.com/watch?v=jrKAtOsj1Lo" }
                ]
            },
            {
                id: "ahuzat", title: "Ahuzat Dibuk", bgClass: "bg-heatmap", bgContent: ``,
                bio: "Python scraping & visualization tool collecting Tel-Aviv parking lot occupancy to generate real-time rescue heatmaps for residents.",
                links: [
                    { text: "Channel 13 News", url: "https://13tv.co.il/item/news/domestic/internal/parking-902956407/" },
                    { text: "Mako Nexter", url: "https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm" },
                    { text: "Secret Tel-Aviv FB", url: "https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/" }
                ]
            },
            {
                id: "partorient", title: "2D Part Orienting", bgClass: "bg-geometry", bgContent: `<div class="shape1"></div><div class="shape2"></div>`,
                bio: "Robust C++ implementation in an open-source comp-geo library featuring an algorithm to construct an efficient 'push plan' for polygon orientation.",
                links: [
                    { text: "Info & Code", url: "https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/" }
                ]
            },
            {
                id: "jest", title: "The Turing Jest", bgClass: "bg-jest", bgContent: `🤖 🎭`,
                bio: "An LMSYS-like arena where top-tier LLMs compete at generating and explaining puns, systematically rated by human judges.",
                links: [
                    { text: "Enter Arena", url: "https://jest.geekip.dev" }
                ]
            },
            {
                id: "rhymes", title: "Rhymes of Israel", bgClass: "bg-rhymes", bgContent: ``,
                bio: "Stylized Chrome extension utilizing an LLM to dynamically rewrite actual Israeli news site headlines into comedic rhymes.",
                links: [
                    { text: "Install Extension", url: "https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb" }
                ]
            },
            {
                id: "hatul", title: "Hatul Basak", bgClass: "bg-hatul", bgContent: `🐈`,
                bio: "Hebrew port of catfishing.net: A Wikipedia-based Trivia game with daily AI challenges and a community puzzle-builder engine.",
                links: [
                    { text: "Play & Create", url: "https://hatulbasak.geekip.dev" }
                ]
            },
            {
                id: "meta", title: "The Meta Portfolio", bgClass: "bg-meta", bgContent: ``,
                bio: "To understand recursion, you must first understand recursion. Match on the portfolio project inside the portfolio project itself.",
                links: [
                    { text: "Enter the Matrix", url: "https://geekip.dev" }
                ]
            },
            {
                id: "dev", title: "The Developer Profile", bgClass: "bg-profile", bgContent: ``,
                bio: "The ultimate hire. You've seen the specs, now make the match. Swipe right to lock in the ultimate candidate.",
                links: [
                    { text: "GitHub", url: "https://github.com/gevak" },
                    { text: "LinkedIn", url: "https://linkedin.com/in/gevakip" },
                    { text: "Facebook", url: "https://facebook.com/geva.kipper" }
                ]
            }
        ];

        /* --- Initialization Variables --- */
        const stackDOM = document.getElementById('card-stack');
        const trayDOM = document.getElementById('matches-tray');
        const matchListDOM = document.getElementById('match-list');
        const endMessage = document.getElementById('end-message');
        
        let isDragging = false;
        let startX = 0, startY = 0;
        let currentX = 0, currentY = 0;
        let topCardDOM = null;
        let currentCardIndex = 0;

        /* --- Render Engine --- */
        function initCards() {
            // Reverse so card 1 is rendered last (top of z-index stack naturally, or we force z-index)
            // We'll append normally and use Z-index and scaling to create depth.
            [...cardData].reverse().forEach((data, index) => {
                const actualIndex = cardData.length - 1 - index;
                
                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                cardEl.dataset.id = data.id;
                
                // Depth calculations
                const zIndex = cardData.length - actualIndex;
                const scale = 1 - (actualIndex * 0.04);
                const translateY = actualIndex * 12;
                
                cardEl.style.zIndex = zIndex;
                cardEl.style.transform = `translateY(${translateY}px) scale(${scale})`;
                if(actualIndex > 3) cardEl.style.opacity = 0; // Hide deep cards for perf
                
                // Generate Body Links
                let linksHTML = data.links.map(l => `<a href="${l.url}" target="_blank" class="card-btn" onclick="event.stopPropagation()">${l.text}</a>`).join('');

                cardEl.innerHTML = `
                    <div class="stamp pass">PASS</div>
                    <div class="stamp match">MATCH</div>
                    <div class="card-header ${data.bgClass}">${data.bgContent}</div>
                    <div class="card-body">
                        <div class="card-title">${data.title}</div>
                        <div class="card-bio">${data.bio}</div>
                        <div class="card-links">${linksHTML}</div>
                    </div>
                `;
                
                stackDOM.prepend(cardEl); // Prepend to stack bottom to top mentally
            });
            attachEvents();
        }

        /* --- Interaction Engine --- */
        function attachEvents() {
            const cards = stackDOM.querySelectorAll('.card');
            if(cards.length === 0) {
                endMessage.style.opacity = 1;
                return;
            }
            
            topCardDOM = stackDOM.lastElementChild; // The visual top card due to prepend
            
            // Pointer events for unified mouse/touch logic
            topCardDOM.addEventListener('pointerdown', handleDown);
            window.addEventListener('pointermove', handleMove);
            window.addEventListener('pointerup', handleUp);
            window.addEventListener('pointercancel', handleUp);
        }

        function detachEvents() {
            if(topCardDOM) topCardDOM.removeEventListener('pointerdown', handleDown);
            window.removeEventListener('pointermove', handleMove);
            window.removeEventListener('pointerup', handleUp);
            window.removeEventListener('pointercancel', handleUp);
        }

        function handleDown(e) {
            if(e.target.tagName.toLowerCase() === 'a') return; // Let links click natively
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            topCardDOM.classList.add('dragging');
        }

        function handleMove(e) {
            if (!isDragging || !topCardDOM) return;
            e.preventDefault(); // Stop scrolling on mobile
            
            currentX = e.clientX;
            currentY = e.clientY;
            const deltaX = currentX - startX;
            const deltaY = currentY - startY;
            
            const rotate = deltaX * 0.05;
            topCardDOM.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(${rotate}deg)`;
            
            // Stamp Opacity Maths
            const passStamp = topCardDOM.querySelector('.stamp.pass');
            const matchStamp = topCardDOM.querySelector('.stamp.match');
            
            if (deltaX < 0) {
                passStamp.style.opacity = Math.min(Math.abs(deltaX) / 100, 1);
                matchStamp.style.opacity = 0;
            } else {
                matchStamp.style.opacity = Math.min(deltaX / 100, 1);
                passStamp.style.opacity = 0;
            }
        }

        function handleUp(e) {
            if (!isDragging || !topCardDOM) return;
            isDragging = false;
            topCardDOM.classList.remove('dragging');
            
            const deltaX = currentX - startX;
            const threshold = window.innerWidth * 0.25; // 25% of screen width
            
            if (deltaX > threshold) {
                swipeOut('right', deltaX);
            } else if (deltaX < -threshold) {
                swipeOut('left', deltaX);
            } else {
                // Reset card
                topCardDOM.style.transform = 'translate(0px, 0px) scale(1)';
                topCardDOM.querySelector('.stamp.pass').style.opacity = 0;
                topCardDOM.querySelector('.stamp.match').style.opacity = 0;
            }
        }

        function swipeOut(direction, velocity) {
            detachEvents();
            const offScreenX = direction === 'right' ? window.innerWidth : -window.innerWidth;
            const rotate = direction === 'right' ? 30 : -30;
            
            topCardDOM.style.transition = 'transform 0.4s ease-out';
            topCardDOM.style.transform = `translate(${offScreenX}px, 50px) rotate(${rotate}deg)`;
            
            if (direction === 'right') processMatch(cardData[currentCardIndex]);

            setTimeout(() => {
                topCardDOM.remove();
                currentCardIndex++;
                updateDeck();
                attachEvents();
            }, 300);
        }

        function updateDeck() {
            const remaining = stackDOM.querySelectorAll('.card');
            Array.from(remaining).reverse().forEach((card, index) => {
                const zIndex = remaining.length - index;
                const scale = 1 - (index * 0.04);
                const translateY = index * 12;
                
                card.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
                card.style.zIndex = zIndex;
                card.style.transform = `translateY(${translateY}px) scale(${scale})`;
                card.style.opacity = index < 4 ? 1 : 0;
            });
        }

        /* --- Match Processing --- */
        function processMatch(data) {
            trayDOM.classList.add('active');
            const item = document.createElement('div');
            item.className = 'match-item';
            
            let linksHTML = data.links.map(l => `<a href="${l.url}" target="_blank">↗ ${l.text}</a>`).join('');
            
            item.innerHTML = `<h4>${data.title}</h4>${linksHTML}`;
            matchListDOM.prepend(item); // Newest matches on top
        }

        /* --- Typewriter Effect --- */
        const typeText = "Warning: This website is re-designed each day by AI and is thus in a state of ever-changing mutation.";
        const typeDOM = document.getElementById('typewriter-text');
        let typeIndex = 0;
        
        function typeWriter() {
            if (typeIndex < typeText.length) {
                typeDOM.innerHTML += typeText.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeWriter, 40 + Math.random() * 50); // Natural pacing
            }
        }

        /* --- Chronological Stopwatch Element --- */
        // Calculate continuously elapsed time relative to the target epoch: 2026-07-12 02:03:46
        const clockDOM = document.getElementById('stopwatch');
        const targetDate = new Date('2026-07-12T02:03:46Z').getTime();

        function updateClock() {
            const now = Date.now();
            // Absolute difference creates a functional clock whether viewed pre or post target date securely.
            const diffMs = Math.abs(now - targetDate); 
            
            const totalSeconds = Math.floor(diffMs / 1000);
            const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            
            // Format strictly as HH:MM:SS
            clockDOM.textContent = `${hours}:${minutes}:${seconds}`;
        }

        /* --- Boot Sequence --- */
        window.addEventListener('load', () => {
            initCards();
            setTimeout(typeWriter, 800);
            setInterval(updateClock, 1000);
            updateClock();
        });

    </script>

        });
    </script>

</body>
