<head>
    <meta charset="UTF-8">

    <title>Geva Kipper - Interactive Environment</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&family=VT323&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Palette & Design Tokens */
            --bg-canvas: #f2f2eb;
            --grid-color: #dfdfd7;
            --sys-black: #050505;
            --sys-white: #ffffff;
            --sys-gray: #c0c0c0;
            --sys-dark-gray: #808080;
            --sys-blue: #000080;
            --sys-accent: #008080;
            
            --font-pixel: 'VT323', monospace;
            --font-mono: 'IBM Plex Mono', monospace;
            
            --shadow: 4px 4px 0px 0px var(--sys-black);
            --border-thick: 2px solid var(--sys-black);
            --border-thin: 1px solid var(--sys-black);
            
            --menu-height: 40px;
            --ticker-height: 25px;
            --taskbar-height: 45px;
        }

        /* Global Reset */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; /* Prevent scrolling, single viewport application */
            background-color: var(--bg-canvas);
            font-family: var(--font-mono);
            color: var(--sys-black);
            user-select: none;
        }

        /* Retro Canvas Grid Pattern */
        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 8px 8px;
        }

        /* ----- HEADER & TICKER ----- */
        #header {
            position: absolute; top: 0; left: 0; width: 100%;
            z-index: 10000;
        }
        .menu-bar {
            height: var(--menu-height);
            background-color: var(--sys-black);
            color: var(--sys-white);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border-bottom: var(--border-thick);
        }
        .menu-bar .brand {
            font-family: var(--font-pixel);
            font-size: 26px; font-weight: bold; letter-spacing: 1px;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.2);
        }
        .menu-bar .tagline {
            font-size: 14px;
            text-align: right;
            opacity: 0.9;
            flex-grow: 1; margin-left: 20px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .ticker {
            height: var(--ticker-height);
            background-color: var(--sys-black);
            color: var(--sys-white);
            border-bottom: var(--border-thick);
            overflow: hidden; white-space: nowrap;
            display: flex; align-items: center;
        }
        .ticker-text {
            font-family: var(--font-pixel);
            font-size: 18px; letter-spacing: 1px;
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-100%); }
        }

        /* ----- DESKTOP & ICONS ----- */
        #desktop {
            position: relative;
            width: 100%; 
            height: calc(100vh - var(--menu-height) - var(--ticker-height) - var(--taskbar-height));
            top: calc(var(--menu-height) + var(--ticker-height));
            overflow: hidden;
        }

        .desktop-icon {
            position: absolute; width: 80px;
            display: flex; flex-direction: column; align-items: center;
            text-align: center; cursor: pointer;
            padding: 5px; border: 1px dashed transparent;
        }
        .desktop-icon:hover, .desktop-icon.selected {
            border: 1px dotted var(--sys-black);
            background-color: rgba(0,0,0,0.05);
        }
        .icon-graphic {
            font-size: 40px; line-height: 1; margin-bottom: 5px;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,1));
        }
        .icon-title {
            font-family: var(--font-pixel);
            font-size: 16px; line-height: 1.1;
            background: var(--bg-canvas);
            padding: 2px;
        }

        /* ----- WINDOWS SYSTEM ----- */
        .window {
            position: absolute; display: none;
            background-color: var(--sys-gray);
            border: var(--border-thick);
            box-shadow: var(--shadow);
            width: 450px; max-width: 90vw;
            flex-direction: column;
        }
        .window.active { display: flex; }
        
        .title-bar {
            background-color: var(--sys-black); color: var(--sys-white);
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 8px; cursor: move;
            border-bottom: var(--border-thick);
        }
        .title-bar-text {
            font-family: var(--font-pixel); font-size: 20px; text-transform: uppercase;
        }
        .close-btn {
            background-color: var(--sys-gray); border: var(--border-thick);
            color: var(--sys-black); cursor: pointer;
            font-family: var(--font-mono); font-weight: bold;
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            box-shadow: 2px 2px 0px 0px var(--sys-black);
            padding-bottom: 2px;
        }
        .close-btn:active {
            box-shadow: 0px 0px 0px 0px var(--sys-black); transform: translate(2px, 2px);
        }
        
        .window-content {
            padding: 20px; overflow-y: auto; max-height: 60vh;
            font-size: 14px; line-height: 1.5; color: var(--sys-black);
            user-select: text; /* Allow text selection inside windows */
        }
        .window-content p { margin-top: 0; }

        /* Generic UI Controls inside windows */
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        
        a.retro-btn {
            text-decoration: none; display: inline-block;
            background-color: var(--bg-canvas); color: var(--sys-black);
            border: var(--border-thick); box-shadow: var(--shadow);
            padding: 8px 16px; font-weight: bold; cursor: pointer;
            font-family: var(--font-pixel); font-size: 18px; text-transform: uppercase;
            transition: all 0.05s linear;
        }
        a.retro-btn:active {
            box-shadow: 0 0 0 transparent; transform: translate(4px, 4px);
        }
        
        a.classic-link { color: var(--sys-blue); text-decoration: underline; cursor: pointer; }
        a.classic-link:hover { color: var(--sys-accent); }

        /* Window-Specific Styling Hacks */
        .win-dibuk-content {
            background: linear-gradient(90deg, transparent 49%, rgba(0,0,0,0.1) 49%, rgba(0,0,0,0.1) 51%, transparent 51%), 
                        linear-gradient(0deg, transparent 49%, rgba(0,0,0,0.1) 49%, rgba(0,0,0,0.1) 51%, transparent 51%);
            background-size: 20px 20px;
            padding: 15px; border: 1px inset var(--sys-dark-gray); background-color: #fff;
        }
        .win-rhymes-installer {
            background-color: var(--sys-gray);
            border-top: 2px solid #fff; border-left: 2px solid #fff;
            border-bottom: 2px solid var(--sys-dark-gray); border-right: 2px solid var(--sys-dark-gray);
            padding: 20px; display: flex; align-items: center; gap: 15px;
        }
        .network-grid {
            display: flex; justify-content: space-around; padding: 20px 0;
        }
        .network-icon {
            display: flex; flex-direction: column; align-items: center; text-decoration: none; color: black;
            font-family: var(--font-pixel); font-size: 16px;
        }
        .network-icon svg { width: 48px; height: 48px; margin-bottom: 10px; filter: drop-shadow(4px 4px 0px black); }
        .network-icon:hover { transform: scale(1.05); }

        /* ----- FOOTER / TASKBAR ----- */
        #taskbar {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: var(--taskbar-height);
            background-color: var(--sys-gray); border-top: var(--border-thick);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; z-index: 10000;
        }
        .taskbar-left {
            font-weight: bold; font-size: 14px;
        }
        .taskbar-right {
            border-top: 2px solid var(--sys-dark-gray); border-left: 2px solid var(--sys-dark-gray);
            border-bottom: 2px solid var(--sys-white); border-right: 2px solid var(--sys-white);
            background-color: #000; color: #0f0;
            padding: 4px 12px; font-family: var(--font-mono); font-size: 16px; font-weight: bold;
            box-shadow: inset 2px 2px 0px #000; letter-spacing: 2px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .menu-bar .tagline { display: none; }
            .taskbar-left { font-size: 10px; }
            .window { width: 90vw !important; }
        }
    </style>

        // --- Initialization ---
        const desktop = document.getElementById('desktop');
        const winContainer = document.getElementById('windows-container');
        let globalZIndex = 100; // Starting z-index for windows

        // Build UI Elements
        systemFiles.forEach(file => {
            // 1. Create Desktop Icon
            const icon = document.createElement('div');
            icon.className = 'desktop-icon';
            icon.style.left = file.x + '%';
            icon.style.top = file.y + '%';
            icon.innerHTML = `<div class="icon-graphic">${file.icon}</div><div class="icon-title">${file.title}</div>`;
            
            // Icon Selection Interaction
            icon.addEventListener('mousedown', (e) => {
                document.querySelectorAll('.desktop-icon').forEach(el => el.classList.remove('selected'));
                icon.classList.add('selected');
                e.stopPropagation();
            });

            // Double Click to Open Window
            icon.addEventListener('dblclick', () => {
                openWindow(file.id);
            });
            desktop.appendChild(icon);

            // 2. Create Window Element (hidden by default)
            const win = document.createElement('div');
            win.id = 'win-' + file.id;
            win.className = 'window';
            
            // Center calculation for spawn
            const spawnX = Math.max(10, Math.floor(Math.random() * (window.innerWidth - 500)));
            const spawnY = Math.max(80, Math.floor(Math.random() * (window.innerHeight - 400)));
            win.style.left = spawnX + 'px';
            win.style.top = spawnY + 'px';

            win.innerHTML = `
                <div class="title-bar">
                    <div class="title-bar-text">${file.title}</div>
                    <button class="close-btn" onclick="closeWindow('${file.id}')">X</button>
                </div>
                <div class="window-content">${file.content}</div>
            `;
            
            // Bring to front on click
            win.addEventListener('mousedown', () => bringToFront(win));
            winContainer.appendChild(win);
        });

        // Deselect icons when clicking empty desktop space
        document.body.addEventListener('mousedown', () => {
            document.querySelectorAll('.desktop-icon').forEach(el => el.classList.remove('selected'));
        });

        // --- Window Management Logic ---
        function openWindow(id) {
            const win = document.getElementById('win-' + id);
            win.classList.add('active');
            bringToFront(win);
        }

        function closeWindow(id) {
            const win = document.getElementById('win-' + id);
            win.classList.remove('active');
        }

        function bringToFront(win) {
            globalZIndex++;
            win.style.zIndex = globalZIndex;
        }

        // --- Window Dragging Logic ---
        let isDragging = false;
        let activeWindow = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        document.addEventListener('mousedown', function(e) {
            const titleBar = e.target.closest('.title-bar');
            if (titleBar && !e.target.closest('.close-btn')) {
                activeWindow = titleBar.parentElement;
                isDragging = true;
                bringToFront(activeWindow);
                
                // Calculate position of mouse inside the window
                const rect = activeWindow.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;
            }
        });

        document.addEventListener('mousemove', function(e) {
            if (isDragging && activeWindow) {
                let newX = e.clientX - dragOffsetX;
                let newY = e.clientY - dragOffsetY;
                
                // Keep window title bar somewhat within viewports
                newY = Math.max(65, newY); // Don't drag under header
                
                activeWindow.style.left = newX + 'px';
                activeWindow.style.top = newY + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            activeWindow = null;
        });

        // --- Real-time Stopwatch Logic ---
        const clockDisplay = document.getElementById('stopwatch');
        // Baseline timestamp defined in spec
        const baselineTime = new Date('2026-04-28T02:14:35').getTime();

        function updateClock() {
            const now = Date.now();
            let diffTotalMs = now - baselineTime;
            
            // Handle logical formatting depending if view date is before or after baseline
            const sign = diffTotalMs < 0 ? "T-" : "";
            const absMs = Math.abs(diffTotalMs);
            
            const totalSecs = Math.floor(absMs / 1000);
            
            const hours = String(Math.floor(totalSecs / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((totalSecs % 3600) / 60)).padStart(2, '0');
            const seconds = String(totalSecs % 60).padStart(2, '0');
            
            clockDisplay.innerText = `${sign}${hours}:${minutes}:${seconds}`;
        }

        // Update clock every second
        setInterval(updateClock, 1000);
        updateClock(); // Initial paint
