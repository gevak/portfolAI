<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper | Architecture Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;700;900&family=Permanent+Marker&display=swap');

        :root {
            --ambient-hue: 0;
            --z-spacing: 2500px;
            --wireframe-op: 1;
            --concrete-op: 0;
            --theme-color: hsl(var(--ambient-hue), 80%, 60%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* Fallback height, dynamically updated by JS to allow scrolling */
            height: 100vh; 
            background: #020205;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            overflow-y: scroll;
            /* Hide scrollbar */
            scrollbar-width: none;
        }
        body::-webkit-scrollbar { display: none; }

        /* Environmental Backgrounds */
        .environment {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: -2;
            transition: opacity 0.1s linear;
        }
        
        #env-wireframe {
            opacity: var(--wireframe-op);
            background-color: #050a1a;
            background-image: 
                linear-gradient(rgba(45, 115, 255, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45, 115, 255, 0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            filter: hue-rotate(calc(var(--ambient-hue) * 1deg));
        }
        #env-wireframe::after {
            content:''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at center, transparent 20%, #050a1a 90%);
        }

        #env-concrete {
            opacity: var(--concrete-op);
            background-color: #111;
            /* Simulated concrete texture using noise filter */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(200,200,200,0.05) 0%, rgba(0,0,0,0.8) 100%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        /* 3D Camera & Scene */
        #viewport {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            perspective: 800px; /* Force profound 3D depth */
            perspective-origin: center center;
            overflow: hidden;
            pointer-events: none; /* Let clicks pass to active layers via JS logic or proper z-indexing */
            z-index: 1;
        }

        #scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .chamber {
            position: absolute; top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            /* Center chamber strictly around origin */
            margin-top: -50vh; margin-left: -50vw; 
            display: flex; justify-content: center; align-items: center;
            transform-style: preserve-3d;
            pointer-events: auto; /* Re-enable clicks for items in chambers */
        }

        .doorway-frame {
            position: absolute;
            width: 90vw; height: 90vh;
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 50px rgba(0,0,0,0.8) inset, 0 0 100px var(--theme-color);
            transform: translateZ(-100px); /* Push wall slightly back from content */
            display: flex; justify-content: center; align-items: center;
            transition: all 0.5s ease;
        }

        .display-slab {
            position: relative;
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 3rem;
            max-width: 800px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 20px rgba(255,255,255,0.05) inset;
            transform: translateZ(0); /* Sits exactly on chamber's Z */
            transition: opacity 0.3s;
        }

        /* Hero Specifics */
        .glass-monolith {
            padding: 4rem;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            border-top: 1px solid rgba(255,255,255,0.5);
            border-left: 1px solid rgba(255,255,255,0.5);
            border-radius: 20px;
        }
        
        .name-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 20px var(--theme-color);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.2rem; font-weight: 300; color: #ccc; margin-bottom: 2rem;
            line-height: 1.6;
        }

        .typewriter-container {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem; color: #888;
            height: 2em;
            position: relative;
        }

        .glitch {
            position: relative;
            color: #fff;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
        }
        .glitch::before {
            left: 2px; text-shadow: -2px 0 red; clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px; text-shadow: -2px 0 blue; clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 44px, 0); }
            20% { clip: rect(80px, 9999px, 94px, 0); }
            40% { clip: rect(32px, 9999px, 14px, 0); }
            60% { clip: rect(98px, 9999px, 55px, 0); }
            80% { clip: rect(15px, 9999px, 72px, 0); }
            100% { clip: rect(33px, 9999px, 88px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(3px, 9999px, 20px, 0); }
            40% { clip: rect(44px, 9999px, 80px, 0); }
            60% { clip: rect(99px, 9999px, 15px, 0); }
            80% { clip: rect(27px, 9999px, 52px, 0); }
            100% { clip: rect(12px, 9999px, 34px, 0); }
        }

        /* UI Elements & Links */
        h2 { font-size: 2.5rem; margin-bottom: 1rem; color: #fff; }
        p.desc { font-size: 1.1rem; color: #bbb; line-height: 1.6; margin-bottom: 2rem;}
        
        .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        a.btn {
            display: inline-block; padding: 0.8rem 1.5rem;
            color: #fff; text-decoration: none; font-size: 0.9rem; font-weight: 600;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
            position: relative; overflow: hidden;
            backdrop-filter: blur(5px);
        }
        a.btn:hover {
            background: #fff; color: #000; box-shadow: 0 0 20px var(--theme-color);
        }

        /* Chamber Specific Aesthetics */
        .c1-walls { background: radial-gradient(circle, rgba(0, 255, 136, 0.05), transparent); }
        .audio-bars { position: absolute; inset: 0; pointer-events: none; display: flex; align-items: flex-end; opacity: 0.2; }
        .bar { flex: 1; background: #00ff88; margin: 0 2px; animation: bounce 1s infinite alternate ease-in-out; }
        @keyframes bounce { 0% { height: 10%; } 100% { height: 60%; } }

        .c2-walls {
            background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(1000px) rotateX(60deg) scale(2);
            opacity: 0.3; pointer-events:none; position: absolute; width:100%; height:100%;
        }
        .heatmap-glow {
            position: absolute; width: 100%; height: 100%; top:0; left:0;
            background: radial-gradient(circle at 50% 80%, rgba(255, 50, 0, 0.4), transparent 50%);
            animation: pulse 4s infinite alternate; pointer-events: none; z-index: -1;
        }

        .c3-poly {
            position: absolute; width: 200px; height: 200px; right: -50px; top: -50px;
            background: rgba(0, 150, 255, 0.2); border: 2px solid #0096ff;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
            animation: push-plan 6s infinite ease-in-out;
        }
        @keyframes push-plan {
            0% { transform: translate(50px, -50px) rotate(0deg); }
            50% { transform: translate(-20px, 20px) rotate(108deg); border-right: 4px solid #fff; }
            100% { transform: translate(50px, -50px) rotate(360deg); }
        }

        .c4-colosseum { display: flex; justify-content: space-between; width: 100%; gap: 1rem; margin-bottom: 2rem;}
        .c4-chat { flex: 1; background: rgba(0,0,0,0.5); padding: 1rem; border: 1px solid #f0f; border-radius: 8px; font-size: 0.8rem; text-align:left;}
        .c4-chat:nth-child(2) { border-color: #0ff; text-align: right;}
        .masks { font-size: 3rem; position: absolute; top: -40px; }

        .c5-rhymes .desc { font-family: 'Cinzel', serif; }
        .c5-rhymes h2 { font-family: 'Permanent Marker', cursive; color: #ffeb3b; transform: rotate(-2deg);}

        .c6-nodes {
            position: absolute; inset: 0; pointer-events: none; opacity: 0.15;
            background: radial-gradient(circle at 30% 40%, #fff 2px, transparent 3px),
                        radial-gradient(circle at 70% 60%, #fff 2px, transparent 3px);
            background-size: 100px 100px;
        }
        .c6-nodes::before {
            content:''; position:absolute; top:40%; left:30%; width:40%; height:2px; background:#fff; transform:rotate(20deg);
        }

        .c7-meta {
            animation: infinite-droste 10s linear infinite;
            box-shadow: 0 0 0 20px rgba(255,255,255,0.05), 0 0 0 40px rgba(255,255,255,0.02);
        }
        @keyframes infinite-droste {
            0% { transform: scale(1); }
            100% { transform: scale(0.9); }
        }

        .c8-term { font-family: 'IBM Plex Mono', monospace; background: rgba(0,20,0,0.8); border: 1px solid #0f0; text-align: left; }
        .c8-term h2 { color: #0f0; font-family: 'IBM Plex Mono', monospace; }
        .c8-term .prompt { color: #0f0; margin-bottom: 0.5rem; }
        .c8-term .btn { background: transparent; border-color: #0f0; color: #0f0;}
        .c8-term .btn:hover { background: #0f0; color: #000; }

        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

        /* HUD Footer */
        #hud {
            position: fixed; bottom: 0; left: 0; width: 100vw;
            padding: 1rem 2rem;
            background: rgba(2, 2, 5, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: #888;
        }
        #hud .credits { text-transform: uppercase; letter-spacing: 1px; }
        #hud .timer { color: #fff; font-size: 1rem; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        @media (max-width: 600px) {
            #hud { flex-direction: column; gap: 0.5rem; text-align: center; }
            .c4-colosseum { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Environment Backgrounds -->
    <div id="env-wireframe" class="environment"></div>
    <div id="env-concrete" class="environment"></div>

    <!-- 3D Viewport -->
    <div id="viewport">
        <div id="scene">
            <!-- Chambers generated via JS -->
        </div>
    </div>

    <!-- HUD Footer -->
    <footer id="hud">
        <div class="credits">Architecture and design dynamically generated by an AI model.</div>
        <div class="timer" id="cyber-timer">00:00:00</div>
    </footer>

    <script>
        // Data Structure for Chambers
        const chambersData = [
            {
                id: 'c0',
                html: `
                    <div class="doorway-frame" style="border-radius: 20px;"></div>
                    <div class="display-slab glass-monolith">
                        <div class="name-title">Geva Kipper</div>
                        <div class="subtitle">Software Engineer currently engineering scalable solutions and shaping the ecosystem at Google.</div>
                        <div class="typewriter-container">
                            <span id="typewriter" class="glitch" data-text=""></span><span id="cursor">_</span>
                        </div>
                    </div>
                `
            },
            {
                id: 'c1',
                html: `
                    <div class="doorway-frame c1-walls">
                        <div class="audio-bars">
                            ${Array(20).fill(0).map(() => `<div class="bar" style="animation-duration: ${0.5 + Math.random()}s; animation-delay: ${Math.random()}s"></div>`).join('')}
                        </div>
                    </div>
                    <div class="display-slab">
                        <h2>GlglStats</h2>
                        <p class="desc">A Python pop-chart repetitiveness analysis project. Visualizing LZ77 compression patterns in modern audio landscapes.</p>
                        <div class="btn-group">
                            <a href="https://glglstats.geekip.dev" target="_blank" class="btn">Launch Portal</a>
                            <a href="https://www.youtube.com/watch?v=jrKAtOsj1Lo" target="_blank" class="btn">View PyData Presentation</a>
                        </div>
                    </div>
                `
            },
            {
                id: 'c2',
                html: `
                    <div class="c2-walls"></div>
                    <div class="doorway-frame" style="border-color: rgba(255,50,0,0.3);"></div>
                    <div class="display-slab" style="background: rgba(10,5,0,0.8);">
                        <div class="heatmap-glow"></div>
                        <h2 style="color: #ff5500;">Ahuzat Dibuk</h2>
                        <p class="desc">Dynamic animated heatmaps modeling Tel Aviv parking occupancy across sprawling city grids.</p>
                        <div class="btn-group">
                            <a href="https://13tv.co.il/item/news/domestic/internal/parking-902956407/" target="_blank" class="btn" style="border-color:#ff5500;">Channel 13</a>
                            <a href="https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm" target="_blank" class="btn" style="border-color:#ff5500;">Mako</a>
                            <a href="https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/" target="_blank" class="btn" style="border-color:#ff5500;">Secret TLV</a>
                        </div>
                    </div>
                `
            },
            {
                id: 'c3',
                html: `
                    <div class="doorway-frame" style="transform: translateZ(-100px) rotate(5deg);"></div>
                    <div class="doorway-frame" style="transform: translateZ(-200px) rotate(-5deg);"></div>
                    <div class="display-slab" style="overflow: hidden;">
                        <div class="c3-poly"></div>
                        <h2>2D Part Orienting</h2>
                        <p class="desc">Computational geometry execution. Loop animation of a polygon aligning against virtual planes via push-plan algorithms.</p>
                        <div class="btn-group">
                            <a href="https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/" target="_blank" class="btn">C++ Source Code</a>
                        </div>
                    </div>
                `
            },
            {
                id: 'c4',
                html: `
                    <div class="doorway-frame" style="border-radius: 50% 50% 0 0; border-color: #f0f; box-shadow: 0 0 40px #f0f, 0 0 20px #0ff inset;"></div>
                    <div class="display-slab">
                        <div class="masks">🎭</div>
                        <h2 style="text-shadow: 0 0 10px #f0f;">The Turing Jest</h2>
                        <div class="c4-colosseum">
                            <div class="c4-chat">Model A: "Why did the AI cross the road?"</div>
                            <div class="c4-chat">Model B: "To optimize the pedestrian pathway."</div>
                        </div>
                        <p class="desc">An LMSYS-like arena pitting AI humor against human judgment in a neon-lit colosseum.</p>
                        <div class="btn-group">
                            <a href="https://jest.geekip.dev" target="_blank" class="btn" style="background:#fff; color:#000;">[ EXIT ]</a>
                        </div>
                    </div>
                `
            },
            {
                id: 'c5',
                html: `
                    <div class="doorway-frame" style="background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px);"></div>
                    <div class="display-slab c5-rhymes">
                        <h2>Rhymes of Israel</h2>
                        <p class="desc">A chaotic elegant clash of journalistic reporting and playful high school yearbook rhymes seamlessly integrated into your browsing experience.</p>
                        <div class="btn-group">
                            <a href="https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb" target="_blank" class="btn" style="border-radius: 50px;">Chrome Web Store</a>
                        </div>
                    </div>
                `
            },
            {
                id: 'c6',
                html: `
                    <div class="doorway-frame">
                        <div class="c6-nodes"></div>
                    </div>
                    <div class="display-slab">
                        <h2>Hatul Basak</h2>
                        <p class="desc">Navigate a sprawling web of Wikipedia hyperlinks interconnecting to orchestrate an AI-generated trivia labyrinth.</p>
                        <div class="btn-group">
                            <a href="https://hatulbasak.geekip.dev" target="_blank" class="btn" style="padding: 1.5rem 3rem; font-size: 1.2rem; border-radius: 20px;">Play Game</a>
                        </div>
                    </div>
                `
            },
            {
                id: 'c7',
                html: `
                    <div class="doorway-frame"></div>
                    <div class="display-slab c7-meta">
                        <h2>Infinite Recursion</h2>
                        <p class="desc">The inception portal. Digital mirrors reflecting this portfolio inherently upon itself.</p>
                        <div class="btn-group">
                            <a href="https://geekip.dev" target="_blank" class="btn">Loop Back &infin;</a>
                        </div>
                    </div>
                `
            },
            {
                id: 'c8',
                html: `
                    <div class="doorway-frame" style="border-color: #0f0; opacity:0.2;"></div>
                    <div class="display-slab c8-term">
                        <h2>>_ SYSTEM LINK</h2>
                        <div class="prompt">user@geekip:~$ ping social_nodes</div>
                        <div class="prompt" style="margin-bottom: 2rem; color: #008800;">64 bytes from 127.0.0.1: icmp_seq=1 ttl=64 time=0.03 ms</div>
                        <div class="btn-group" style="justify-content: flex-start;">
                            <a href="https://github.com/gevak" target="_blank" class="btn">GitHub</a>
                            <a href="https://linkedin.com/in/gevakip" target="_blank" class="btn">LinkedIn</a>
                            <a href="https://facebook.com/geva.kipper" target="_blank" class="btn">Facebook</a>
                        </div>
                    </div>
                `
            }
        ];

        const scene = document.getElementById('scene');
        const zSpacing = 2500; 
        const totalChambers = chambersData.length;
        
        // Build DOM
        chambersData.forEach((data, index) => {
            const section = document.createElement('section');
            section.className = 'chamber';
            section.id = data.id;
            
            // Chamber 0 sits at Z=0. Chamber 1 at Z=-2500, etc.
            const zPos = -(index * zSpacing);
            section.style.transform = `translateZ(${zPos}px)`;
            
            // Assign data attribute for scrolling logic
            section.dataset.z = zPos;
            section.innerHTML = data.html;
            scene.appendChild(section);
        });

        // Set body height to allow native scrolling to cover the entire Z depth
        // Add one extra spacing to allow scrolling completely *through* the final terminal into the loop
        const scrollDistance = totalChambers * zSpacing;
        document.body.style.height = `${scrollDistance + window.innerHeight}px`;

        // Scroll Logic & Droste Effect
        let currentAmbientHue = 0;
        let isLooping = false;

        window.addEventListener('scroll', () => {
            if (isLooping) return;

            const scrollY = window.scrollY;
            
            // Map 1 pixel of scroll to 1 pixel of Z translation for 1:1 camera feel
            let zTranslate = scrollY;
            scene.style.transform = `translateZ(${zTranslate}px)`;
            
            // Background morph logic
            // 0 -> start (wireframe). Math.min limits to first half of scroll.
            const progress = scrollY / scrollDistance;
            
            // Fade wireframe out, fade concrete in based on scroll depth
            const morphPoint = Math.min(1, progress * 1.5); 
            document.documentElement.style.setProperty('--wireframe-op', 1 - (morphPoint * 0.8));
            document.documentElement.style.setProperty('--concrete-op', morphPoint);

            // Pass-through Fade Logic
            // As camera Z passes a chamber Z, fade it out to prevent sudden clipping
            document.querySelectorAll('.chamber').forEach((chamber) => {
                const chamberZ = Math.abs(parseFloat(chamber.dataset.z));
                // Camera is at zTranslate. Distance to chamber = chamberZ - zTranslate
                const distanceToCamera = chamberZ - zTranslate;
                const slab = chamber.querySelector('.display-slab');
                
                if (distanceToCamera < 800 && distanceToCamera > -500) {
                    // Start fading out when getting close, fade in when backing up
                    let opacity = (distanceToCamera + 200) / 1000;
                    opacity = Math.max(0, Math.min(1, opacity));
                    if(slab) slab.style.opacity = opacity;
                } else if (distanceToCamera >= 800) {
                    if(slab) slab.style.opacity = 1;
                } else {
                    if(slab) slab.style.opacity = 0;
                }
            });

            // Infinite Loop Reset
            // Once we scroll completely past Chamber 8
            if (scrollY >= scrollDistance) {
                isLooping = true;
                // Shift ambient color slightly to signify a deeper layer of the loop
                currentAmbientHue = (currentAmbientHue + 45) % 360;
                document.documentElement.style.setProperty('--ambient-hue', currentAmbientHue);
                
                // Instantly snap scroll back to top to create seamless endless tunnel
                window.scrollTo(0, 0);
                setTimeout(() => { isLooping = false; }, 50); // Debounce
            }
        });

        // Typewriter Effect
        const textToType = "This website is re-designed each day by AI and is thus ever-changing.";
        const typeTarget = document.getElementById('typewriter');
        let typeIndex = 0;
        
        function typeWriter() {
            if (typeIndex < textToType.length) {
                typeTarget.innerText += textToType.charAt(typeIndex);
                // Update attribute for CSS glitch effect
                typeTarget.setAttribute('data-text', typeTarget.innerText);
                typeIndex++;
                setTimeout(typeWriter, 50 + Math.random() * 50);
            }
        }
        setTimeout(typeWriter, 1500);

        // HUD Cryptographic Stopwatch
        // Temporal Anchor: 2026-07-01 02:48:48
        // Calculating absolute difference to "now" assuming it's counting time elapsed *since* or distance *to*
        const anchorDate = new Date("2026-07-01T02:48:48Z").getTime();
        const timerElement = document.getElementById('cyber-timer');

        function updateTimer() {
            const now = new Date().getTime();
            const diff = Math.abs(now - anchorDate); // Absolute to ensure it ticks up whether in past or future relative to client

            // Calculate hours, minutes, seconds
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            // Pad with zeros
            const h = String(hours).padStart(2, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');

            timerElement.innerText = `${h}:${m}:${s}`;
            requestAnimationFrame(updateTimer);
        }
        
        // Start the loop
        requestAnimationFrame(updateTimer);

        // Ensure correct layout on init
        window.scrollTo(0, 0);
    </script>
