<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper | Digital Synthesis</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #070B14;
            --bg-lighter: #0F172A;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #E2E8F0;
            --font-main: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --glow-strength: 15px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a, a * {
            cursor: pointer;
            text-decoration: none;
        }

        /* Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
        }

        /* Ambient Screen Vignette */
        .vignette {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 30%, var(--bg-dark) 120%);
            z-index: -1;
            pointer-events: none;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            z-index: 1;
            transition: filter 0.5s ease;
        }

        main.blurred {
            filter: blur(8px) brightness(0.4);
            pointer-events: none;
        }

        /* Structural Periodic Table Grid */
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, minmax(60px, 1fr));
            grid-gap: 8px;
            width: 100%;
            max-width: 1300px;
            position: relative;
        }

        /* Hero Section (Nested in the table dip) */
        .hero {
            grid-column: 3 / 13;
            grid-row: 1 / 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1.holographic {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -2px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 
                0 0 5px #0ff, 
                0 0 20px #0ff, 
                0 0 40px #0ff, 
                -2px 2px 0px rgba(255,0,255,0.5), 
                2px -2px 0px rgba(0,255,255,0.5);
            margin-bottom: 0.5rem;
        }

        .subtitle-main {
            font-size: 1.2rem;
            font-weight: 300;
            color: #94A3B8;
            margin-bottom: 1.5rem;
        }

        .subtitle-glitch {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: #4ade80;
            position: relative;
        }
        
        .subtitle-glitch::before, .subtitle-glitch::after {
            content: "This digital space is re-designed daily by AI; you are exploring today's transient synthesis.";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.8;
        }
        .subtitle-glitch::before {
            color: #0ff; z-index: -1;
            animation: glitch-anim-1 3s infinite linear alternate-reverse;
        }
        .subtitle-glitch::after {
            color: #f0f; z-index: -2;
            animation: glitch-anim-2 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
            100% { clip-path: inset(30% 0 50% 0); transform: translate(1px, -1px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
            20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, 1px); }
            40% { clip-path: inset(70% 0 10% 0); transform: translate(2px, -2px); }
            60% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, 2px); }
            80% { clip-path: inset(50% 0 30% 0); transform: translate(1px, -1px); }
            100% { clip-path: inset(5% 0 80% 0); transform: translate(-1px, 1px); }
        }

        /* Universal Grid Item Setting */
        .element-card {
            aspect-ratio: 1/1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            padding: 4px;
            position: relative;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .element-card .atomic-num { font-size: 0.65rem; font-family: var(--font-mono); position: absolute; top: 4px; left: 4px; color: #64748B; }
        .element-card .atomic-mass { font-size: 0.65rem; font-family: var(--font-mono); position: absolute; top: 4px; right: 4px; color: #64748B; }
        .element-card .symbol { font-size: 1.5rem; font-weight: 700; text-align: center; margin-top: auto; margin-bottom: 2px; }
        .element-card .name { font-size: 0.5rem; text-align: center; text-transform: uppercase; margin-bottom: auto; color: #94A3B8; letter-spacing: 0.5px;}

        /* Filler Elements */
        .filler { opacity: 0.3; filter: grayscale(100%); }

        /* Highlighted Interactive Elements */
        .interactive {
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .interactive:hover {
            transform: scale(1.1);
            z-index: 10;
            background: rgba(15, 23, 42, 0.9);
            border-color: var(--theme-color, #fff);
            box-shadow: 0 0 var(--glow-strength) var(--theme-color, rgba(255,255,255,0.5));
        }

        .interactive:hover .symbol { color: var(--theme-color, #fff); text-shadow: 0 0 8px var(--theme-color); }
        
        /* Electron Hover Animation */
        .interactive::before, .interactive::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 140%; height: 140%;
            border: 1px dashed var(--theme-color, #fff);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .interactive:hover::before {
            opacity: 0.6;
            animation: spinOrbit 3s linear infinite;
        }
        
        .interactive:hover::after {
            opacity: 0.3;
            width: 170%; height: 170%;
            animation: spinOrbit 5s linear infinite reverse;
        }

        @keyframes spinOrbit {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Lanthanide Expanded Row Base */
        .lanthanide-row { grid-column: 4 / 18; grid-row: 9; }
        .lanthanide-row.element-card {
            aspect-ratio: auto; min-height: 60px;
            flex-direction: row; justify-content: center; align-items: center;
        }
        .lanthanide-row .symbol { margin: 0; font-size: 1.2rem; }

        /* Fluid Modal System */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal-box {
            width: 90%;
            max-width: 800px;
            min-height: 400px;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            padding: 3rem;
        }

        #modal-overlay.active .modal-box { transform: scale(1); }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            font-family: var(--font-mono);
            font-size: 1.5rem; color: #fff;
            cursor: pointer; opacity: 0.5;
            transition: opacity 0.2s;
            z-index: 50;
        }
        .close-btn:hover { opacity: 1; }

        /* Modal Inner Themes */
        .modal-content { display: flex; flex-direction: column; height: 100%; position: relative; z-index: 2; }
        .m-header { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .m-meta { font-family: var(--font-mono); color: rgba(255,255,255,0.5); margin-bottom: 2rem; font-size: 0.9rem;}
        .m-body { font-size: 1.1rem; line-height: 1.6; color: #cbd5e1; max-width: 600px; flex-grow: 1; }
        .m-actions { margin-top: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
        
        .m-btn {
            padding: 10px 20px; border-radius: 4px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-family: var(--font-mono);
            font-size: 0.9rem; transition: all 0.2s;
        }
        .m-btn:hover { background: rgba(255,255,255,0.2); border-color: #fff; }

        /* Specific Modal Scopes injected via JS */
        
        /* 1. GlglStats [Gl] */
        .theme-gl { --m-color: #fbbf24; }
        .theme-gl .modal-box { border-color: var(--m-color); box-shadow: 0 0 40px rgba(251, 191, 36, 0.2); }
        .theme-gl .m-header { color: var(--m-color); text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .theme-gl .m-bg { position: absolute; right: 0; top: 0; width: 50%; height: 100%; background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%); z-index: 0; }
        .yt-embed { display: flex; align-items: center; gap: 10px; background: rgba(255,0,0,0.1); border: 1px solid red; padding: 10px; border-radius: 6px; width: fit-content; margin-top: 15px;}
        .yt-embed:hover { background: rgba(255,0,0,0.2); }

        /* 2. Ahuzat Dibuk [Ad] */
        .theme-ad { --m-color: #4ade80; }
        .theme-ad .modal-box { border-top: 2px solid var(--m-color); background: radial-gradient(circle at bottom right, rgba(234, 88, 12, 0.2), transparent 50%), rgba(10, 15, 30, 0.85); box-shadow: 0 0 30px rgba(74, 222, 128, 0.1); }
        .theme-ad .m-header { color: var(--m-color); }
        .theme-ad .citation-chip { display: inline-block; padding: 5px 12px; border-radius: 20px; background: #ea580c33; color: #fb923c; font-size: 0.8rem; border: 1px solid #ea580c; margin: 4px; }

        /* 3. 2D Part Orienting [Po] */
        .theme-po { --m-color: #10b981; }
        .theme-po .modal-box { background: #000; border: 1px solid var(--m-color); box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.2); }
        .theme-po .m-header, .theme-po .m-body { font-family: var(--font-mono); color: var(--m-color); }
        .wireframe-container { position: absolute; right: -50px; bottom: -50px; width: 300px; height: 300px; animation: spin-slow 20s linear infinite; opacity: 0.2; pointer-events: none; }
        .wireframe-poly { width: 100%; height: 100%; border: 2px solid var(--m-color); clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
        @keyframes spin-slow { to { transform: rotate(360deg); } }

        /* 4. The Turing Jest [Tj] */
        .theme-tj { --m-color: #a855f7; }
        .theme-tj .modal-box { border: 2px solid var(--m-color); box-shadow: 0 0 50px rgba(168, 85, 247, 0.3); }
        .theme-tj .m-header { color: #f0abfc; text-shadow: 0 0 15px var(--m-color); }
        .tj-stars { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: 1px dotted rgba(168,85,247,0.5); pointer-events: none; }
        .tj-btn { background: #000; color: var(--m-color); font-family: var(--font-mono); border: 1px solid var(--m-color); box-shadow: 0 0 10px rgba(168,85,247,0.4); }

        /* 5. Rhymes of Israel [Ri] */
        .theme-ri { --m-color: #ec4899; }
        .theme-ri .modal-box { 
            background: linear-gradient(135deg, rgba(236,72,153,0.1) 0%, rgba(56,189,248,0.1) 100%),
                        radial-gradient(rgba(255,255,255,0.1) 15%, transparent 16%) 0 0,
                        radial-gradient(rgba(255,255,255,0.1) 15%, transparent 16%) 4px 4px;
            background-color: var(--bg-lighter); background-size: 100% 100%, 8px 8px, 8px 8px; border-color: var(--m-color);
        }
        .theme-ri .m-header { background: linear-gradient(to right, #ec4899, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 6. Portfolio Meta [Me] */
        .theme-me { --m-color: #f8fafc; }
        .theme-me .modal-box { 
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.05) 100%);
            border-top: 1px solid rgba(255,255,255,0.8); border-left: 1px solid rgba(255,255,255,0.4);
            box-shadow: inset 0 0 50px rgba(255,255,255,0.1), 0 20px 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(40px);
        }
        .theme-me .m-header { color: #fff; text-shadow: 0 0 10px #fff; }

        /* 7. Lanthanide Socials [La] */
        .theme-la { --m-color: #0ff; }
        .theme-la .modal-box { border-bottom: 3px solid var(--m-color); text-align: center; }
        .social-bonds { display: flex; justify-content: center; gap: 3rem; margin-top: 3rem; }
        .social-bonds a { font-size: 1.5rem; color: #fff; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: transform 0.3s; }
        .social-bonds a:hover { transform: translateY(-10px); color: var(--m-color); text-shadow: 0 0 15px var(--m-color); }
        .social-bonds .bond-line { width: 2px; height: 50px; background: linear-gradient(to bottom, transparent, var(--m-color)); margin-bottom: 10px; }

        /* Footer */
        footer {
            background: #000;
            border-top: 1px solid #333;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #64748B;
            z-index: 10;
        }

        .ledger-tech {
            text-transform: uppercase;
        }

        .pulse {
            display: inline-block;
            width: 8px; height: 8px;
            background: #ef4444; border-radius: 50%;
            margin-right: 8px;
            animation: heartPulse 1s infinite alternate;
        }

        @keyframes heartPulse { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); box-shadow: 0 0 8px #ef4444;} }

        @media (max-width: 1200px) {
            .periodic-table { overflow-x: auto; padding-bottom: 2rem; }
            .hero { grid-column: 2 / 18; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="vignette"></div>

    <main id="main-content">
        <div class="periodic-table" id="pt-grid">
            <!-- Hero centrally embedded -->
            <header class="hero">
                <h1 class="holographic">Geva Kipper</h1>
                <p class="subtitle-main">Crafting intelligent data and software solutions at Google.</p>
                <p class="subtitle-glitch">This digital space is re-designed daily by AI; you are exploring today's transient synthesis.</p>
            </header>
            
            <!-- Grid gets populated by JavaScript -->
        </div>
    </main>

    <!-- Modal System -->
    <div id="modal-overlay">
        <div class="modal-box" id="modal-box">
            <div class="close-btn" onclick="closeModal()">[x]</div>
            <div id="modal-content-inject"></div>
        </div>
    </div>

    <!-- Footer Ledger -->
    <footer>
        <div class="ledger-tech">
            Design synthesized entirely by an AI Assistant.
        </div>
        <div>
            <span class="pulse"></span> 
            SYS.UPTIME: <span id="stopwatch">00h 00m 00s</span>
        </div>
    </footer>


    <script>
        /* --- 1. Background Particle System (Molecular Bonds) --- */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, particles;

        function initBg() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            let particleCount = Math.floor((width * height) / 15000);

            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 1.5 + 0.5
                });
            }
        }

        function drawBg() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.sqrt((p.x - p2.x)**2 + (p.y - p2.y)**2);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.lineWidth = 1 - (dist / 120);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawBg);
        }

        window.addEventListener('resize', initBg);
        initBg();
        drawBg();

        /* --- 2. Periodic Table Generation & Content --- */
        
        // Exact active portfolio parameters
        const interactiveElements = [
            { id: 'gl', sym: 'Gl', name: 'GlglStats', num: 2, mass: '4.002',  r: 1, c: 18, theme: '#fbbf24' },
            { id: 'ad', sym: 'Ad', name: 'Ahuzat Dib', num: 26, mass: '55.84', r: 4, c: 8, theme: '#4ade80' },
            { id: 'po', sym: 'Po', name: 'PartOrient', num: 40, mass: '91.22', r: 5, c: 4, theme: '#10b981' },
            { id: 'tj', sym: 'Tj', name: 'Turing Jest', num: 10, mass: '20.17', r: 2, c: 18, theme: '#a855f7' },
            { id: 'ri', sym: 'Ri', name: 'Rhymes IL', num: 15, mass: '30.97', r: 4, c: 15, theme: '#ec4899' },
            { id: 'me', sym: 'Me', name: 'Portfolio', num: 48, mass: '112.4', r: 5, c: 12, theme: '#f8fafc' },
            { id: 'la', sym: '🔗', name: 'Lanthanide Series [Network]', num: "*-*", mass: "Social", r: 9, c: 4, isWide: true, theme: '#0ff' }
        ];

        // Maps logical coordinates to valid periodic table slots to populate fillers
        const fillerSkills = ['Py', 'Cp', 'Ll', 'Js', 'Ts', 'Go', 'Rs', 'Ml', 'Ai', 'Db', 'Sq', 'Aw', 'Gc', 'Dc', 'Ku', 'Vi', 'Lx', 'Sh', 'Gi'];
        let fillerIndex = 0;

        const gridContainer = document.getElementById('pt-grid');

        function generateGrid() {
            for (let r = 1; r <= 7; r++) {
                for (let c = 1; c <= 18; c++) {
                    // Skip hero area gap
                    if (r <= 3 && c >= 3 && c <= 12) continue;
                    
                    let activeObj = interactiveElements.find(e => e.r === r && e.c === c && !e.isWide);
                    
                    if (activeObj) {
                        createCard(activeObj, r, c, true);
                    } else if (isValidPtCell(r, c)) {
                        let fillerSym = fillerSkills[fillerIndex % fillerSkills.length];
                        fillerIndex++;
                        createCard({ sym: fillerSym, num: r*c, mass: (r*c*2.5).toFixed(2), name: 'SkillCore' }, r, c, false);
                    }
                }
            }
            // Lanthanide Wide Row
            let la = interactiveElements.find(e => e.isWide);
            let laStr = `<div class="element-card interactive lanthanide-row" style="grid-column: 3 / 17; --theme-color: ${la.theme}" onclick="openModal('${la.id}')">
                <span class="symbol">${la.sym} ${la.name}</span>
            </div>`;
            gridContainer.insertAdjacentHTML('beforeend', laStr);
        }

        function isValidPtCell(r, c) {
            if (r === 1 && (c === 1 || c === 18)) return true;
            if ((r === 2 || r === 3) && (c <= 2 || c >= 13)) return true;
            if (r >= 4 && r <= 7) return true;
            return false;
        }

        function createCard(data, r, c, isInteractive) {
            let cls = isInteractive ? 'element-card interactive' : 'element-card filler';
            let style = `grid-row: ${r}; grid-column: ${c};`;
            if (isInteractive) style += ` --theme-color: ${data.theme};`;
            
            let html = `
                <div class="${cls}" style="${style}" ${isInteractive ? `onclick="openModal('${data.id}')"` : ''}>
                    <span class="atomic-num">${data.num}</span>
                    <span class="atomic-mass">${data.mass}</span>
                    <span class="symbol">${data.sym}</span>
                    <span class="name">${data.name}</span>
                </div>
            `;
            gridContainer.insertAdjacentHTML('beforeend', html);
        }

        generateGrid();

        /* --- 3. Modal Content Definitions & Logic --- */
        const modalData = {
            'gl': `
                <div class="modal-content">
                    <div class="m-bg"></div>
                    <div class="m-header">GlglStats</div>
                    <div class="m-meta">[Symbol: Gl] | Type: Data Visualization & Compression Algorithm</div>
                    <div class="m-body">
                        A Python-based architecture quantifying the repetitiveness of Israeli pop-charts. Through implementing LZ77 compression logics on lyrical datasets, musical repetitiveness is empirically visualized over time.

        // (Calculating absolute magnitude of time distance for future tracking context)
        const targetDate = new Date("2026-04-09T01:44:20Z").getTime();
        const stopwatchEl = document.getElementById('stopwatch');

        function updateStopwatch() {
            const now = Date.now();
            let diff = Math.abs(now - targetDate);
            
            let h = Math.floor(diff / (1000 * 60 * 60));
            let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let s = Math.floor((diff % (1000 * 60)) / 1000);

            let pad = (num) => num.toString().padStart(2, '0');
            stopwatchEl.innerText = `${h}h ${pad(m)}m ${pad(s)}s`;
        }
