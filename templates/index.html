<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper | Interactive Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --neon-cyan: #66fcf1;
            --neon-teal: #45a29e;
            --neon-magenta: #ff00ff;
            --neon-lime: #39ff14;
            --glass-bg: rgba(20, 22, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #c5c6c7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            user-select: none;
        }

        /* ----- GLASSMORPHISM UTILITIES ----- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* ----- HUD HEADER ----- */
        #hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            padding: 20px 25px;
            border-radius: 16px;
            z-index: 100;
            text-align: center;
            pointer-events: none;
            animation: floatHUD 4s ease-in-out infinite;
        }

        @keyframes floatHUD {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, 5px); }
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1rem, 3vw, 1.8rem);
            margin: 0 0 10px 0;
            color: #fff;
            text-shadow: 2px 2px 0px var(--neon-magenta), -2px -2px 0px var(--neon-cyan);
            letter-spacing: 2px;
        }

        .subtitle-1 {
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            font-weight: 600;
            color: #fff;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }

        .subtitle-2 {
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            font-weight: 800;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), var(--neon-lime), var(--neon-cyan));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 5s ease infinite;
            margin: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ----- GAME CANVAS ----- */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: crosshair;
        }

        /* ----- DIALOGUE BOX ----- */
        #dialogBox {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #dialogBox.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        #dialogBox h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: var(--neon-cyan);
            line-height: 1.4;
        }

        #dialogBox p {
            font-size: 1rem;
            line-height: 1.6;
            margin: 0 0 15px 0;
            color: #ddd;
        }

        .link-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-modern {
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-modern:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--neon-cyan);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 252, 241, 0.3);
        }

        .btn-modern.primary {
            background: rgba(102, 252, 241, 0.15);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
        }

        .yt-thumb {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,0,0,0.5);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff4444;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .yt-thumb:hover { background: rgba(255,0,0,0.2); }

        /* ----- FOOTER ----- */
        #footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: borderPulse 3s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: rgba(255,255,255,0.1); box-shadow: 0 0 10px rgba(0,0,0,0.5); }
            50% { border-color: rgba(102, 252, 241, 0.5); box-shadow: 0 0 20px rgba(102, 252, 241, 0.2); }
        }

        .typewriter {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            color: #888;
            line-height: 1.5;
            flex-grow: 1;
        }

        .stopwatch {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            color: var(--neon-lime);
            text-shadow: 0 0 5px var(--neon-lime);
            min-width: 140px;
            text-align: right;
        }

        /* Controls Instructions */
        #controls {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 80;
            pointer-events: none;
        }
        .key-hint {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            padding: 5px 10px;
            font-family: 'Press Start 2P';
            font-size: 0.5rem;
            color: #ccc;
            text-align: center;
        }

        @media (max-width: 768px) {
            #footer { flex-direction: column; gap: 10px; text-align: center; padding: 15px;}
            .stopwatch { text-align: center; }
            #controls { display: none; }
            #dialogBox { top: 60%; }
        }
    </style>
</head>
<body>

    <!-- HUD Overlay -->
    <div id="hud" class="glass">
        <h1>GEVA KIPPER</h1>
        <p class="subtitle-1">Software Engineer at Google, crafting internet-scale solutions.</p>
        <p class="subtitle-2">This environment is re-designed day-by-day by Artificial Intelligence; you are exploring today's iteration.</p>
    </div>

    <div id="controls">
        <div class="key-hint">W</div>
        <div style="display:flex;gap:10px;">
            <div class="key-hint">A</div>
            <div class="key-hint">S</div>
            <div class="key-hint">D</div>
        </div>
        <div class="key-hint" style="margin-top:10px">OR CLICK TO MOVE</div>
    </div>

    <!-- Game World -->
    <canvas id="gameCanvas"></canvas>

    <!-- Interactive Dialogue Box -->
    <div id="dialogBox" class="glass">
        <!-- Content injected via JS -->
    </div>

    <!-- Footer -->
    <div id="footer" class="glass">
        <div class="typewriter" id="aiCredit"></div>
        <div class="stopwatch" id="timer">00:00:00</div>
    </div>

<script>
/**
 * GEVA KIPPER INTERACTIVE PORTFOLIO ENGINE
 * Architecture: HTML5 Canvas + Vanilla JS + CSS3 Glassmorphism
 */

// --- SETUP ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const dialogBox = document.getElementById('dialogBox');

let width, height;
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- STATE ---
const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
const player = {
    x: 0, y: 0, 
    size: 24, 
    speed: 5, 
    targetX: null, targetY: null,
    frame: 0
};
let activePoiId = null;

// --- POINTS OF INTEREST (LANDMARKS) DATA ---
const pois = [
    {
        id: 1, x: -500, y: -300, radius: 100, color: '#66fcf1',
        title: "The GlglStats Tower",
        desc: "A towering structure of data. This Python project uses LZ77 compression principles to create a visual pop-chart dashboard for Israeli radio statistics.",
        html: `
            <a href="https://www.youtube.com/watch?v=jrKAtOsj1Lo" target="_blank" class="yt-thumb">
                ▶ PyData TLV Presentation
            </a>
            <div class="link-container">
                <a href="https://glglstats.geekip.dev" target="_blank" class="btn-modern primary">Launch Dashboard</a>
            </div>
        `,
        draw: (ctx, t) => {
            // Equalizer Tower
            for(let i=0; i<5; i++) {
                let h = 40 + Math.sin(t/200 + i)*20;
                ctx.fillStyle = `rgba(102, 252, 241, ${0.4 + (i*0.1)})`;
                ctx.fillRect(-45 + i*20, -h, 15, h);
            }
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(0, -70 + Math.sin(t/150)*10, 5, 0, Math.PI*2); ctx.fill();
        }
    },
    {
        id: 2, x: 400, y: -450, radius: 120, color: '#ff0055',
        title: "Ahuzat Dibuk District",
        desc: "A glowing concrete lot. Here lies a vast Python scraping algorithm and data visualization suite tracking the harsh realities of Tel-Aviv parking.",
        html: `
            <div class="link-container">
                <a href="https://13tv.co.il/item/news/domestic/internal/parking-902956407/" target="_blank" class="btn-modern">Channel 13 TV</a>
                <a href="https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm" target="_blank" class="btn-modern">Mako Media</a>
                <a href="https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/" target="_blank" class="btn-modern primary">Secret Tel-Aviv</a>
            </div>
        `,
        draw: (ctx, t) => {
            // Concrete lot with pulsing heat lights
            ctx.fillStyle = "#222";
            ctx.fillRect(-60, -60, 120, 120);
            for(let i=0; i<4; i++){
                ctx.fillStyle = `rgba(255, ${Math.abs(Math.sin(t/300 + i*50))*100}, 0, 0.6)`;
                ctx.fillRect(-50 + (i%2)*60, -50 + Math.floor(i/2)*60, 40, 40);
            }
        }
    },
    {
        id: 3, x: 600, y: 150, radius: 100, color: '#ff00ff',
        title: "The Geometry Temple",
        desc: "An ever-shifting polygon matrix. This temple holds an open-source C++ computational geometry engine applying push-plan algorithms for 2D Part Orienting.",
        html: `
            <div class="link-container">
                <a href="https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/" target="_blank" class="btn-modern primary">TAU Code & Info</a>
            </div>
        `,
        draw: (ctx, t) => {
            // Shifting Polygons
            ctx.save();
            ctx.rotate(t/1000);
            ctx.strokeStyle = "rgba(255, 0, 255, 0.8)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            for(let i=0; i<6; i++) {
                let r = 40 + Math.sin(t/500)*10;
                let a = (i/6) * Math.PI*2;
                ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
            }
            ctx.closePath(); ctx.stroke();
            ctx.rotate(-t/500);
            ctx.strokeRect(-20, -20, 40, 40);
            ctx.restore();
        }
    },
    {
        id: 4, x: -450, y: 400, radius: 110, color: '#ffaa00',
        title: "The Turing Jest Colosseum",
        desc: "A pixelated arena ringed by masks of comedy and tragedy. Enter the LMSYS-style battleground where Large Language Models fight to the death via puns.",
        html: `
            <div class="link-container">
                <a href="https://jest.geekip.dev" target="_blank" class="btn-modern primary">Enter Arena</a>
            </div>
        `,
        draw: (ctx, t) => {
            // Arena arcs
            ctx.strokeStyle = "#ffaa00";
            ctx.lineWidth = 8;
            ctx.beginPath(); ctx.arc(0,0, 50, t/500, t/500 + Math.PI); ctx.stroke();
            ctx.strokeStyle = "#aa5500";
            ctx.beginPath(); ctx.arc(0,0, 35, -t/400, -t/400 + Math.PI); ctx.stroke();
            // Simple masks representation
            ctx.fillStyle = "#fff";
            ctx.fillRect(-15, -10, 8, 8); // Comedy eye
            ctx.fillRect(7, -10, 8, 8);   // Tragedy eye
        }
    },
    {
        id: 5, x: 150, y: 550, radius: 90, color: '#39ff14',
        title: "Rhymes of Israel Newsstand",
        desc: "A bustling street corner kiosk. Here, a Chrome Extension intercepts daily news headlines and rewrites them into rhyming high-school yearbook quotes using LLMs.",
        html: `
            <div class="link-container">
                <a href="https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb" target="_blank" class="btn-modern primary">Chrome Web Store</a>
            </div>
        `,
        draw: (ctx, t) => {
            // Kiosk box
            ctx.fillStyle = "#4a4e69";
            ctx.fillRect(-30, -20, 60, 40);
            ctx.fillStyle = "#9a8c98";
            ctx.fillRect(-35, -30, 70, 10);
            // Musical note sprites floating up
            for(let i=0; i<3; i++) {
                let oy = (t/10 + i*15) % 40;
                ctx.fillStyle = `rgba(57, 255, 20, ${1 - oy/40})`;
                ctx.fillRect(-20 + i*20 + Math.sin(t/200+i)*5, -20 - oy, 4, 4);
            }
        }
    },
    {
        id: 6, x: -700, y: 100, radius: 100, color: '#00cc44',
        title: "The Hatul Basak Clearing",
        desc: "A whimsical patch of digital woods. Try your hand at an AI-generated daily Wikipedia Trivia puzzle challenging your Hebrew general knowledge.",
        html: `
            <div class="link-container">
                <a href="https://hatulbasak.geekip.dev" target="_blank" class="btn-modern primary">Play the Puzzle</a>
            </div>
        `,
        draw: (ctx, t) => {
            // Pixel Trees
            ctx.fillStyle = "#005500";
            ctx.fillRect(-40, -40, 20, 30); ctx.fillRect(20, -50, 25, 40);
            ctx.fillStyle = "#44aa00";
            ctx.fillRect(-45, -45, 30, 20); ctx.fillRect(15, -60, 35, 25);
            // Pixel Cat
            ctx.fillStyle = "#ff8800";
            ctx.fillRect(-10, -5 + Math.sin(t/150)*3, 20, 15); // body
            ctx.fillRect(-10, -10 + Math.sin(t/150)*3, 5, 5); // ear
            ctx.fillRect(5, -10 + Math.sin(t/150)*3, 5, 5); // ear
        }
    },
    {
        id: 7, x: 0, y: -650, radius: 100, color: '#aaaaff',
        title: "The Meta Portal",
        desc: "A swirling reflection of reality. You are staring into the code of this exact AI-generated interactive portfolio. Step through to explore the root architecture.",
        html: `
            <div class="link-container">
                <a href="https://geekip.dev" target="_blank" class="btn-modern primary">Re-enter Matrix (geekip.dev)</a>
            </div>
        `,
        draw: (ctx, t) => {
            let grad = ctx.createRadialGradient(0,0,0, 0,0, 50);
            grad.addColorStop(0, "rgba(255,255,255,0.8)");
            grad.addColorStop(0.5, "rgba(100,100,255,0.5)");
            grad.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0,0, 50 + Math.sin(t/100)*10, 0, Math.PI*2); ctx.fill();
            
            ctx.strokeStyle = `rgba(255,255,255,${0.2 + Math.abs(Math.sin(t/200))*0.5})`;
            ctx.lineWidth = 2;
            for(let i=0; i<3; i++) {
                ctx.beginPath(); ctx.arc(0,0, 20 + i*15 + Math.cos(t/200+i)*5, 0, Math.PI*2); ctx.stroke();
            }
        }
    },
    {
        id: 8, x: 100, y: -100, radius: 100, color: '#8b4513',
        title: "Crossroads Tavern",
        desc: "A safe haven where travelers exchange information. Access Geva's professional and social networks from this hub.",
        html: `
            <div class="link-container">
                <a href="https://github.com/gevak" target="_blank" class="btn-modern">GitHub</a>
                <a href="https://linkedin.com/in/gevakip" target="_blank" class="btn-modern">LinkedIn</a>
                <a href="https://facebook.com/geva.kipper" target="_blank" class="btn-modern">Facebook</a>
            </div>
        `,
        draw: (ctx, t) => {
            // Tavern graphic
            ctx.fillStyle = "#5c4033"; // roof
            ctx.beginPath(); ctx.moveTo(-40, 10); ctx.lineTo(0, -30); ctx.lineTo(40, 10); ctx.fill();
            ctx.fillStyle = "#8b5a2b"; // body
            ctx.fillRect(-30, 10, 60, 40);
            ctx.fillStyle = "#222"; // door
            ctx.fillRect(-10, 25, 20, 25);
            // Signpost
            ctx.fillStyle = "#aa7744";
            ctx.fillRect(45, 15, 30, 15);
            ctx.fillRect(55, 30, 10, 20);
        }
    }
];

// --- INPUT HANDLING ---
window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; player.targetX = null; });
window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

canvas.addEventListener('click', e => {
    // Translate screen coords to world coords based on camera center
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    player.targetX = mouseX - width/2 + player.x;
    player.targetY = mouseY - height/2 + player.y;
});

// --- RENDER & GAME LOOP ---
function drawPlayer() {
    ctx.save();
    ctx.translate(player.x, player.y);
    
    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.beginPath(); ctx.ellipse(0, 15, 12, 6, 0, 0, Math.PI*2); ctx.fill();
    
    // Bounce animation
    const isMoving = keys.w || keys.a || keys.s || keys.d || keys.ArrowUp || keys.ArrowDown || keys.ArrowLeft || keys.ArrowRight || player.targetX !== null;
    let bounce = 0;
    if (isMoving) {
        player.frame++;
        bounce = Math.abs(Math.sin(player.frame * 0.2)) * 6;
    }

    ctx.translate(0, -bounce);
    
    // 8-bit Body
    ctx.fillStyle = "#cccccc";
    ctx.fillRect(-10, -10, 20, 20);
    // Jacket/Accents
    ctx.fillStyle = varColor('--neon-magenta', '#ff00ff');
    ctx.fillRect(-10, 0, 20, 10);
    // Eyes
    ctx.fillStyle = "#000";
    ctx.fillRect(-6, -6, 4, 4);
    ctx.fillRect(2, -6, 4, 4);
    // Glasses glow
    ctx.fillStyle = "rgba(102, 252, 241, 0.5)";
    ctx.fillRect(-8, -8, 8, 8);
    ctx.fillRect(0, -8, 8, 8);

    ctx.restore();
}

function update() {
    // Movement Logic
    let dx = 0, dy = 0;
    if (keys.w || keys.ArrowUp) dy -= player.speed;
    if (keys.s || keys.ArrowDown) dy += player.speed;
    if (keys.a || keys.ArrowLeft) dx -= player.speed;
    if (keys.d || keys.ArrowRight) dx += player.speed;

    // Pathfinding to click target
    if (player.targetX !== null && player.targetY !== null) {
        let tx = player.targetX - player.x;
        let ty = player.targetY - player.y;
        let dist = Math.sqrt(tx*tx + ty*ty);
        if (dist > player.speed) {
            dx = (tx / dist) * player.speed;
            dy = (ty / dist) * player.speed;
        } else {
            player.targetX = null; player.targetY = null;
        }
    }

    // Normalize diagonal speed
    if (dx !== 0 && dy !== 0 && player.targetX === null) {
        let length = Math.sqrt(dx*dx + dy*dy);
        dx = (dx/length) * player.speed;
        dy = (dy/length) * player.speed;
    }

    player.x += dx;
    player.y += dy;

    // Proximity Check
    let insidePoi = null;
    for (let poi of pois) {
        let dist = Math.sqrt(Math.pow(player.x - poi.x, 2) + Math.pow(player.y - poi.y, 2));
        if (dist < poi.radius) {
            insidePoi = poi;
            break;
        }
    }

    // UI Trigger Logic
    if (insidePoi && activePoiId !== insidePoi.id) {
        activePoiId = insidePoi.id;
        dialogBox.innerHTML = `
            <h2>${insidePoi.title}</h2>
            <p>${insidePoi.desc}</p>
            ${insidePoi.html}
        `;
        dialogBox.classList.add('active');
        dialogBox.style.borderColor = insidePoi.color;
        dialogBox.style.boxShadow = `0 10px 40px rgba(0,0,0,0.6), 0 0 20px ${insidePoi.color}40`;
    } else if (!insidePoi && activePoiId !== null) {
        activePoiId = null;
        dialogBox.classList.remove('active');
    }
}

function drawBackground() {
    ctx.fillStyle = "#0b0c10";
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    // Camera Transform: Keep player in center
    ctx.translate(width/2 - player.x, height/2 - player.y);

    // Draw Grid Lines (Map feel)
    ctx.strokeStyle = "rgba(69, 162, 158, 0.05)";
    ctx.lineWidth = 1;
    let startX = Math.floor((player.x - width/2) / 100) * 100;
    let endX = startX + width + 200;
    let startY = Math.floor((player.y - height/2) / 100) * 100;
    let endY = startY + height + 200;

    ctx.beginPath();
    for (let x = startX; x <= endX; x += 100) { ctx.moveTo(x, startY); ctx.lineTo(x, endY); }
    for (let y = startY; y <= endY; y += 100) { ctx.moveTo(startX, y); ctx.lineTo(endX, y); }
    ctx.stroke();

    // Time variable for animations
    let t = Date.now();

    // Draw POIs
    for(let poi of pois) {
        ctx.save();
        ctx.translate(poi.x, poi.y);
        
        // Interaction Radius Ring
        ctx.beginPath();
        ctx.arc(0, 0, poi.radius, 0, Math.PI*2);
        ctx.strokeStyle = (activePoiId === poi.id) ? poi.color : "rgba(255,255,255,0.05)";
        ctx.setLineDash([5, 10]);
        ctx.lineWidth = 2;
        ctx.lineDashOffset = -t/50;
        ctx.stroke();
        ctx.setLineDash([]); // reset
        
        // Draw Specific Structure
        poi.draw(ctx, t);
        
        // Floating Title
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.font = "10px 'Press Start 2P'";
        ctx.textAlign = "center";
        ctx.fillText(poi.title, 0, poi.radius + 20);

        ctx.restore();
    }

    // Draw Player
    drawPlayer();

    ctx.restore();
}

function loop() {
    update();
    drawBackground();
    requestAnimationFrame(loop);
}

// Helper to get CSS root variables
function varColor(name, fallback) {
    const val = getComputedStyle(document.documentElement).getPropertyValue(name);
    return val ? val.trim() : fallback;
}

// --- FOOTER LOGIC ---

// 1. Stopwatch Time Math
const targetDate = new Date("2026-06-15T03:31:36").getTime();
function updateStopwatch() {
    const now = Date.now();
    const diff = Math.abs(now - targetDate);
    
    const h = Math.floor(diff / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);
    
    document.getElementById('timer').innerText = 
        `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}
setInterval(updateStopwatch, 1000);
updateStopwatch(); // init

// 2. Typewriter Effect
const aiMessage = "> SYSTEM INITIALIZED. GENERATED BY: ADVANCED AI ASSISTANT MODEL. RENDERING TODAY'S ITERATION... DONE.";
let charIndex = 0;
const textElement = document.getElementById('aiCredit');

function typeChar() {
    if (charIndex < aiMessage.length) {
        textElement.innerHTML += aiMessage.charAt(charIndex);
        charIndex++;
        setTimeout(typeChar, 30 + Math.random() * 40); // random typing speed
    } else {
        // Add a blinking cursor at the end
        setInterval(() => {
            if(textElement.innerHTML.endsWith("█")) textElement.innerHTML = textElement.innerHTML.slice(0,-1);
            else textElement.innerHTML += "█";
        }, 500);
    }
}
setTimeout(typeChar, 1000); // delay start

// Start Engine
requestAnimationFrame(loop);

</script>
