<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper - Digital Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(20, 25, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --text-main: #f8f9fa;
            --accent: #64ffda;
            --font-family: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: var(--font-family);
            color: var(--text-main);
            width: 100vw;
            height: 100vh;
        }

        /* Game Canvas */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            image-rendering: pixelated;
        }

        /* Reusable Glassmorphism Class */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 var(--glass-shadow);
        }

        /* Persistent Top HUD */
        #hud {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            padding: 20px 30px;
            border-radius: 16px;
            text-align: center;
            z-index: 10;
            pointer-events: none; /* Let clicks pass to canvas */
        }

        #hud h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #hud .subtitle {
            font-size: 1rem;
            font-weight: 300;
            margin: 10px 0;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.85);
        }

        #hud .warning {
            font-size: 0.85rem;
            font-weight: 600;
            color: #ff6b6b;
            margin-top: 15px;
            letter-spacing: 1px;
            animation: pulse 2.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Dialog Box */
        #dialog-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translate(-50%, 150%);
            width: 90%;
            max-width: 800px;
            padding: 35px;
            border-radius: 20px;
            z-index: 20;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            opacity: 0;
            pointer-events: auto;
        }

        #dialog-container.active {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        #dialog-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 15px 0;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 1.2rem;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #dialog-text {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            min-height: 80px;
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.9);
        }

        #dialog-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .dialog-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: var(--font-family);
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .dialog-btn:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(100, 255, 218, 0.4);
            border-color: transparent;
        }

        /* Footer Overlay */
        #footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
            pointer-events: none;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .digital-timer {
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent);
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #hud h1 { font-size: 1.5rem; }
            #hud .subtitle { font-size: 0.85rem; }
            #footer { flex-direction: column; justify-content: center; height: 60px; padding: 0; gap: 5px; }
            #dialog-container { bottom: 70px; padding: 20px; }
            #dialog-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Render Layer -->
    <canvas id="game-canvas"></canvas>

    <!-- Top HUD -->
    <div id="hud" class="glass">
        <h1>Geva Kipper</h1>
        <div class="subtitle">Taking on complex engineering challenges and building elegant solutions at Google.</div>
        <div class="warning">Warning: The architecture of this realm shifts daily, generated and redesigned entirely by AI.</div>
    </div>

    <!-- Active Interaction Dialog -->
    <div id="dialog-container" class="glass">
        <div id="dialog-title">
            <span id="title-text">NPC Name</span>
            <button class="close-btn" onclick="closeDialog()">×</button>
        </div>
        <div id="dialog-text"></div>
        <div id="dialog-buttons"></div>
    </div>

    <!-- Bottom Tech Footer -->
    <div id="footer">
        <div class="footer-text">Realm architected purely by AI.</div>
        <div class="digital-timer" id="timer-display">0000:00:00</div>
    </div>

<script>
/**
 * ENGINE CONFIGURATION & STATE MAP
 */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let width, height;
let camera = { x: 0, y: 0 };
let isDialogActive = false;
let mapTiles = null; // Offscreen canvas for performance
const MAP_SIZE = 2400; // Virtual map size

// Inputs
const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false, " ": false };
const mouse = { x: 0, y: 0, active: false, clickMapX: 0, clickMapY: 0 };

// Player Entity
const player = {
    x: MAP_SIZE / 2,
    y: MAP_SIZE / 2 + 150,
    size: 24,
    speed: 5.5,
    destX: null,
    destY: null,
    color: '#64ffda',
    animData: 0
};

// NPCs / Interaction Points
const npcs = [
    {
        id: "glglstats",
        name: "GlglStats",
        role: "The Cyber-Bard",
        x: MAP_SIZE / 2 - 300, y: MAP_SIZE / 2 - 200, color: '#b388ff',
        shape: 'bard',
        dialog: "Greetings, traveler! I unravel the wizardry of 'GlglStats'. It's a Python project utilizing LZ77 algorithmic compression to measure and visualize the repetitiveness of Israeli pop-chart songs. Sit by my gramophone and listen to the data unfold.",
        links: [
            { text: "Portal", url: "https://glglstats.geekip.dev" },
            { text: "PyData TLV Presentation", url: "https://www.youtube.com/watch?v=jrKAtOsj1Lo" }
        ]
    },
    {
        id: "ahuzat",
        name: "Ahuzat Dibuk",
        role: "Frantic Carriage Driver",
        x: MAP_SIZE / 2 + 300, y: MAP_SIZE / 2 - 200, color: '#ffb74d',
        shape: 'driver',
        dialog: "The streets! Where do we park?! Ah, 'Ahuzat Dibuk' brings clarity! A Python web-scraping and data visualization engine that tracks Tel-Aviv parking lot occupancy. It generates real-time heat maps to save locals from the urban maze.",
        links: [
            { text: "Channel 13 News", url: "https://13tv.co.il/item/news/domestic/internal/parking-902956407/" },
            { text: "Mako Report", url: "https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm" },
            { text: "Secret Tel Aviv Oracle", url: "https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/" }
        ]
    },
    {
        id: "stonemason",
        name: "2D Part Orienting",
        role: "Master Stonemason",
        x: MAP_SIZE / 2 - 400, y: MAP_SIZE / 2 + 50, color: '#90a4ae',
        shape: 'mason',
        dialog: "Observe this heavy stone polygon. My C++ implementation within an open-source computational geometry library outlines an efficient algorithm. It constructs a flawless 'push plan' to perfectly orient any given polygon. Precision is everything.",
        links: [
            { text: "Consult the Geometry Tomes", url: "https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/" }
        ]
    },
    {
        id: "jest",
        name: "The Turing Jest",
        role: "Dueling Jesters",
        x: MAP_SIZE / 2 + 400, y: MAP_SIZE / 2 + 50, color: '#ec407a',
        shape: 'jesters',
        dialog: "Step right up to 'The Turing Jest'! Witness an LMSYS-like battleground where mighty Large Language Models are forced to compete by forging and explaining puns. The ultimate arbiters? Human users holding the scorecards!",
        links: [
            { text: "Enter the Arena", url: "https://jest.geekip.dev" }
        ]
    },
    {
        id: "rhymes",
        name: "Rhymes of Israel",
        role: "Letterman Knight",
        x: MAP_SIZE / 2 - 250, y: MAP_SIZE / 2 + 300, color: '#ffd54f',
        shape: 'knight',
        dialog: "Check out this mystical browser artifact! 'Rhymes of Israel' is a Chrome extension that harnesses an LLM to automatically rewrite serious Israeli news headlines into comedic rhymes suitable for a high-school yearbook. Read all about it!",
        links: [
            { text: "Equip the Chrome Artifact", url: "https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb" }
        ]
    },
    {
        id: "hatul",
        name: "Hatul Basak",
        role: "Feline Oracle",
        x: MAP_SIZE / 2 + 250, y: MAP_SIZE / 2 + 300, color: '#ff8a65',
        shape: 'cat',
        dialog: "*(Telepathic voice echoing)* Purr... I am the spirit of 'Hatul Basak', a Hebrew localization of the Wikipedia trivia game catfishing.net. Using AI, I generate daily encyclopedic challenges and allow mortals to forge their own untamed riddles.",
        links: [
            { text: "Consult the Oracle", url: "https://hatulbasak.geekip.dev" }
        ]
    },
    {
        id: "meta",
        name: "The Meta Website",
        role: "Swirling Mirror",
        x: MAP_SIZE / 2, y: MAP_SIZE / 2 - 400, color: '#4dd0e1',
        shape: 'mirror',
        dialog: "*(The mirror reflects your true self)* My god! You're currently wandering inside this very project. It's a beautifully over-engineered single-file retro environment leveraging HTML5 canvas and pristine glassmorphism UI... shifting daily via AI architecture.",
        links: [
            { text: "Restart Loop", url: "https://geekip.dev" }
        ]
    },
    {
        id: "crossroads",
        name: "The Crossroads",
        role: "Wooden Signpost",
        x: MAP_SIZE / 2, y: MAP_SIZE / 2 + 450, color: '#8d6e63',
        shape: 'sign',
        dialog: "The village ends here, but your journey continues. The signpost points out into the physical world, offering three distinct paths leading out of the realm.",
        links: [
            { text: "Code Repository (GitHub)", url: "https://github.com/gevak" },
            { text: "Professional Guild (LinkedIn)", url: "https://linkedin.com/in/gevakip" },
            { text: "Social Square (Facebook)", url: "https://facebook.com/geva.kipper" }
        ]
    }
];

/**
 * INITIALIZATION & RESIZING
 */
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    width = canvas.width;
    height = canvas.height;
}
window.addEventListener('resize', resize);
resize();

// Procedural Map Generation (Run once for performance)
function generateMap() {
    const offscreen = document.createElement('canvas');
    offscreen.width = MAP_SIZE;
    offscreen.height = MAP_SIZE;
    const ctxMap = offscreen.getContext('2d');

    // Base Grass
    ctxMap.fillStyle = '#1e2c26'; // Dark mystic grass
    ctxMap.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

    // Procedural tufts
    ctxMap.fillStyle = '#263b33';
    for (let i = 0; i < 4000; i++) {
        const tx = Math.random() * MAP_SIZE;
        const ty = Math.random() * MAP_SIZE;
        const w = Math.random() * 8 + 4;
        const h = Math.random() * 8 + 4;
        ctxMap.fillRect(tx, ty, w, h);
    }

    // Cobblestone center and paths
    ctxMap.fillStyle = '#2d3436';
    const centerX = MAP_SIZE/2;
    const centerY = MAP_SIZE/2;
    
    // Draw paths to each NPC
    ctxMap.lineWidth = 120;
    ctxMap.strokeStyle = '#323b3d';
    ctxMap.lineCap = 'round';
    ctxMap.lineJoin = 'round';
    ctxMap.beginPath();
    npcs.forEach(npc => {
        ctxMap.moveTo(centerX, centerY);
        ctxMap.lineTo(npc.x, npc.y);
    });
    ctxMap.stroke();

    // Central Plaza
    ctxMap.beginPath();
    ctxMap.arc(centerX, centerY, 150, 0, Math.PI * 2);
    ctxMap.fill();

    // Minor path detailing
    ctxMap.fillStyle = '#3f4b4f';
    for (let i = 0; i < 1500; i++) {
        const tx = Math.random() * MAP_SIZE;
        const ty = Math.random() * MAP_SIZE;
        // Only draw stones near center or near NPCs
        let nearPath = false;
        if(Math.hypot(tx - centerX, ty - centerY) < 160) nearPath = true;
        npcs.forEach(npc => {
            if(Math.hypot(tx - npc.x, ty - npc.y) < 60) nearPath = true;
            // Simple line distance approximation for paths
            let a = tx - centerX, b = ty - centerY;
            let a2 = npc.x - centerX, b2 = npc.y - centerY;
            let dot = a*a2 + b*b2;
            let len2 = a2*a2 + b2*b2;
            let param = (len2 !== 0) ? dot / len2 : -1;
            if (param >= 0 && param <= 1) {
                let pProjX = centerX + param * a2;
                let pProjY = centerY + param * b2;
                if(Math.hypot(tx - pProjX, ty - pProjY) < 60) nearPath = true;
            }
        });

        if (nearPath) {
            ctxMap.fillRect(tx, ty, Math.random() * 15 + 5, Math.random() * 15 + 5);
        }
    }

    mapTiles = offscreen;
}
generateMap();

/**
 * INPUT HANDLING
 */
window.addEventListener('keydown', e => { 
    if(keys.hasOwnProperty(e.key)) keys[e.key] = true; 
    
    // Spacebar Interaction
    if(e.key === " " && !isDialogActive) checkForInteraction();
});
window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

canvas.addEventListener('mousedown', e => {
    // Only map clicks outside UI
    mouse.active = true;
    mouse.clickMapX = e.clientX + camera.x;
    mouse.clickMapY = e.clientY + camera.y;

    if(!isDialogActive) {
        // Did we click an NPC directly?
        let clickedNPC = false;
        for(let npc of npcs) {
            if(Math.hypot(mouse.clickMapX - npc.x, mouse.clickMapY - npc.y) < 40) {
                // Walk towards them and interact
                player.destX = npc.x;
                player.destY = npc.y + 40; // Walk slightly below them
                clickedNPC = true;
                break;
            }
        }

        if(!clickedNPC) {
            player.destX = mouse.clickMapX;
            player.destY = mouse.clickMapY;
        }
    } else {
        // If clicking canvas while dialog open, close it or rush text
        if(typingInterval) skipTyping();
        else closeDialog();
    }
});

/**
 * LOGIC / UPDATE LOOP
 */
function update() {
    if (isDialogActive) return; // Pause movement

    let dx = 0;
    let dy = 0;
    let usingKeys = false;

    if (keys.w || keys.ArrowUp) { dy -= 1; usingKeys = true; }
    if (keys.s || keys.ArrowDown) { dy += 1; usingKeys = true; }
    if (keys.a || keys.ArrowLeft) { dx -= 1; usingKeys = true; }
    if (keys.d || keys.ArrowRight) { dx += 1; usingKeys = true; }

    if (usingKeys) {
        player.destX = null;
        player.destY = null;
        let length = Math.hypot(dx, dy);
        if (length > 0) {
            dx /= length;
            dy /= length;
            player.x += dx * player.speed;
            player.y += dy * player.speed;
            player.animData += 0.2;
        }
    } else if (player.destX !== null && player.destY !== null) {
        let diffX = player.destX - player.x;
        let diffY = player.destY - player.y;
        let dist = Math.hypot(diffX, diffY);
        
        if (dist > player.speed) {
            player.x += (diffX / dist) * player.speed;
            player.y += (diffY / dist) * player.speed;
            player.animData += 0.2;
        } else {
            player.x = player.destX;
            player.y = player.destY;
            player.destX = null;
            player.destY = null;

            // If auto-routed to NPC via click, trigger interaction
            checkForInteraction(true);
        }
    }

    // Boundary logic
    player.x = Math.max(player.size, Math.min(MAP_SIZE - player.size, player.x));
    player.y = Math.max(player.size, Math.min(MAP_SIZE - player.size, player.y));

    // Collision with NPCs (basic circle pushback)
    npcs.forEach(npc => {
        let nx = player.x - npc.x;
        let ny = player.y - npc.y;
        let dist = Math.hypot(nx, ny);
        if (dist < 40) {
            player.x += nx / dist * (40 - dist);
            player.y += ny / dist * (40 - dist);
        }
    });

    // Camera follow logic
    camera.x = player.x - width / 2;
    camera.y = player.y - height / 2;
}

/**
 * INTERACTION LOGIC
 */
let nearestNPC = null;

function checkForInteraction(autoTrigger = false) {
    if (nearestNPC && Math.hypot(player.x - nearestNPC.x, player.y - nearestNPC.y) < 80) {
        openDialog(nearestNPC);
    }
}

/**
 * DRAWING APIS (RETRO/MODERN SPLIT)
 */
function drawShape(ctx, shape, x, y, size, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = color;
    
    // Simple top-down abstract pixel approximations
    if (shape === 'player') {
        const bob = Math.sin(player.animData) * 4;
        ctx.fillStyle = color; // Cloak
        ctx.beginPath();
        ctx.roundRect(-size/2, -size/2 + bob, size, size + 10, 8);
        ctx.fill();
        ctx.fillStyle = '#fff'; // Face
        ctx.fillRect(-size/4, -size/4 + bob, size/2, size/3);
    } 
    else if (shape === 'bard') {
        ctx.fillRect(-size/2, -size/2, size, size); // Body
        ctx.fillStyle = '#fff'; ctx.fillRect(-10, -5, 20, 10); // Guitar
        ctx.fillStyle = '#607d8b'; ctx.beginPath(); ctx.arc(size, 0, 15, 0, Math.PI*2); ctx.fill(); // Gramophone
    }
    else if (shape === 'driver') {
        ctx.beginPath(); ctx.arc(0, 0, size/1.5, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = '#ffecb3'; ctx.shadowBlur = 15; ctx.shadowColor = '#ffff00';
        ctx.fillRect(5, 5, 10, 15); // Glowing parchment
        ctx.shadowBlur = 0;
    }
    else if (shape === 'mason') {
        ctx.fillRect(-size/2, -size/2, size, size); // Mason
        ctx.fillStyle = '#546e7a'; ctx.beginPath(); ctx.moveTo(-25, 20); ctx.lineTo(25, 30); ctx.lineTo(10, 50); ctx.fill(); // Stone polygon
    }
    else if (shape === 'jesters') {
        ctx.beginPath(); ctx.arc(-10, 0, size/2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#29b6f6'; ctx.beginPath(); ctx.arc(10, 0, size/2, 0, Math.PI*2); ctx.fill();
    }
    else if (shape === 'knight') {
        ctx.fillRect(-size/2, -size/2, size, size); 
        ctx.fillStyle = '#fff'; ctx.fillRect(-size/4, -size/2, size/2, size); // Letterman stripe
    }
    else if (shape === 'cat') {
        ctx.fillStyle = '#546e7a'; ctx.fillRect(-30, -20, 60, 40); // Stone Encyclopedia
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0, -5, size/2, 0, Math.PI*2); ctx.fill(); // Cat
        ctx.beginPath(); ctx.moveTo(-10, -15); ctx.lineTo(-5, -5); ctx.lineTo(-15, -5); ctx.fill(); // Ears
        ctx.beginPath(); ctx.moveTo(10, -15); ctx.lineTo(5, -5); ctx.lineTo(15, -5); ctx.fill();
    }
    else if (shape === 'mirror') {
        ctx.shadowBlur = 20; ctx.shadowColor = color;
        ctx.beginPath(); ctx.ellipse(0, 0, 15, 30, 0, 0, Math.PI*2); ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.stroke();
        ctx.shadowBlur = 0;
    }
    else if (shape === 'sign') {
        ctx.fillRect(-5, -20, 10, 40); // post
        ctx.fillRect(-20, -15, 40, 15); // board
    }

    ctx.restore();
}

function draw() {
    // Clear screen
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, width, height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Draw Map
    if(mapTiles) ctx.drawImage(mapTiles, 0, 0);

    // Sort entities for Y-depth rendering
    let entities = [...npcs.map(n => ({...n, type: 'npc'})), { x: player.x, y: player.y, size: player.size, color: player.color, type: 'player' }];
    entities.sort((a, b) => a.y - b.y);

    nearestNPC = null;
    let minDist = Infinity;

    // Draw entities & shadows
    entities.forEach(ent => {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.ellipse(ent.x, ent.y + Math.max(15, (ent.size||24)/2), (ent.size||24), (ent.size||24)/2.5, 0, 0, Math.PI*2);
        ctx.fill();

        if (ent.type === 'npc') {
            drawShape(ctx, ent.shape, ent.x, ent.y, 20, ent.color);
            
            // Interaction Check
            let dist = Math.hypot(player.x - ent.x, player.y - ent.y);
            if(dist < 80 && dist < minDist) {
                minDist = dist;
                nearestNPC = ent;
            }
        } else {
            drawShape(ctx, 'player', ent.x, ent.y, ent.size, ent.color);
            
            // Click-to-walk marker
            if (player.destX !== null && player.destY !== null) {
                ctx.strokeStyle = 'rgba(100, 255, 218, 0.4)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(player.destX, player.destY, 10 - (player.animData%5), 0, Math.PI*2);
                ctx.stroke();
            }
        }
    });

    // Draw interaction prompt overhead
    if (nearestNPC && !isDialogActive) {
        let bob = Math.sin(Date.now() / 200) * 5;
        ctx.fillStyle = 'white';
        ctx.font = '14px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("Press SPACE", nearestNPC.x, nearestNPC.y - 45 + bob);
        
        ctx.fillStyle = nearestNPC.color;
        ctx.beginPath();
        ctx.arc(nearestNPC.x, nearestNPC.y - 30 + bob, 5, 0, Math.PI*2);
        ctx.fill();
    }

    ctx.restore();

    // Lighting Overlay System (Premium feel)
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(7, 10, 15, 0.4)'; // Dark environment tint
    ctx.fillRect(0, 0, width, height);

    ctx.globalCompositeOperation = 'destination-out';
    // Light around player
    let grad = ctx.createRadialGradient(player.x - camera.x, player.y - camera.y, 0, player.x - camera.x, player.y - camera.y, 250);
    grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(player.x - camera.x, player.y - camera.y, 250, 0, Math.PI * 2);
    ctx.fill();

    // Light around NPCs
    npcs.forEach(npc => {
        let nGrad = ctx.createRadialGradient(npc.x - camera.x, npc.y - camera.y, 0, npc.x - camera.x, npc.y - camera.y, 100);
        nGrad.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
        nGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = nGrad;
        ctx.beginPath();
        ctx.arc(npc.x - camera.x, npc.y - camera.y, 100, 0, Math.PI * 2);
        ctx.fill();
    });
    
    ctx.globalCompositeOperation = 'source-over';
}


/**
 * DIALOG AND UI MANAGEMENT
 */
const dialogContainer = document.getElementById('dialog-container');
const dialogTitleText = document.getElementById('title-text');
const dialogText = document.getElementById('dialog-text');
const dialogButtons = document.getElementById('dialog-buttons');

let typingInterval;
let currentDialogContent = "";

function openDialog(npc) {
    isDialogActive = true;
    keys[" "] = false; // Reset space lock
    
    dialogTitleText.innerHTML = `${npc.name} <span style="font-weight: 300; font-size:1rem; color: #fff;">| ${npc.role}</span>`;
    dialogTitleText.style.color = npc.color;
    
    // Clear and build buttons
    dialogButtons.innerHTML = "";
    npc.links.forEach(link => {
        const a = document.createElement('a');
        a.href = link.url;
        a.target = "_blank";
        a.className = "dialog-btn";
        a.innerText = link.text;
        dialogButtons.appendChild(a);
    });

    dialogContainer.classList.add('active');

    // Typewriter effect
    currentDialogContent = npc.dialog;
    dialogText.innerHTML = "";
    clearInterval(typingInterval);
    
    let i = 0;
    typingInterval = setInterval(() => {
        dialogText.innerHTML += currentDialogContent.charAt(i);
        i++;
        if (i >= currentDialogContent.length) {
            clearInterval(typingInterval);
            typingInterval = null;
        }
    }, 20);
}

function skipTyping() {
    clearInterval(typingInterval);
    typingInterval = null;
    dialogText.innerHTML = currentDialogContent;
}

function closeDialog() {
    isDialogActive = false;
    dialogContainer.classList.remove('active');
    clearInterval(typingInterval);
    typingInterval = null;
    currentDialogContent = "";
}

/**
 * TIMER LOGIC
 */
function updateTimer() {
    const anchor = new Date("2026-06-26T02:42:50Z").getTime();
    let diff = Math.abs(Date.now() - anchor) / 1000;
    
    const h = String(Math.floor(diff / 3600)).padStart(4, '0');
    diff %= 3600;
    const m = String(Math.floor(diff / 60)).padStart(2, '0');
    const s = String(Math.floor(diff % 60)).padStart(2, '0');
    
    document.getElementById('timer-display').innerText = `T-${h}:${m}:${s}`;
}
setInterval(updateTimer, 1000);
updateTimer();


/**
 * MAIN LOOP
 */
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Start
loop();
</script>
