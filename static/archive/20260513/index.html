<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper | Software Engineer</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@100;400&display=swap" rel="stylesheet">
    <!-- Matter.js Physics Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <style>
        :root {
            --bg-color: #060913;
            --bg-grid: rgba(255, 255, 255, 0.03);
            --cyan: #00f0ff;
            --magenta: #ff003c;
            --glass-bg: rgba(20, 30, 50, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
            --metallic-gradient: linear-gradient(to bottom, #ffffff 0%, #b4bcf0 40%, #7b8de6 50%, #4f63c2 55%, #c8cff4 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Animated Grid Background */
        .background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, var(--bg-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--bg-grid) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            perspective: 500px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 2.5rem 1rem 1rem 1rem;
            z-index: 10;
        }

        h1.metallic {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: var(--metallic-gradient);
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3));
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: #cbd5e1;
            margin-bottom: 0.8rem;
        }

        .holo-text {
            font-size: 0.9rem;
            font-style: italic;
            color: rgba(255, 255, 255, 0.7);
            animation: holoPulse 3s infinite alternate;
        }

        @keyframes holoPulse {
            0% { text-shadow: 1px 1px 3px rgba(0,255,255,0.4), -1px -1px 3px rgba(255,0,255,0.4); }
            100% { text-shadow: 2px 2px 8px rgba(0,255,255,0.8), -2px -2px 8px rgba(255,0,255,0.8); }
        }

        /* Main Stage (Claw Machine) */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        #machine-wrapper {
            width: 100%; maxWidth: 840px;
            display: flex; justify-content: center;
            position: relative;
        }

        #machine-container {
            width: 800px; height: 600px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(0,240,255,0.05);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            position: relative;
            transform-origin: top center;
            cursor: pointer;
            overflow: hidden;
        }

        /* Decorative Machine Accents */
        .machine-accent {
            position: absolute; border-radius: 5px;
            background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
        }
        .accent-top { top: 0; left: 5%; width: 90%; height: 3px; background: var(--magenta); box-shadow: 0 0 10px var(--magenta); }
        .accent-left { top: 5%; left: 0; width: 3px; height: 90%; }
        .accent-right { top: 5%; right: 0; width: 3px; height: 90%; }
        
        #chute {
            position: absolute;
            bottom: 20px; right: 20px;
            width: 120px; height: 100px;
            border: 2px solid rgba(255, 0, 60, 0.4);
            border-radius: 10px;
            background: rgba(255, 0, 60, 0.05);
            box-shadow: inset 0 0 20px rgba(255,0,60,0.2), 0 0 20px rgba(255,0,60,0.1);
        }

        /* Real-time sync DOM layer for Physics */
        #physics-layer { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; }

        .capsule {
            position: absolute;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff 0%, rgba(0, 240, 255, 0.8) 20%, rgba(10, 15, 40, 0.9) 80%);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.4), 0 0 15px rgba(0,240,255,0.5);
            transform-origin: center center;
            will-change: transform;
            transition:  box-shadow 0.3s, background 0.3s;
        }

        .capsule.used {
            background: radial-gradient(circle at 30% 30%, rgba(200,200,200,0.3) 0%, rgba(50,50,50,0.4) 80%);
            box-shadow: inset 0 0 5px rgba(255,255,255,0.1);
            filter: grayscale(100%);
        }

        /* Mechanical Claw */
        #claw-assembly {
            position: absolute; top: 0; left: 400px;
            transform: translateX(-50%);
            width: 60px; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
            z-index: 5;
        }
        #claw-rod {
            width: 6px; height: 50px; /* height dynamic via JS */
            background: linear-gradient(to right, #666 0%, #ddd 50%, #666 100%);
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
        }
        #claw-base {
            width: 40px; height: 20px;
            background: linear-gradient(to bottom, #999, #444);
            border-radius: 5px 5px 2px 2px;
            position: relative;
        }
        .claw-prong {
            position: absolute; top: 18px; width: 15px; height: 40px;
            border: 4px solid #aaa; border-top: none; 
            border-radius: 0 0 10px 10px;
            transition: transform 0.3s;
        }
        .prong-left { left:-5px; border-right: none; border-radius: 0 0 0 20px; transform-origin: top right; }
        .prong-right { right:-5px; border-left: none; border-radius: 0 0 20px 0; transform-origin: top left; }
        .grabbing .prong-left { transform: rotate(-25deg); }
        .grabbing .prong-right { transform: rotate(25deg); }

        /* Modal / Project View */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
        #modal-overlay.active { opacity: 1; pointer-events: all; }
        
        #modal-content {
            background: rgba(15, 20, 35, 0.85); border: 1px solid var(--cyan);
            border-radius: 20px; padding: 3rem; max-width: 600px; width: 90%;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(0,240,255,0.1);
            transform: translateY(50px); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #modal-overlay.active #modal-content { transform: translateY(0); }
        
        .modal-icon svg { width: 80px; height: 80px; margin-bottom: 1rem; filter: drop-shadow(0 0 10px var(--cyan)); }
        #modal-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--cyan); margin-bottom: 1rem; }
        #modal-desc { font-size: 1.1rem; line-height: 1.6; color: #cbd5e1; margin-bottom: 2rem; }
        
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 2.5rem; }
        
        .btn-link {
            text-decoration: none; color: #fff; background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.5); padding: 0.8rem 1.5rem; border-radius: 8px;
            font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
        }
        .btn-link:hover {
            background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); transform: translateY(-2px);
        }

        .btn-close {
            background: none; border: none; color: var(--magenta); font-family: 'Inter', sans-serif;
            font-size: 1rem; cursor: pointer; border-bottom: 1px dashed var(--magenta); padding-bottom: 2px;
            transition: color 0.2s;
        }
        .btn-close:hover { color: #ff4d79; text-shadow: 0 0 8px rgba(255,0,60,0.5); }

        /* Footer */
        footer {
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: #64748b;
            background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.05); z-index: 10;
        }
        .timer-glow { color: var(--magenta); text-shadow: 0 0 5px rgba(255,0,60,0.4); font-size: 0.9rem;}

        @media (max-width: 768px) {
            footer { flex-direction: column; gap: 0.5rem; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <header>
        <h1 class="metallic">Geva Kipper</h1>
        <p class="subtitle">Currently a Software Engineer building impactful solutions at Google.</p>
        <p class="holo-text">This website is re-designed every single day by AI, producing an ever-changing, unique digital experience.</p>
    </header>

    <main>
        <div id="machine-wrapper">
            <div id="machine-container">
                <!-- Machine Accents -->
                <div class="machine-accent accent-top"></div>
                <div class="machine-accent accent-left"></div>
                <div class="machine-accent accent-right"></div>
                
                <div id="chute"></div>

                <!-- DOM Representation of Physics Objects -->
                <div id="physics-layer"></div>

                <!-- Claw -->
                <div id="claw-assembly">
                    <div id="claw-rod"></div>
                    <div id="claw-base" class="open">
                        <div class="claw-prong prong-left"></div>
                        <div class="claw-prong prong-right"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div>Concept and design generated by an AI Language Model.</div>
        <div>Temporal distance from 2026-05-13 02:35:32: <span id="timer" class="timer-glow">00:00:00</span></div>
    </footer>

    <!-- Project Reveal Modal -->
    <div id="modal-overlay">
        <div id="modal-content">
            <div id="modal-icon" class="modal-icon"></div>
            <h2 id="modal-title"></h2>
            <p id="modal-desc"></p>
            <div id="modal-buttons" class="btn-group"></div>
            <button class="btn-close" id="btn-close">Drop back into the pile</button>
        </div>
    </div>

    <script>
        /* --- Data Definitions --- */
        const svgColors = { cyan: '#00f0ff', magenta: '#ff003c', white: '#fff' };
        
        const projects = [
            {
                id: 0,
                title: "GlglStats",
                icon: `<svg viewBox="0 0 100 100"><path d="M20 50 L35 20 L50 80 L65 30 L80 50" stroke="${svgColors.magenta}" stroke-width="6" fill="none" stroke-linejoin="round" /></svg>`,
                desc: "A Python project measuring the repetitiveness of Israeli pop-chart songs using LZ77 compression, complete with visual patterns of famous tracks.",
                buttons: [
                    { text: "Live Project", url: "https://glglstats.geekip.dev" },
                    { text: "PyData TLV Presentation", url: "https://www.youtube.com/watch?v=jrKAtOsj1Lo" }
                ]
            },
            {
                id: 1,
                title: "Ahuzat Dibuk",
                icon: `<svg viewBox="0 0 100 100"><rect x="20" y="20" width="20" height="20" fill="${svgColors.cyan}" opacity="0.4"/><rect x="40" y="20" width="20" height="20" fill="${svgColors.magenta}" opacity="0.9"/><rect x="60" y="20" width="20" height="20" fill="${svgColors.cyan}" opacity="0.2"/><rect x="20" y="40" width="20" height="20" fill="${svgColors.magenta}" opacity="0.6"/><rect x="40" y="40" width="20" height="20" fill="${svgColors.cyan}" opacity="0.8"/><rect x="60" y="40" width="20" height="20" fill="${svgColors.magenta}" opacity="0.3"/></svg>`,
                desc: "A Python scraping and data visualization tool that tracks Tel-Aviv parking lot occupancy for residents.",
                buttons: [
                    { text: "Channel 13 News", url: "https://13tv.co.il/item/news/domestic/internal/parking-902956407/" },
                    { text: "Mako Feature", url: "https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm" },
                    { text: "Secret Tel-Aviv Launch", url: "https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/" }
                ]
            },
            {
                id: 2,
                title: "2D Part Orienting",
                icon: `<svg viewBox="0 0 100 100"><polygon points="50,15 85,40 70,85 30,85 15,40" stroke="${svgColors.cyan}" stroke-width="4" fill="none"/><circle cx="50" cy="50" r="3" fill="${svgColors.white}"/></svg>`,
                desc: "A C++ implementation within an open-source computational geometry library, detailing an efficient algorithm for constructing a push plan to orient polygons.",
                buttons: [
                    { text: "View Code & Documentation", url: "https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/" }
                ]
            },
            {
                id: 3,
                title: "The Turing Jest",
                icon: `<svg viewBox="0 0 100 100"><path d="M25 40 Q25 20 50 20 Q75 20 75 40 L75 60 Q75 80 50 80 Q25 80 25 60 Z" stroke="${svgColors.magenta}" stroke-width="4" fill="none"/><rect x="35" y="45" width="8" height="8" fill="${svgColors.cyan}"/><rect x="57" y="45" width="8" height="8" fill="${svgColors.cyan}"/><path d="M40 65 L60 65" stroke="${svgColors.white}" stroke-width="3"/></svg>`,
                desc: "An LMSYS-like arena where LLMs compete in crafting and explaining puns, subject to user ratings.",
                buttons: [
                    { text: "Enter the Arena", url: "https://jest.geekip.dev" }
                ]
            },
            {
                id: 4,
                title: "Rhymes of Israel",
                icon: `<svg viewBox="0 0 100 100"><rect x="25" y="15" width="50" height="70" rx="5" stroke="${svgColors.cyan}" stroke-width="4" fill="none"/><line x1="40" y1="30" x2="60" y2="30" stroke="${svgColors.magenta}" stroke-width="3"/><line x1="40" y1="45" x2="60" y2="45" stroke="${svgColors.magenta}" stroke-width="3"/><circle cx="50" cy="70" r="8" stroke="${svgColors.white}" stroke-width="2" fill="none"/></svg>`,
                desc: "A Chrome extension utilizing an LLM to rewrite Israeli news headlines into comedic, highschool-yearbook-style rhymes.",
                buttons: [
                    { text: "Install Extension", url: "https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb" }
                ]
            },
            {
                id: 5,
                title: "Hatul Basak",
                icon: `<svg viewBox="0 0 100 100"><path d="M30 30 h15 v-10 a10 10 0 1 1 20 0 v10 h15 v20 h10 a10 10 0 1 1 0 20 h-10 v15 h-50 v-55" stroke="${svgColors.magenta}" stroke-width="4" fill="none" stroke-linejoin="round"/></svg>`,
                desc: "A Hebrew port of catfishing.net, featuring AI-generated daily Wikipedia trivia challenges and user-created themed puzzles.",
                buttons: [
                    { text: "Play & Create", url: "https://hatulbasak.geekip.dev" }
                ]
            },
            {
                id: 6,
                title: "The Meta Portfolio",
                icon: `<svg viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" rx="3" stroke="${svgColors.cyan}" stroke-width="4" fill="none"/><rect x="35" y="35" width="30" height="30" rx="2" stroke="${svgColors.magenta}" stroke-width="3" fill="none"/><circle cx="50" cy="50" r="5" fill="${svgColors.white}"/></svg>`,
                desc: "The hyper-aware, self-referential nature of the site you are experiencing right now. Re-designed daily.",
                buttons: [
                    { text: "Geekip.dev", url: "https://geekip.dev" }
                ]
            },
            {
                id: 7,
                title: "Connections",
                icon: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="8" fill="${svgColors.cyan}"/><circle cx="20" cy="30" r="6" fill="${svgColors.magenta}"/><circle cx="80" cy="30" r="6" fill="${svgColors.magenta}"/><circle cx="50" cy="85" r="6" fill="${svgColors.magenta}"/><line x1="26" y1="34" x2="44" y2="46" stroke="${svgColors.white}" stroke-width="2"/><line x1="74" y1="34" x2="56" y2="46" stroke="${svgColors.white}" stroke-width="2"/><line x1="50" y1="58" x2="50" y2="79" stroke="${svgColors.white}" stroke-width="2"/></svg>`,
                desc: "Connect, verify source code, or just say hello.",
                buttons: [
                    { text: "GitHub", url: "https://github.com/gevak" },
                    { text: "LinkedIn", url: "https://linkedin.com/in/gevakip" },
                    { text: "Facebook", url: "https://facebook.com/geva.kipper" }
                ]
            }
        ];

        /* --- Global Setup --- */
        const MACHINE_W = 800;
        const MACHINE_H = 600;
        const CAPSULE_RADIUS = 30;
        let scaleFactor = 1;

        // Scale handler to keep physics bounds pure but responsive visually
        function handleResize() {
            const wrapper = document.getElementById('machine-wrapper');
            const container = document.getElementById('machine-container');
            scaleFactor = Math.min(1, wrapper.clientWidth / MACHINE_W);
            container.style.transform = `scale(${scaleFactor})`;
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        /* --- Matter.js Setup --- */
        const Engine = Matter.Engine,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Body = Matter.Body;

        const engine = Engine.create();
        // Lower gravity for floaty effect
        engine.gravity.y = 0.5;

        // Boundaries
        const ground = Bodies.rectangle(MACHINE_W/2, MACHINE_H + 25, MACHINE_W, 50, { isStatic: true });
        const wallLeft = Bodies.rectangle(-25, MACHINE_H/2, 50, MACHINE_H, { isStatic: true });
        const wallRight = Bodies.rectangle(MACHINE_W + 25, MACHINE_H/2, 50, MACHINE_H, { isStatic: true });
        // Angled corners at the bottom to funnel balls inward slightly to avoid sticking
        const cornerLeft = Bodies.rectangle(20, MACHINE_H, 200, 20, { isStatic: true, angle: -Math.PI/6 });
        
        Composite.add(engine.world, [ground, wallLeft, wallRight, cornerLeft]);

        // Creating Capsules
        const physicsLayer = document.getElementById('physics-layer');
        let unvisitedProjects = [...projects];
        let currentCapsuleIdx = -1;

        const capsulesData = [];

        for (let i = 0; i < 8; i++) {
            // Physics Body
            const body = Bodies.circle(
                100 + (i * 80), // X init
                100 + (Math.random() * 200), // Y init
                CAPSULE_RADIUS, 
                { 
                    restitution: 0.8, // Bouncy
                    friction: 0.005,
                    frictionAir: 0.01
                }
            );
            Composite.add(engine.world, body);

            // DOM Element
            const el = document.createElement('div');
            el.className = 'capsule';
            physicsLayer.appendChild(el);

            capsulesData.push({
                body: body,
                element: el,
                projectId: null, // assigned when initialized or reset
                isUsed: false
            });
        }

        /* --- Physics Sync Render Loop --- */
        let mouseX = MACHINE_W / 2;
        let clawRealTarget = { x: MACHINE_W / 2, y: 50 };
        let clawPos = { x: MACHINE_W / 2, y: 50 };
        
        function loop() {
            Engine.update(engine, 1000 / 60);

            // Sync Capsules to DOM
            capsulesData.forEach(cap => {
                const { x, y } = cap.body.position;
                const angle = cap.body.angle;
                // Boundaries protection fallback
                if (y > MACHINE_H + 100) {
                     Body.setPosition(cap.body, {x: MACHINE_W/2, y: 50});
                     Body.setVelocity(cap.body, {x:0, y:0});
                }
                cap.element.style.transform = `translate(${x - CAPSULE_RADIUS}px, ${y - CAPSULE_RADIUS}px) rotate(${angle}rad)`;
            });

            // Smooth Claw follow kinematics
            clawPos.x += (clawRealTarget.x - clawPos.x) * 0.1;
            clawPos.y += (clawRealTarget.y - clawPos.y) * 0.08;

            const assembly = document.getElementById('claw-assembly');
            const rod = document.getElementById('claw-rod');
            
            assembly.style.left = `${clawPos.x}px`;
            // The top of the assembly is at 0, rod extends down to clawPos.y
            rod.style.height = `${clawPos.y}px`;

            if(attachedCapsule) {
                // If a capsule is grabbed, force its physics body to the claw position
                Body.setPosition(attachedCapsule.body, {
                    x: clawPos.x,
                    y: clawPos.y + 45 // offset below the claw base
                });
                Body.setVelocity(attachedCapsule.body, {x:0, y:0});
            }

            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);


        /* --- Interaction Logic --- */
        const machineContainer = document.getElementById('machine-container');
        let gameState = 'IDLE'; // IDLE, GRABBING, MODAL
        let attachedCapsule = null;
        let selectedProject = null;

        // Hover bump effect
        machineContainer.addEventListener('mousemove', (e) => {
            if (gameState !== 'IDLE') return;

            const rect = machineContainer.getBoundingClientRect();
            // Scale mouse coordinates to internal resolution
            const scaledMouseX = (e.clientX - rect.left) / scaleFactor;
            const scaledMouseY = (e.clientY - rect.top) / scaleFactor;
            
            // Allow claw to follow mouse X
            clawRealTarget.x = Math.max(50, Math.min(scaledMouseX, MACHINE_W - 50));
            clawRealTarget.y = 50;

            // Bump capsules lightly
            capsulesData.forEach(cap => {
                const dx = cap.body.position.x - scaledMouseX;
                const dy = cap.body.position.y - scaledMouseY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 80) {
                    const force = 0.0005 * (80 - dist);
                    Body.applyForce(cap.body, cap.body.position, {
                        x: (dx / dist) * force,
                        y: (dy / dist) * force
                    });
                }
            });
        });

        // The Grab Sequence
        const clawBase = document.getElementById('claw-base');

        machineContainer.addEventListener('click', async () => {
            if (gameState !== 'IDLE') return;
            
            // Ensure we have available capsules/projects
            if (unvisitedProjects.length === 0) {
                // Reset all
                unvisitedProjects = [...projects];
                capsulesData.forEach(c => { c.isUsed = false; c.element.classList.remove('used'); });
            }

            gameState = 'GRABBING';

            // 1. Pick a random unused capsule and project
            const availableCapsules = capsulesData.filter(c => !c.isUsed);
            const targetCap = availableCapsules[Math.floor(Math.random() * availableCapsules.length)];
            
            // Get random project for it
            const projectIdx = Math.floor(Math.random() * unvisitedProjects.length);
            selectedProject = unvisitedProjects.splice(projectIdx, 1)[0];

            // 2. Move claw X to target
            clawRealTarget.x = targetCap.body.position.x;
            await wait(600); // Wait for transition

            // 3. Drop claw Y to target
            clawBase.classList.remove('grabbing');
            clawRealTarget.y = targetCap.body.position.y - 45; 
            await wait(800);

            // 4. Attach
            clawBase.classList.add('grabbing');
            attachedCapsule = targetCap;
            Body.setStatic(attachedCapsule.body, true); // disable gravity for it
            await wait(300);

            // 5. Retract Y
            clawRealTarget.y = 50;
            await wait(800);

            // 6. Move X to Chute
            clawRealTarget.x = MACHINE_W - 80;
            await wait(800);

            // 7. Drop
            clawBase.classList.remove('grabbing');
            Body.setStatic(attachedCapsule.body, false);
            attachedCapsule = null;
            
            // Wait for it to fall into chute
            setTimeout(() => {
                openModal();
            }, 800);
        });

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }


        /* --- Modal Logic --- */
        const modalOverlay = document.getElementById('modal-overlay');
        const btnClose = document.getElementById('btn-close');

        function openModal() {
            gameState = 'MODAL';
            
            // Populate Modal
            document.getElementById('modal-icon').innerHTML = selectedProject.icon;
            document.getElementById('modal-title').innerText = selectedProject.title;
            
            if(selectedProject.id === 7) {
                 document.getElementById('modal-desc').style.display = 'none';
            } else {
                 document.getElementById('modal-desc').style.display = 'block';
                 document.getElementById('modal-desc').innerText = selectedProject.desc;
            }

            const btnContainer = document.getElementById('modal-buttons');
            btnContainer.innerHTML = '';
            selectedProject.buttons.forEach(btn => {
                const a = document.createElement('a');
                a.href = btn.url;
                a.target = '_blank';
                a.className = 'btn-link';
                a.innerText = btn.text;
                btnContainer.appendChild(a);
            });

            modalOverlay.classList.add('active');
        }

        btnClose.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            
            // Re-spawn requested capsule at the top to fall back into the pile
            // Find the capsule that just fell into the chute
            const droppedCap = capsulesData.find(c => c.body.position.x > MACHINE_W - 150 && c.body.position.y > MACHINE_H - 120);
            
            if (droppedCap) {
                droppedCap.isUsed = true;
                droppedCap.element.classList.add('used');
                // Teleport to top left to let it fall back in
                Body.setPosition(droppedCap.body, { x: 100, y: 50 });
                Body.setVelocity(droppedCap.body, { x: 5, y: -2 }); // Little toss
            }

            gameState = 'IDLE';
            clawRealTarget.x = MACHINE_W / 2; // return to center
        });


        /* --- Footer Clock --- */
        const targetDate = new Date("2026-05-13T02:35:32");
        const timerEl = document.getElementById('timer');
        
        setInterval(() => {
            const now = new Date();
            const diffSeconds = Math.abs(Math.floor((targetDate - now) / 1000));
            
            const h = Math.floor(diffSeconds / 3600);
            const m = Math.floor((diffSeconds % 3600) / 60);
            const s = Math.floor(diffSeconds % 60);
            
            timerEl.innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }, 1000);

    </script>
