<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Geva Kipper - AI Generated Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-cyan: #00ffff;
            --space-bg-1: #2a2a40;
            --space-bg-2: #05050a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: radial-gradient(circle at center, var(--space-bg-1) 0%, var(--space-bg-2) 100%);
            font-family: 'Space Grotesk', sans-serif;
            color: white;
            user-select: none;
        }

        #canvas-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        /* Glassmorphic UI Layer */
        .hud {
            position: absolute; z-index: 10; pointer-events: none;
            display: flex; flex-direction: column;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            pointer-events: auto;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        #top-left {
            top: 2rem; left: 2rem; padding: 1.5rem; max-width: 450px;
        }

        #top-left h1 {
            margin: 0 0 0.5rem 0; font-size: 2.2rem; font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8); letter-spacing: -1px;
        }

        #top-left h2 {
            margin: 0 0 1rem 0; font-size: 1rem; font-weight: 400; opacity: 0.9;
        }

        #top-left p {
            margin: 0; font-family: 'Roboto Mono', monospace; font-size: 0.75rem;
            color: #aaa; line-height: 1.4;
        }

        #bottom-center {
            bottom: 2rem; left: 50%; transform: translateX(-50%);
            padding: 0.8rem 1.5rem; border-radius: 50px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center;
        }

        .footer-text { font-size: 0.85rem; color: #ccc; }
        
        .stopwatch {
            font-family: 'Roboto Mono', monospace; font-weight: 700;
            color: var(--neon-cyan); letter-spacing: 1px;
            text-shadow: 0 0 8px var(--neon-cyan), 0 0 15px var(--neon-cyan);
        }

        /* Modal / Expanded Content */
        #modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
            display: flex; align-items: center; justify-content: center;
        }
        #modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: rgba(20, 20, 30, 0.85); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem; border-radius: 20px; max-width: 600px; width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.9) translateY(20px); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0; display: none;
        }
        
        #modal-overlay.active .modal-content {
            transform: scale(1) translateY(0); opacity: 1; display: block;
        }

        .close-btn {
            position: absolute; top: 20px; right: 25px; cursor: pointer;
            font-size: 2rem; color: white; opacity: 0.5; transition: 0.3s;
            font-family: 'Space Grotesk', sans-serif;
            background: none; border: none; padding: 0;
        }
        .close-btn:hover { opacity: 1; transform: scale(1.1); }

        .modal-title { font-size: 2.5rem; margin-top: 0; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.4); }
        .modal-desc { font-size: 1.1rem; line-height: 1.6; color: #ddd; margin-bottom: 2rem; }

        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 12px 24px; border-radius: 30px; font-weight: bold; text-decoration: none;
            color: white; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s; cursor: pointer; gap: 8px;
        }
        .btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-primary { background: #fff; color: #000; }
        .btn-primary:hover { background: #eee; }

        @media (max-width: 768px) {
            #top-left { top: 1rem; left: 1rem; right: 1rem; width: auto; max-width: none; }
            #bottom-center { bottom: 1rem; width: 90%; text-align: center; }
            .modal-content { padding: 2rem; }
            .modal-title { font-size: 1.8rem; }
        }
    </style>
    <!-- Import Maps for ThreeJS and CannonES -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
</head>
<body>

    <!-- Static UI Layer -->
    <div id="top-left" class="hud glass-panel">
        <h1>Geva Kipper</h1>
        <h2>Currently engineering software solutions at Google.</h2>
        <p>This portfolio is re-designed daily by AI; its layout, physics, and chaos are ever-changing.</p>
    </div>

    <div id="bottom-center" class="hud glass-panel">
        <span class="footer-text">Concept conceptualized and hallucinated by AI | Time elapsed since 2026-07-05 02:28:06:</span>
        <span id="stopwatch" class="stopwatch">00:00:00</span>
    </div>

    <div id="modal-overlay">
        <div class="modal-content glass-panel" id="modal-content-box">
            <button class="close-btn" id="close-modal">×</button>
            <h2 class="modal-title" id="m-title">Title</h2>
            <p class="modal-desc" id="m-desc">Description goes here.</p>
            <div class="btn-group" id="m-buttons"></div>
        </div>
    </div>

    <!-- 3D Physics Canvas Container -->
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import * as CANNON from 'cannon-es';

        // ==========================================
        // 1. UI STOPWATCH LOGIC
        // ==========================================
        const targetDate = new Date('2026-07-05T02:28:06Z').getTime();
        const stopwatchEl = document.getElementById('stopwatch');
        
        setInterval(() => {
            const now = Date.now();
            const diff = Math.abs(now - targetDate); // Absolute to always count up/down elegantly
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            stopwatchEl.innerText = `${h}:${m}:${s}`;
        }, 1000);

        // ==========================================
        // 2. PROJECT DATA & GENERATIVE TEXTURES
        // ==========================================
        
        // Helper to draw generative textures via canvas
        function createGenerativeTexture(type, width = 512, height = 512) {
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            if(type === 'glgl') {
                ctx.fillStyle = '#4a0072'; ctx.fillRect(0,0,width,height);
                for(let i=0; i<30; i++) {
                    ctx.fillStyle = `rgba(200, 50, 255, ${Math.random()})`;
                    ctx.fillRect(Math.random()*width, Math.random()*height, Math.random()*20+5, Math.random()*100+20);
                    ctx.font = `${Math.random()*40+20}px Arial`; ctx.fillStyle = '#0ff';
                    ctx.fillText('♫', Math.random()*width, Math.random()*height);
                }
            } else if(type === 'ahuzat') {
                const grad = ctx.createRadialGradient(width/2, height/2, 10, width/2, height/2, width/2);
                grad.addColorStop(0, '#ff4500'); grad.addColorStop(1, '#220000');
                ctx.fillStyle = grad; ctx.fillRect(0,0,width,height);
                for(let i=0; i<100; i++){
                    ctx.fillStyle = `rgba(255, ${Math.random()*150}, 0, ${Math.random()*0.5})`;
                    ctx.beginPath(); ctx.arc(Math.random()*width, Math.random()*height, Math.random()*30, 0, Math.PI*2); ctx.fill();
                }
            } else if (type === 'rhymes_side') {
                ctx.fillStyle = '#eaeaea'; ctx.fillRect(0,0,width,height);
                ctx.fillStyle = '#111'; ctx.font = '24px monospace';
                for(let i=0; i<20; i++) ctx.fillText(Math.random().toString(36).substring(2).toUpperCase() + " HEADLINE NEWS BREAKING", 10, i*30+20);
            } else if (type === 'rhymes_top') {
                ctx.fillStyle = '#fafafa'; ctx.fillRect(0,0,width,height);
                ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2;
                for(let i=0; i<4; i++) {
                    for(let j=0; j<4; j++) { ctx.strokeRect(i*(width/4)+10, j*(height/4)+10, (width/4)-20, (height/4)-20); }
                }
            } else if(type === 'hatul') {
                ctx.fillStyle = '#e5e5e5'; ctx.fillRect(0,0,width,height);
                ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
                for(let i=0; i<width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.stroke(); }
                for(let i=0; i<height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(width,i); ctx.stroke(); }
                ctx.lineWidth = 15; ctx.strokeStyle = '#ffd700'; ctx.strokeRect(0,0,width,height);
            } else if(type === 'social') {
                ctx.fillStyle = '#111'; ctx.fillRect(0,0,width,height);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 80px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline='middle';
                ctx.fillText("{ LINKEDIN }", width/2, height/2 - 80);
                ctx.fillText("< GITHUB >", width/2, height/2);
                ctx.fillText("[ FACEBOOK ]", width/2, height/2 + 80);
            }
            return new THREE.CanvasTexture(canvas);
        }

        const projectData = [
            {
                id: 'glgl', mass: 1.5, shape: 'box', size: [1.2, 2, 1.2],
                title: "GlglStats",
                desc: "Algorithmic measurement of Israeli pop-chart repetitiveness utilizing Python and LZ77 pattern visualization.",
                buttons: [
                    { label: "Website", url: "https://glglstats.geekip.dev", icon: "🌐", primary: true },
                    { label: "PyData TLV Presentation", url: "https://www.youtube.com/watch?v=jrKAtOsj1Lo", icon: "▶" }
                ],
                setupMesh: (geo) => new THREE.Mesh(geo, new THREE.MeshPhysicalMaterial({
                    map: createGenerativeTexture('glgl'), transmission: 0.8, transparent: true, opacity: 0.9, color: 0xa020f0, roughness: 0.2
                }))
            },
            {
                id: 'ahuzat', mass: 2, shape: 'box', size: [1.5, 1.5, 1.5],
                title: "Ahuzat Dibuk",
                desc: "Python scraping and aggressive data visualization exposing Tel-Aviv parking lot occupancy trends mapped as urban heat.",
                buttons: [
                    { label: "Channel 13 Press", url: "https://13tv.co.il/item/news/domestic/internal/parking-902956407/" },
                    { label: "Mako Coverage", url: "https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm" },
                    { label: "Secret Tel Aviv", url: "https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/", primary: true }
                ],
                setupMesh: (geo) => new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
                    map: createGenerativeTexture('ahuzat'), emissive: 0xff4500, emissiveIntensity: 0.3, roughness: 0.6
                }))
            },
            {
                id: '2dpart', mass: 1.2, shape: 'poly', size: [1.3],
                title: "2D Part Orienting",
                desc: "C++ computational geometry library implementation of the efficient push-plan algorithm. A complex, asymmetrical structural approach.",
                buttons: [ { label: "</> View Repository natively at TAU", url: "https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/", primary: true } ],
                setupMesh: (geo) => {
                    const mat = new THREE.MeshStandardMaterial({ color: 0x0055ff, flatShading: true, roughness: 0.4 });
                    const mesh = new THREE.Mesh(geo, mat);
                    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: 0x00ffff }));
                    mesh.add(edges); return mesh;
                }
            },
            {
                id: 'turing', mass: 1, shape: 'box', size: [1.4, 1.4, 1.4],
                title: "The Turing Jest",
                desc: "An LMSYS-style arena for LLM pun battles. Two models enter, one joke wins based on pure human rating.",
                buttons: [ { label: "Enter the Arena", url: "https://jest.geekip.dev", primary: true, icon: "⚔️" } ],
                setupMesh: (geo) => {
                    const materials = [
                        new THREE.MeshStandardMaterial({ color: 0x008080 }), // Teal
                        new THREE.MeshStandardMaterial({ color: 0xff8c00 }), // Orange
                        new THREE.MeshStandardMaterial({ color: 0x008080 }),
                        new THREE.MeshStandardMaterial({ color: 0xff8c00 }),
                        new THREE.MeshStandardMaterial({ color: 0x111111 }),
                        new THREE.MeshStandardMaterial({ color: 0x111111 })
                    ];
                    return new THREE.Mesh(geo, materials);
                }
            },
            {
                id: 'rhymes', mass: 1.8, shape: 'box', size: [1.6, 1.6, 1.6],
                title: "Rhymes of Israel",
                desc: "A Chrome Extension twisting standard Israeli news headlines into comedic, LLM-generated rhymes in real-time.",
                buttons: [ { label: "Install Extension", url: "https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb", primary: true } ],
                setupMesh: (geo) => {
                    const side = new THREE.MeshStandardMaterial({ map: createGenerativeTexture('rhymes_side') });
                    const top = new THREE.MeshStandardMaterial({ map: createGenerativeTexture('rhymes_top') });
                    return new THREE.Mesh(geo, [side, side, top, top, side, side]);
                }
            },
            {
                id: 'hatul', mass: 2.2, shape: 'box', size: [1.5, 1.5, 1.5],
                title: "Hatul Basak",
                desc: "Hebrew catfishing.net trivia port featuring daily AI-generated puzzles intertwined within a Wikipedia-esque grid architecture.",
                buttons: [ { label: "Play & Create", url: "https://hatulbasak.geekip.dev", primary: true, icon: "🧩" } ],
                setupMesh: (geo) => new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ map: createGenerativeTexture('hatul'), roughness: 0.1, metalness: 0.5 }))
            },
            {
                id: 'meta', mass: 3, shape: 'box', size: [1.2, 1.2, 1.2],
                title: "Meta-Portfolio Box",
                desc: "A self-referential holographic mirror reflecting the surrounding void, representing the very site housing it.",
                buttons: [ { label: "Loop Back (geekip.dev)", url: "https://geekip.dev", primary: true, icon: "∞" } ],
                // Mesh setup deferred to scene creation to enable CubeCamera
                setupMesh: null 
            },
            {
                id: 'social', mass: 5, shape: 'box', size: [1.5, 1.5, 1.5],
                title: "The Social Hub",
                desc: "An ultra-matte obsidian gravity well anchoring external connections securely.",
                buttons: [
                    { label: "GitHub", url: "https://github.com/gevak", primary: true },
                    { label: "LinkedIn", url: "https://linkedin.com/in/gevakip" },
                    { label: "Facebook", url: "https://facebook.com/geva.kipper" }
                ],
                setupMesh: (geo) => new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
                    map: createGenerativeTexture('social'), emissiveMap: createGenerativeTexture('social'), emissive: 0xffffff, emissiveIntensity: 0.2, color: 0x111111, roughness: 0.9, metalness: 0.1
                }))
            }
        ];

        // ==========================================
        // 3. ENGINE SETUP (Three.js + Cannon-es)
        // ==========================================
        const container = document.getElementById('canvas-container');
        
        // Scene & Camera
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2('#0d0d1a', 0.02);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 15);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x202040, 1.5);
        scene.add(ambientLight);
        
        const coreLight = new THREE.PointLight(0xffffff, 2, 50);
        coreLight.position.set(0, 0, 2);
        scene.add(coreLight);

        const dirLight = new THREE.DirectionalLight(0xaabbff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Physics World
        const world = new CANNON.World({ gravity: new CANNON.Vec3(0, 0, 0) });
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.solver.iterations = 10;
        
        // Physics Bounds (Invisible walls)
        const wallMaterial = new CANNON.Material('wall');
        const blockMaterial = new CANNON.Material('block');
        const physicsContact = new CANNON.ContactMaterial(wallMaterial, blockMaterial, { friction: 0.1, restitution: 0.6 });
        world.addContactMaterial(physicsContact);
        const blockToBlock = new CANNON.ContactMaterial(blockMaterial, blockMaterial, { friction: 0.3, restitution: 0.5 });
        world.addContactMaterial(blockToBlock);

        function createWall(x, y, z, rx, ry, rz) {
            const body = new CANNON.Body({ mass: 0, material: wallMaterial, shape: new CANNON.Plane() });
            body.position.set(x, y, z); body.quaternion.setFromEuler(rx, ry, rz);
            world.addBody(body);
        }
        
        // Calculate frustum bounds at z=0 to create walls just outside view
        const frustumHeight = 2 * Math.tan((camera.fov * Math.PI) / 180 / 2) * camera.position.z;
        const frustumWidth = frustumHeight * camera.aspect;
        
        createWall(0, -frustumHeight/2 - 1, 0, -Math.PI/2, 0, 0); // Bottom
        createWall(0, frustumHeight/2 + 1, 0, Math.PI/2, 0, 0);  // Top
        createWall(-frustumWidth/2 - 1, 0, 0, 0, Math.PI/2, 0);   // Left
        createWall(frustumWidth/2 + 1, 0, 0, 0, -Math.PI/2, 0);    // Right
        createWall(0, 0, -5, 0, 0, 0);                           // Back
        createWall(0, 0, 5, 0, Math.PI, 0);                      // Front (keep them from flying to cam)

        // ==========================================
        // 4. OBJECT CREATION
        // ==========================================
        const blocks = [];
        
        // Setup CubeCamera for Meta box
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256, { format: THREE.RGBAFormat, generateMipmaps: true, minFilter: THREE.LinearMipmapLinearFilter });
        const cubeCamera = new THREE.CubeCamera(1, 1000, cubeRenderTarget);
        scene.add(cubeCamera);

        projectData.forEach((data, index) => {
            // 1. Physics Body
            let shape, geometry;
            if(data.shape === 'box') {
                const [w, h, d] = data.size;
                shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2));
                geometry = new THREE.BoxGeometry(w, h, d);
            } else {
                 geometry = new THREE.DodecahedronGeometry(data.size[0]);
                 const vertices = geometry.attributes.position.array;
                 const points = [];
                 for(let i=0; i<vertices.length; i+=3) points.push(new CANNON.Vec3(vertices[i], vertices[i+1], vertices[i+2]));
                 const faces = [];
                 for(let i=0; i<geometry.index.array.length; i+=3) faces.push([geometry.index.array[i], geometry.index.array[i+1], geometry.index.array[i+2]]);
                 shape = new CANNON.ConvexPolyhedron({ vertices: points, faces: faces });
            }

            const body = new CANNON.Body({ mass: data.mass, material: blockMaterial, shape: shape, linearDamping: 0.1, angularDamping: 0.1 });
            
            // Random start position within bounds
            body.position.set((Math.random()-0.5)*(frustumWidth-4), (Math.random()-0.5)*(frustumHeight-4), (Math.random()-0.5)*2);
            body.velocity.set((Math.random()-0.5)*5, (Math.random()-0.5)*5, (Math.random()-0.5)*5);
            body.angularVelocity.set(Math.random(), Math.random(), Math.random());
            world.addBody(body);

            // 2. Visual Mesh
            let mesh;
            if(data.id === 'meta') {
                const mat = new THREE.MeshStandardMaterial({ envMap: cubeRenderTarget.texture, roughness: 0, metalness: 1 });
                mesh = new THREE.Mesh(geometry, mat);
            } else {
                mesh = data.setupMesh(geometry);
            }
            
            mesh.userData = { id: data.id, dRef: data, body: body, isDragging: false };
            scene.add(mesh);
            blocks.push({ mesh, body, data });
        });

        // ==========================================
        // 5. INTERACTION LOGIC
        // ==========================================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        let dragPlane = new THREE.Plane();
        let dragIntersection = new THREE.Vector3();
        let selectedBlock = null;
        let isActiveModal = false;
        
        // Gravity Control
        let targetGravity = new CANNON.Vec3(0, 0, 0);
        
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if(!isActiveModal && !selectedBlock) {
                // Interactive Gravity: Pulls towards mouse
                targetGravity.set(mouse.x * 10, mouse.y * 10, 0);
            }

            if(selectedBlock && selectedBlock.mesh.userData.isDragging) {
                raycaster.setFromCamera(mouse, camera);
                raycaster.ray.intersectPlane(dragPlane, dragIntersection);
                
                // Spring physics to follow cursor
                const force = 10;
                const dist = dragIntersection.sub(selectedBlock.mesh.position);
                selectedBlock.body.velocity.set(dist.x*force, dist.y*force, dist.z*force);
            }
        });

        // Device Gyroscope (Mobile Gravity)
        window.addEventListener('deviceorientation', (e) => {
            if(!isActiveModal && !selectedBlock && e.beta && e.gamma) {
                // Clamp and normalize
                const x = e.gamma / 45; // Left/Right
                const y = -e.beta / 45; // Up/Down
                targetGravity.set(x * 15, y * 15, 0);
            }
        });

        let clickTime = 0;

        window.addEventListener('mousedown', (e) => {
            if(isActiveModal) return;
            clickTime = Date.now();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks.map(b => b.mesh), false);
            
            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                const blockInfo = blocks.find(b => b.mesh === mesh);
                selectedBlock = blockInfo;
                selectedBlock.mesh.userData.isDragging = true;
                
                // Define plane for dragging parallel to camera view
                dragPlane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()), mesh.position);
            }
        });

        window.addEventListener('mouseup', () => {
            if(isActiveModal) return;
            if (selectedBlock) {
                selectedBlock.mesh.userData.isDragging = false;
                
                // Distinguish click vs drag
                if(Date.now() - clickTime < 200) {
                    openModal(selectedBlock);
                }
                selectedBlock = null;
            }
        });

        // Touch support mapping to mouse events natively (simple translation)
        window.addEventListener('touchstart', (e) => { if(e.touches.length > 0) { e.clientX = e.touches[0].clientX; e.clientY = e.touches[0].clientY; window.dispatchEvent(new MouseEvent('mousedown', {clientX: e.clientX, clientY: e.clientY})); window.dispatchEvent(new MouseEvent('mousemove', {clientX: e.clientX, clientY: e.clientY})); } }, {passive:false});
        window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) { e.clientX = e.touches[0].clientX; e.clientY = e.touches[0].clientY; window.dispatchEvent(new MouseEvent('mousemove', {clientX: e.clientX, clientY: e.clientY})); } }, {passive:false});
        window.addEventListener('touchend', (e) => { window.dispatchEvent(new Event('mouseup')); }, {passive:false});


        // ==========================================
        // 6. MODAL & PRESENTATION LOGIC
        // ==========================================
        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('m-title');
        const modalDesc = document.getElementById('m-desc');
        const modalButtons = document.getElementById('m-buttons');
        const btnClose = document.getElementById('close-modal');

        let originalState = {};

        function openModal(blockInfo) {
            isActiveModal = true;
            world.gravity.set(0,0,0); // Pause universal gravity
            
            // Save state
            originalState.pos = blockInfo.body.position.clone();
            originalState.quat = blockInfo.body.quaternion.clone();
            originalState.type = blockInfo.body.type;
            
            // Freeze selected block and move to center
            blockInfo.body.type = CANNON.Body.KINEMATIC;
            blockInfo.body.velocity.set(0,0,0);
            blockInfo.body.angularVelocity.set(0,0,0);
            
            // Push other blocks away slightly via temporary explosion force
            blocks.forEach(b => {
                if(b !== blockInfo) {
                    const push = new CANNON.Vec3().copy(b.body.position).vsub(blockInfo.body.position);
                    push.normalize();
                    b.body.applyImpulse(push.scale(5), b.body.position);
                    // Add high damping to freeze them in background
                    b.body.linearDamping = 0.99;
                    b.body.angularDamping = 0.99;
                }
            });

            // "Tween" block to front view
            let t = 0;
            const animateToFront = () => {
                if(!isActiveModal) return;
                t += 0.05;
                if(t <= 1) {
                    const easeOut = 1 - Math.pow(1 - t, 3);
                    // Move to center, pull forward
                    blockInfo.body.position.set(
                        THREE.MathUtils.lerp(originalState.pos.x, 0, easeOut),
                        THREE.MathUtils.lerp(originalState.pos.y, 0, easeOut),
                        THREE.MathUtils.lerp(originalState.pos.z, 5, easeOut) // Close to cam
                    );
                    
                    // Rotate to face front perfectly
                    const targetQuat = new CANNON.Quaternion();
                    targetQuat.setFromEuler(0, 0, 0); // Front facing
                    blockInfo.body.quaternion.slerp(targetQuat, easeOut, blockInfo.body.quaternion);
                    
                    requestAnimationFrame(animateToFront);
                } else {
                    // Animation complete, show content
                    populateModalContent(blockInfo.data);
                    modalOverlay.classList.add('active');
                }
            };
            animateToFront();
        }

        function populateModalContent(data) {
            modalTitle.innerText = data.title;
            modalDesc.innerText = data.desc;
            modalButtons.innerHTML = '';
            data.buttons.forEach(btn => {
                const a = document.createElement('a');
                a.href = btn.url;
                a.target = "_blank";
                a.className = `btn ${btn.primary ? 'btn-primary' : ''}`;
                a.innerHTML = `${btn.icon ? btn.icon + ' ' : ''}${btn.label}`;
                modalButtons.appendChild(a);
            });
        }

        btnClose.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            
            // Restore block state
            const targetBlock = blocks.find(b => b.body.type === CANNON.Body.KINEMATIC);
            if(targetBlock) {
                 // Throw it back dynamically for fun physics reaction
                 targetBlock.body.type = CANNON.Body.DYNAMIC;
                 targetBlock.body.applyImpulse(new CANNON.Vec3(0, 0, -20), targetBlock.body.position);
                 targetBlock.body.angularVelocity.set((Math.random()-0.5)*5, (Math.random()-0.5)*5, 0);
            }
            
            // Un-dampen others
            blocks.forEach(b => {
                b.body.linearDamping = 0.1;
                b.body.angularDamping = 0.1;
            });

            isActiveModal = false;
        });

        // ==========================================
        // 7. RENDER & PHYSICS LOOP
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const timeStep = 1 / 60;
        
        function animate() {
            requestAnimationFrame(animate);

            // Update Physics
            world.step(timeStep);
            
            // Smoothly lerp gravity towards target (if not paused by modal)
            if(!isActiveModal) {
                world.gravity.x = THREE.MathUtils.lerp(world.gravity.x, targetGravity.x, 0.05);
                world.gravity.y = THREE.MathUtils.lerp(world.gravity.y, targetGravity.y, 0.05);
                world.gravity.z = THREE.MathUtils.lerp(world.gravity.z, targetGravity.z, 0.05);
            }

            // Sync visual meshes with physics bodies
            let metaMeshRef = null;
            blocks.forEach(b => {
                if(!isActiveModal || b.body.type === CANNON.Body.KINEMATIC) {
                     b.mesh.position.copy(b.body.position);
                     b.mesh.quaternion.copy(b.body.quaternion);
                }
                if(b.data.id === 'meta') metaMeshRef = b.mesh;
            });

            // Update Meta Cube Reflections
            if (metaMeshRef && !isActiveModal) {
                 metaMeshRef.visible = false;
                 cubeCamera.position.copy(metaMeshRef.position);
                 cubeCamera.update(renderer, scene);
                 metaMeshRef.visible = true;
            }

            // Central lighting dynamic follow
            coreLight.position.x = Math.sin(Date.now() * 0.001) * 2;
            coreLight.position.y = Math.cos(Date.now() * 0.001) * 2;

            renderer.render(scene, camera);
        }

        animate();
    </script>
