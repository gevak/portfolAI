<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper | Neural Architecture</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #05060a;
            --glass-bg: rgba(20, 22, 33, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --core-glow: rgba(255, 255, 255, 0.15);
        }

        /* Node Specific Glow Profiles */
        .node-1 { --glow: #a855f7; --glow-rgba: rgba(168,85,247, 0.5); }
        .node-2 { --glow: #f97316; --glow-rgba: rgba(249,115,22, 0.5); }
        .node-3 { --glow: #06b6d4; --glow-rgba: rgba(6,182,212, 0.5); }
        .node-4 { --glow: #eab308; --glow-rgba: rgba(234,179,8, 0.5); }
        .node-5 { --glow: #84cc16; --glow-rgba: rgba(132,204,22, 0.5); }
        .node-6 { --glow: #ec4899; --glow-rgba: rgba(236,72,153, 0.5); }
        .node-7 { --glow: #ffffff; --glow-rgba: rgba(255,255,255, 0.5); }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* Canvas Background */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Viewport Container */
        #neural-space {
            position: relative;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Base Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        /* Central Core */
        .core-node {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 40px;
            text-align: center;
            max-width: 600px;
            z-index: 10;
            animation: breathe 6s ease-in-out infinite alternate;
            box-shadow: 0 0 40px var(--core-glow);
        }

        .core-node h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .core-node .subtitle {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 25px;
            font-weight: 300;
        }

        .terminal-text {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid var(--text-muted);
            width: 100%;
            margin: 0 auto;
            animation: typing 4s steps(60, end) 1s 1 normal both, blink 0.75s step-end infinite;
        }

        /* Orbiting Nodes */
        .synapse-node {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
            z-index: 5;
            box-shadow: 0 0 15px var(--glow-rgba);
            border-color: var(--glow-rgba);
        }

        /* Node Floating Animation via CSS */
        .drifter { position: absolute; }

        .synapse-node i.main-icon {
            font-size: 24px;
            color: var(--glow);
            text-shadow: 0 0 8px var(--glow-rgba);
            transition: all 0.3s;
        }

        .synapse-node .title-short {
            font-size: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Expanded State */
        .synapse-node:hover, .synapse-node:focus-within {
            width: 340px;
            height: auto;
            min-height: 200px;
            border-radius: 16px;
            padding: 25px;
            z-index: 20;
            justify-content: flex-start;
            align-items: flex-start;
            background: rgba(15, 17, 26, 0.85);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 30px var(--glow-rgba);
        }

        .synapse-node:hover i.main-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .node-content {
            opacity: 0;
            max-height: 0;
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .synapse-node:hover .node-content {
            opacity: 1;
            max-height: 300px;
            pointer-events: auto;
            margin-top: 10px;
        }

        .node-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--glow);
            margin-bottom: 8px;
        }

        .node-desc {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Action Buttons / Links */
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            width: 100%;
        }

        .btn {
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glow-rgba);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--glow-rgba);
            box-shadow: 0 0 10px var(--glow-rgba);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        /* Social Hub Structure */
        .social-cluster {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
            margin-top: 10px;
        }
        
        .social-cluster a {
            color: white;
            font-size: 28px;
            transition: transform 0.2s, text-shadow 0.2s;
        }
        
        .social-cluster a:hover {
            transform: scale(1.1);
            text-shadow: 0 0 15px white;
        }

        /* HUD Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 30;
        }

        .hud-left {
            font-family: var(--font-mono);
            color: #06b6d4; /* Cyan accent */
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-right {
            display: flex;
            gap: 12px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-val {
            font-weight: 500;
            color: white;
        }

        .time-label {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Pulse trigger for elapsed seconds */
        .pulse { animation: hudPulse 0.5s ease; }

        /* Keyframes */
        @keyframes breathe {
            from { box-shadow: 0 0 20px var(--core-glow), inset 0 0 10px rgba(255,255,255,0.02); }
            to { box-shadow: 0 0 50px var(--core-glow), inset 0 0 20px rgba(255,255,255,0.05); transform: translate(-50%, -51%); }
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--text-muted); }
        }

        @keyframes hudPulse {
            0% { text-shadow: 0 0 10px white; color: white; transform: scale(1.1); }
            100% { text-shadow: 0 0 0 transparent; color: inherit; transform: scale(1); }
        }

        @media (max-width: 900px) {
            .core-node h1 { font-size: 2.2rem; }
            .terminal-text { font-size: 0.65rem; white-space: normal; animation: none; border: none; }
            .synapse-node:hover { width: 280px; }
            footer { flex-direction: column; gap: 10px; }
            .hud-right { gap: 6px; }
            .time-val { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="neural-space">
        <!-- Central Core -->
        <div class="glass core-node" id="nucleus">
            <h1>Geva Kipper</h1>
            <div class="subtitle">Currently engineering intelligent systems and scalable solutions at Google.</div>
            <div class="terminal-text" id="glitch-text">> Visual architecture generated by an artificial neural network. Re-designed daily, evolving endlessly.</div>
        </div>

        <!-- Dynamic Nodes Container injects via JS -->
    </div>

    <!-- HUD Footer -->
    <footer>
        <div class="hud-left">Architected by Google Gemini</div>
        <div class="hud-right" id="chronometer">
            <div class="time-block"><span class="time-val" id="t-y">00</span><span class="time-label">Years</span></div><span class="time-val">:</span>
            <div class="time-block"><span class="time-val" id="t-mo">00</span><span class="time-label">Mnths</span></div><span class="time-val">:</span>
            <div class="time-block"><span class="time-val" id="t-d">00</span><span class="time-label">Days</span></div><span class="time-val">:</span>
            <div class="time-block"><span class="time-val" id="t-h">00</span><span class="time-label">Hours</span></div><span class="time-val">:</span>
            <div class="time-block"><span class="time-val" id="t-m">00</span><span class="time-label">Mins</span></div><span class="time-val">:</span>
            <div class="time-block"><span class="time-val" id="t-s">00</span><span class="time-label">Secs</span></div>
        </div>
    </footer>

    <script>
        // --- DATA SPECIFICATION ---
        const projects = [
            {
                id: 'node1', class: 'node-1', icon: 'fa-file-zipper', title: 'GlglStats',
                desc: 'Measuring the repetitiveness of Israeli pop-chart songs using Python LZ77 compression and visualizing the patterns of famous tracks.',
                links: [
                    { url: 'https://glglstats.geekip.dev', text: 'Live API Site', type: 'btn' },
                    { url: 'https://www.youtube.com/watch?v=jrKAtOsj1Lo', icon: 'fa-play', type: 'btn-icon' }
                ]
            },
            {
                id: 'node2', class: 'node-2', icon: 'fa-fire-flame-curved', title: 'Ahuzat Dibuk',
                desc: 'Python scraping and data visualization projecting real-time and historical Tel-Aviv parking lot occupancy mappings.',
                links: [
                    { url: 'https://13tv.co.il/item/news/domestic/internal/parking-902956407/', icon: 'fa-tv', type: 'btn-icon' },
                    { url: 'https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm', icon: 'fa-newspaper', type: 'btn-icon' },
                    { url: 'https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/', icon: 'fa-facebook', type: 'btn-icon' }
                ]
            },
            {
                id: 'node3', class: 'node-3', icon: 'fa-draw-polygon', title: '2D Part Orienting',
                desc: 'C++ implementation inside an open-source computational geometry library. Efficient algorithms constructing push plans to safely orient polygons.',
                links: [
                    { url: 'https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/', text: 'View Academic & Code Repositories', type: 'btn' }
                ]
            },
            {
                id: 'node4', class: 'node-4', icon: 'fa-microchip', title: 'The Turing Jest',
                desc: 'An LMSYS-like arena where LLMs aggressively compete in crafting and explaining custom puns, organically rated by human judges.',
                links: [
                    { url: 'https://jest.geekip.dev', text: 'Enter Arena', type: 'btn', icon: 'fa-arrow-right-to-bracket' }
                ]
            },
            {
                id: 'node5', class: 'node-5', icon: 'fa-wand-magic-sparkles', title: 'Rhymes of Israel',
                desc: 'LLM-powered Chrome extension transforming mundane Israeli news headlines into comedic, high-school-yearbook-style rhymes.',
                links: [
                    { url: 'https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb', text: 'Chrome Web Store', type: 'btn', icon: 'fa-chrome' }
                ]
            },
            {
                id: 'node6', class: 'node-6', icon: 'fa-infinity', title: 'The Meta Portfolio',
                desc: 'A recursive reference to the architectural structure encapsulating this very instance of spatial web reality.',
                links: [
                    { url: 'https://geekip.dev', text: 'Initialize Loop', type: 'btn', icon: 'fa-rotate' }
                ]
            },
            {
                id: 'node7', class: 'node-7', icon: 'fa-network-wired', title: 'Social Synapses',
                desc: '', isSocial: true,
                links: [
                    { url: 'https://github.com/gevak', icon: 'fa-github' },
                    { url: 'https://linkedin.com/in/gevakip', icon: 'fa-linkedin' },
                    { url: 'https://facebook.com/geva.kipper', icon: 'fa-facebook' }
                ]
            }
        ];

        // --- DOM GENERATION ---
        const space = document.getElementById('neural-space');
        const nodeElements = []; // Store references for canvas
        
        projects.forEach((proj, index) => {
            // Wrapper for math-based positioning
            const wrapper = document.createElement('div');
            wrapper.className = 'drifter';
            
            // The visual node
            const node = document.createElement('div');
            node.className = `glass synapse-node ${proj.class}`;
            node.id = proj.id;
            
            // Node content mapping
            let html = `<i class="fa-solid ${proj.icon} main-icon"></i>
                        <div class="node-content">
                            <div class="node-title">${proj.title}</div>`;
                            
            if(proj.desc) html += `<div class="node-desc">${proj.desc}</div>`;
            
            if(proj.isSocial) {
                html += `<div class="social-cluster">`;
                proj.links.forEach(link => {
                    html += `<a href="${link.url}" target="_blank" rel="noopener"><i class="fa-brands ${link.icon}"></i></a>`;
                });
                html += `</div>`;
            } else {
                html += `<div class="actions">`;
                proj.links.forEach(link => {
                    if (link.type === 'btn') {
                        let i = link.icon ? `<i class="fa-solid ${link.icon}"></i>` : '';
                        html += `<a href="${link.url}" target="_blank" rel="noopener" class="btn">${i} ${link.text}</a>`;
                    } else {
                        html += `<a href="${link.url}" target="_blank" rel="noopener" class="btn btn-icon"><i class="fa-solid ${link.icon}"></i></a>`;
                    }
                });
                html += `</div>`;
            }
            
            html += `</div>`;
            node.innerHTML = html;
            wrapper.appendChild(node);
            space.appendChild(wrapper);
            
            nodeElements.push({
                el: node,
                wrapper: wrapper,
                baseAngle: (index / projects.length) * (Math.PI * 2),
                driftSpeed: 0.0005 + Math.random() * 0.0005,
                driftPhaseX: Math.random() * 100,
                driftPhaseY: Math.random() * 100,
                color: getComputedStyle(node).getPropertyValue('--glow').trim()
            });
        });

        // --- ORBITAL PHYSICS & LAYOUT ---
        let hoveredNode = null;
        let time = 0;

        function updateLayout() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            // Radius responsive to screen size
            const radiusX = Math.min(w * 0.4, 450); 
            const radiusY = Math.min(h * 0.35, 300);

            nodeElements.forEach(n => {
                // Circular/Elliptical base orbit
                const bx = (w/2) + Math.cos(n.baseAngle) * radiusX;
                const by = (h/2) + Math.sin(n.baseAngle) * radiusY;
                
                // Add soft drifting
                const dx = Math.sin(time * n.driftSpeed + n.driftPhaseX) * 20;
                const dy = Math.cos(time * n.driftSpeed + n.driftPhaseY) * 20;

                // Apply to wrapper allowing the child .synapse-node to expand from center gracefully
                n.wrapper.style.left = `${bx + dx}px`;
                n.wrapper.style.top = `${by + dy}px`;
                n.wrapper.style.transform = `translate(-50%, -50%)`; // Center coordinate origin
            });
            time += 16;
            requestAnimationFrame(updateLayout);
        }
        
        requestAnimationFrame(updateLayout);

        // --- HOVER EVENT LISTENERS ---
        nodeElements.forEach(n => {
            n.el.addEventListener('mouseenter', () => hoveredNode = n);
            n.el.addEventListener('mouseleave', () => hoveredNode = null);
        });

        // --- CANVAS RENDERER (Neural Pathways) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // Background Particles
        const particles = Array.from({ length: 60 }).map(() => ({
            x: Math.random(), y: Math.random(),
            vx: (Math.random() - 0.5) * 0.001, vy: (Math.random() - 0.5) * 0.001,
            size: Math.random() * 1.5 + 0.5
        }));

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let pulseProgress = 0;

        function drawCanvas() {
            ctx.clearRect(0, 0, width, height);

            // Draw drifting background neural dust
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > 1) p.vx *= -1;
                if(p.y < 0 || p.y > 1) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x * width, p.y * height, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // If a node is hovered, draw synaptic connection
            if (hoveredNode) {
                const coreRect = document.getElementById('nucleus').getBoundingClientRect();
                const nodeRect = hoveredNode.el.getBoundingClientRect();

                const startX = coreRect.left + coreRect.width / 2;
                const startY = coreRect.top + coreRect.height / 2;
                const endX = nodeRect.left + nodeRect.width / 2;
                const endY = nodeRect.top + nodeRect.height / 2;

                // Organic bezier curve
                const cp1x = startX + (endX - startX) * 0.3;
                let cp1y = startY + (endY - startY) * 0.1 - 100; // Arch upward slightly
                const cp2x = startX + (endX - startX) * 0.7;
                let cp2y = startY + (endY - startY) * 0.9 + 100;

                // Pulse Animation Variables
                pulseProgress += 0.02;
                if (pulseProgress > 1) pulseProgress = 0;

                ctx.lineWidth = 2;
                
                // Base faint line
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
                ctx.strokeStyle = hoveredNode.color.replace(')', ', 0.2)').replace('rgb', 'rgba');
                ctx.stroke();

                // Bright glowing dash scanning along path
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
                ctx.strokeStyle = hoveredNode.color;
                ctx.lineWidth = 4;
                ctx.shadowColor = hoveredNode.color;
                ctx.shadowBlur = 15;
                
                // Use line dash to create a sliding energy packet
                const pathLength = 1000; // Approx
                ctx.setLineDash([50, 2000]);
                ctx.lineDashOffset = -pulseProgress * 1500; 
                ctx.stroke();
                ctx.restore();
            } else {
                pulseProgress = 0; // reset
            }

            requestAnimationFrame(drawCanvas);
        }
        drawCanvas();


        // --- CHRONOMETER HUD ---
        // Target: 2026-03-29 01:51:45
        // Calculating absolute elapsed time between Now and Anchor to ensure count ticks up.
        const anchorDate = new Date('2026-03-29T01:51:45');
        
        function pad(n) { return n < 10 ? '0' + n : n; }

        function calculateElapsed(start, end) {
            // Ensure start is before end
            if (start > end) [start, end] = [end, start];
            
            let years = end.getFullYear() - start.getFullYear();
            let months = end.getMonth() - start.getMonth();
            let days = end.getDate() - start.getDate();
            let hours = end.getHours() - start.getHours();
            let minutes = end.getMinutes() - start.getMinutes();
            let seconds = end.getSeconds() - start.getSeconds();

            if (seconds < 0) { seconds += 60; minutes--; }
            if (minutes < 0) { minutes += 60; hours--; }
            if (hours < 0) { hours += 24; days--; }
            if (days < 0) {
                const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
                days += prevMonth.getDate();
                months--;
            }
            if (months < 0) { months += 12; years--; }

            return { years, months, days, hours, minutes, seconds };
        }

        let lastSec = -1;
        const domTarget = {
            y: document.getElementById('t-y'),
            mo: document.getElementById('t-mo'),
            d: document.getElementById('t-d'),
            h: document.getElementById('t-h'),
            m: document.getElementById('t-m'),
            s: document.getElementById('t-s')
        };

        function updateHUD() {
            const now = new Date();
            const elapsed = calculateElapsed(now, anchorDate);

            if (elapsed.seconds !== lastSec) {
                domTarget.y.innerText = pad(elapsed.years);
                domTarget.mo.innerText = pad(elapsed.months);
                domTarget.d.innerText = pad(elapsed.days);
                domTarget.h.innerText = pad(elapsed.hours);
                domTarget.m.innerText = pad(elapsed.minutes);
                domTarget.s.innerText = pad(elapsed.seconds);
                
                // Trigger pulse animation
                domTarget.s.classList.remove('pulse');
                void domTarget.s.offsetWidth; // trigger reflow
                domTarget.s.classList.add('pulse');
                
                lastSec = elapsed.seconds;
            }
        }

        setInterval(updateHUD, 200); // Check frequently to catch exact second shift
        updateHUD();

    </script>

    <script src="/static/js/like_button.js"></script>
    <script>
        LikeButton.init({
          pageId: "20260329",
          position: "bottom-right", // Options: bottom-right, bottom-left, top-right, top-left
        });
    </script>

</body>
