<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geva Kipper | Interactive Realm</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg-color: #0f1115;
            --grid-color: rgba(255, 255, 255, 0.03);
            --primary: #00f0ff;
            --glass-bg: rgba(18, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --hud-bg: rgba(10, 12, 16, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* ----- Game Environment ----- */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: crosshair;
        }

        #world {
            position: absolute;
            left: 50vw;
            top: 50vh;
            width: 0; 
            height: 0;
            transform-style: preserve-3d;
            transition: transform 0s;
        }

        .world-bg {
            position: absolute;
            top: -3000px; left: -3000px;
            width: 6000px; height: 6000px;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        #paths-svg {
            position: absolute;
            top: -1500px; left: -1500px;
            width: 3000px; height: 3000px;
            z-index: 1;
        }

        .engraving {
            position: absolute;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.05);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5), -1px -1px 1px rgba(255,255,255,0.05);
            letter-spacing: 4px;
            z-index: 2;
            pointer-events: none;
            white-space: nowrap;
        }

        /* ----- Entities ----- */
        .entity {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s linear;
        }

        #player {
            width: 30px; height: 30px;
            background: #fff;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: 0 0 40px 15px rgba(0, 240, 255, 0.3);
            z-index: 20;
        }

        #player::after {
            content: '';
            position: absolute;
            width: 200vw; height: 200vh;
            background: radial-gradient(circle, transparent 10%, rgba(15, 17, 21, 0.8) 60%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            left: 50%; top: 50%;
        }

        .npc-shape {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px currentcolor;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        .npc:hover .npc-shape { transform: scale(1.15); }

        .npc-label {
            position: absolute; top: -30px;
            font-size: 0.75rem; font-weight: 600;
            white-space: nowrap; color: var(--text-muted);
            background: rgba(0,0,0,0.5);
            padding: 2px 8px; border-radius: 10px;
            pointer-events: none; opacity: 0.6;
            transition: opacity 0.2s;
        }

        /* ----- UI Overlays ----- */
        #interaction-tooltip {
            position: absolute;
            top: 50vh; left: 50vw;
            transform: translate(-50%, 40px);
            background: var(--primary);
            color: #000; font-weight: 600; font-size: 0.8rem;
            padding: 6px 16px; border-radius: 20px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 100;
        }

        #interaction-tooltip.show { opacity: 1; transform: translate(-50%, 25px); }

        /* Glassmorphism Modal */
        #modal-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 200;
            transition: opacity 0.4s ease;
        }

        #modal-container.active { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 24px;
            width: 90%; max-width: 600px;
            max-height: 80vh; overflow-y: auto;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #modal-container.active .modal { transform: translateY(0); }

        .modal-close {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; color: var(--text-muted);
            font-size: 1.5rem; cursor: pointer; transition: color 0.2s;
        }
        .modal-close:hover { color: #fff; }

        /* Modal Inner Typography */
        .modal h2 { font-family: 'Playfair Display', serif; color: var(--primary); margin-bottom: 15px; font-size: 2rem; }
        .modal p { line-height: 1.6; margin-bottom: 20px; color: var(--text-main); }
        .modal .subtitle { color: #a78bfa; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; padding: 10px; background: rgba(167, 139, 250, 0.1); border-left: 3px solid #a78bfa; border-radius: 0 4px 4px 0;}
        
        /* Links & Buttons */
        .btn {
            display: inline-block; padding: 10px 20px; margin-top: 10px;
            background: var(--primary); color: #000; text-decoration: none;
            font-weight: 600; border-radius: 8px; transition: 0.2s ease;
        }
        .btn:hover { background: #fff; box-shadow: 0 0 15px var(--primary); transform: translateY(-2px); }

        .parchment-link {
            display: block; background: #fdf6e3; color: #333;
            border: 1px solid #d4c4a8; border-left: 4px solid #b58900;
            padding: 12px; margin: 8px 0; text-decoration: none; font-weight: 600;
            border-radius: 6px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            transition: 0.2s ease;
        }
        .parchment-link:hover { background: #fff; transform: translateX(5px); }

        .social-grid { display: flex; gap: 15px; margin-top: 20px; }
        .social-icon {
            display: flex; justify-content: center; align-items: center;
            width: 50px; height: 50px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; text-decoration: none; font-size: 1.2rem; transition: 0.2s;
        }
        .social-icon:hover { background: var(--primary); color: #000; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,240,255,0.4); }

        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0; margin-top: 20px;
            overflow: hidden; border-radius: 12px; border: 1px solid var(--glass-border);
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* HUD */
        #hud {
            position: fixed; bottom: 0; left: 0; width: 100vw;
            background: var(--hud-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px; z-index: 150;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
        }
        .hud-left { color: var(--text-muted); }
        .hud-right { color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .glitch-clock { font-weight: bold; letter-spacing: 1px; }

        /* Animations */
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0); } }
        
        .glitch-text { animation: glitch 2s infinite; position: relative; display: inline-block; color: #ff00ff; }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        
    </style>
</head>
<body>

    <div id="viewport">
        <!-- Game World -->
        <div id="world">
            <div class="world-bg"></div>
            
            <!-- SVG Background Paths -->
            <svg id="paths-svg">
                <g stroke="rgba(255, 255, 255, 0.08)" stroke-width="4" stroke-dasharray="10 10" fill="none">
                    <!-- Dynamic paths drawn by JS -->
                </g>
            </svg>

            <!-- Spawns -->
            <div class="engraving" style="left: 0; top: 0;">Geva Kipper</div>
            
            <div id="npcs-container"></div>
            
            <div class="entity" id="player"></div>
        </div>
    </div>

    <!-- UI Overlay -->
    <div id="interaction-tooltip">Press [E] or Click</div>

    <!-- Modals -->
    <div id="modal-container">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-left">
            World architecture and design generated by Claude 3.5 Sonnet
        </div>
        <div class="hud-right">
            <span>Temporal Glitch Clock:</span>
            <span class="glitch-clock" id="clock">00:00:00:00</span>
        </div>
    </div>

<script>
    /* --- Game Data Configuration --- */
    const npcData = [
        {
            id: 'guide', label: 'Town Guide', x: 0, y: -120,
            color: '#3b82f6', shape: 'circle',
            html: `<h2>The Town Guide</h2>
                   <p>Greetings! Geva is currently crafting code and magic as a Software Engineer at Google.</p>
                   <div class="subtitle">Beware the shifting terrain: this digital realm is re-designed each day by AI and is thus ever-changing.</div>`
        },
        {
            id: 'bard', label: "The Bard's Tavern", x: 450, y: 350,
            color: '#a855f7', shape: 'polygon(50% 0%, 0% 100%, 100% 100%)', // Triangle
            html: `<h2>GlglStats</h2>
                   <p>Welcome to the Tavern! Here rolling sheet music reveals the repetitive nature of chart-topping songs. This Python project measures the repetitiveness of Israeli pop-chart songs based on LZ77 compression and visualizes patterns in famous tracks.</p>
                   <a href="https://glglstats.geekip.dev" target="_blank" rel="noopener noreferrer" class="btn">Explore Live Site</a>
                   <div class="video-wrapper">
                       <iframe src="https://www.youtube.com/embed/jrKAtOsj1Lo" title="GlglStats PyData TLV" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                   </div>`
        },
        {
            id: 'surveyor', label: 'City Watchtower', x: 0, y: -450,
            color: '#f97316', shape: 'polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)', // Square
            html: `<h2>Ahuzat Dibuk</h2>
                   <p>From here, we monitor the moving carriages! This Python scraping and data visualization tool collects Tel-Aviv car parking lot occupancy statistics, generating vital heat-maps for navigating the city.</p>
                   <a href="https://13tv.co.il/item/news/domestic/internal/parking-902956407/" target="_blank" class="parchment-link">📜 Featured on Channel 13</a>
                   <a href="https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm" target="_blank" class="parchment-link">📜 Mentioned in Mako</a>
                   <a href="https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943/" target="_blank" class="parchment-link">📜 Original Secret Tel Aviv Publication</a>`
        },
        {
            id: 'artisan', label: "Blacksmith's Forge", x: -450, y: 0,
            color: '#ef4444', shape: 'polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)', // Hexagon
            html: `<h2>2D Part Orienting</h2>
                   <p>Watch the geometric polygon being hammered into perfect alignment. This C++ implementation within an open-source computational geometry library utilizes an efficient algorithm for constructing a 'push plan' to orient a given polygon.</p>
                   <a href="https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/" target="_blank" rel="noopener noreferrer" style="background: #333; color: #fff; border: 2px solid #555; border-radius: 4px;" class="btn">Forge Repository & Info</a>`
        },
        {
            id: 'referee', label: "Court Jester's Arena", x: -350, y: -300,
            color: 'linear-gradient(45deg, #eab308 50%, #ec4899 50%)', shape: 'circle',
            html: `<h2>The Turing Jest</h2>
                   <p>Step into the arena where robotic jesters clash! This is an LMSYS-like arena where LLMs compete at making and explaining puns, with answers rated by real-world human judges.</p>
                   <a href="https://jest.geekip.dev" target="_blank" rel="noopener noreferrer" style="background: linear-gradient(90deg, #eab308, #ec4899); color: #fff;" class="btn">Judge the Competition</a>`
        },
        {
            id: 'crier', label: 'Town Crier', x: 450, y: 0,
            color: '#eab308', shape: 'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)', // Star
            html: `<h2>Rhymes of Israel</h2>
                   <p>Hear ye, hear ye! This Chrome extension utilizes an LLM to magically rewrite Israeli news site headlines into comedic rhymes in the style of high-school senior quotes.</p>
                   <a href="https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb" target="_blank" rel="noopener noreferrer" class="btn">Download from Web Store</a>`
        },
        {
            id: 'architect', label: 'The Architect', x: -400, y: 400,
            color: '#ff00ff', shape: 'polygon(10% 0, 100% 10%, 90% 100%, 0 90%)',
            html: `<h2><span class="glitch-text">Meta Portfolio</span></h2>
                   <p>How meta! You are currently exploring the very web project I am describing. A digital realm encapsulating its own existence.</p>
                   <a href="https://geekip.dev" class="btn" style="background: transparent; color: #ff00ff; border: 1px solid #ff00ff;">∞ Loop Back to Reality (geekip.dev)</a>`
        },
        {
            id: 'messenger', label: "Courier's Guild", x: 0, y: 550,
            color: '#06d6a0', shape: 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)', // Diamond
            html: `<h2>The Courier's Guild</h2>
                   <p>Send a message across the digital realms. Connect via the channels below.</p>
                   <div class="social-grid">
                       <a href="https://github.com/gevak" target="_blank" class="social-icon">GH</a>
                       <a href="https://linkedin.com/in/gevakip" target="_blank" class="social-icon">IN</a>
                       <a href="https://facebook.com/geva.kipper" target="_blank" class="social-icon">FB</a>
                   </div>`
        }
    ];

    /* --- Game Engine State --- */
    const state = {
        player: { x: 0, y: 0, speed: 5 },
        target: { x: 0, y: 0, active: false },
        keys: { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false },
        activeNPC: null,
        modalOpen: false
    };

    /* --- Initialization --- */
    const worldEl = document.getElementById('world');
    const playerEl = document.getElementById('player');
    const npcsContainer = document.getElementById('npcs-container');
    const svgPaths = document.querySelector('#paths-svg g');
    const tooltip = document.getElementById('interaction-tooltip');
    
    // Draw paths & Create NPCs
    npcData.forEach(npc => {
        // Draw path line from center
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        // Coordinates offset to center of the 3000x3000 SVG canvas
        line.setAttribute("x1", "1500"); line.setAttribute("y1", "1500");
        line.setAttribute("x2", 1500 + npc.x); line.setAttribute("y2", 1500 + npc.y);
        svgPaths.appendChild(line);

        // Create DOM Element
        const el = document.createElement('div');
        el.className = 'entity npc';
        el.id = `npc-${npc.id}`;
        el.style.left = `${npc.x}px`;
        el.style.top = `${npc.y}px`;
        el.style.color = npc.color.includes('gradient') ? 'var(--primary)' : npc.color; 
        
        const backgroundStyle = npc.color.includes('gradient') ? `background: ${npc.color};` : `background: ${npc.color};`;

        el.innerHTML = `
            <div class="npc-label">${npc.label}</div>
            <div class="npc-shape" style="${backgroundStyle} clip-path: ${npc.shape.includes('polygon') ? npc.shape : 'none'}"></div>
        `;
        
        // Click to move & interact
        el.addEventListener('pointerdown', (e) => {
            e.stopPropagation(); // prevent world click
            if(state.modalOpen) return;
            state.target = { x: npc.x, y: npc.y, active: true, targetNPC: npc };
        });

        npcsContainer.appendChild(el);
    });

    /* --- Input Handling --- */
    window.addEventListener('keydown', (e) => {
        if(state.keys.hasOwnProperty(e.key)) { state.keys[e.key] = true; state.target.active = false; }
        if(e.key === 'e' || e.key === 'E' || e.key === ' ') interact();
        if(e.key === 'Escape') closeModal();
    });

    window.addEventListener('keyup', (e) => {
        if(state.keys.hasOwnProperty(e.key)) state.keys[e.key] = false;
    });

    document.getElementById('viewport').addEventListener('pointerdown', (e) => {
        if(state.modalOpen) return;
        // Calculate world coordinates from screen click
        const rect = document.getElementById('viewport').getBoundingClientRect();
        const screenCenterX = rect.width / 2;
        const screenCenterY = rect.height / 2;
        
        // Because world shifts inversely to player, screen center IS player position
        // Click relative to screen center is distance from player
        const dx = e.clientX - screenCenterX;
        const dy = e.clientY - screenCenterY;
        
        state.target = { 
            x: state.player.x + dx, 
            y: state.player.y + dy, 
            active: true, targetNPC: null 
        };
    });

    /* --- Interaction Logic --- */
    function checkProximity() {
        let nearest = null;
        let minDist = 80;

        npcData.forEach(npc => {
            const dx = npc.x - state.player.x;
            const dy = npc.y - state.player.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            const npcEl = document.getElementById(`npc-${npc.id}`);
            if(dist < minDist) {
                nearest = npc;
                npcEl.querySelector('.npc-shape').style.boxShadow = `0 0 30px 10px #fff`; // Highlight
            } else {
                npcEl.querySelector('.npc-shape').style.boxShadow = `0 0 20px currentcolor`;
            }
        });

        if (nearest && !state.activeNPC) {
            tooltip.classList.add('show');
        } else if (!nearest) {
            tooltip.classList.remove('show');
        }
        
        state.activeNPC = nearest;

        // Auto interact if click-targeting this NPC and arrived
        if (nearest && state.target.active && state.target.targetNPC === nearest) {
           interact();
           state.target.active = false;
        }
    }

    function interact() {
        if (state.activeNPC && !state.modalOpen) {
            openModal(state.activeNPC.html);
        }
    }

    function openModal(htmlContent) {
        state.modalOpen = true;
        document.getElementById('modal-content').innerHTML = htmlContent;
        document.getElementById('modal-container').classList.add('active');
        state.keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false }; // reset keys
        state.target.active = false;
    }

    window.closeModal = function() {
        state.modalOpen = false;
        document.getElementById('modal-container').classList.remove('active');
        // Small timeout to clear content after animation
        setTimeout(() => { if(!state.modalOpen) document.getElementById('modal-content').innerHTML = ''; }, 400);
    }

    /* --- Game Loop --- */
    function update() {
        if(!state.modalOpen) {
            let dx = 0, dy = 0;

            // Keyboard Movement
            if (state.keys.w || state.keys.ArrowUp) dy -= 1;
            if (state.keys.s || state.keys.ArrowDown) dy += 1;
            if (state.keys.a || state.keys.ArrowLeft) dx -= 1;
            if (state.keys.d || state.keys.ArrowRight) dx += 1;

            if (dx !== 0 || dy !== 0) {
                // Normalize diagonal
                const length = Math.sqrt(dx*dx + dy*dy);
                dx = (dx/length) * state.player.speed;
                dy = (dy/length) * state.player.speed;
                
                state.player.x += dx;
                state.player.y += dy;
                
                // Rotation calculation
                const angle = Math.atan2(dy, dx) * (180/Math.PI);
                playerEl.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
            } 
            // Click Movement
            else if (state.target.active) {
                let tdx = state.target.x - state.player.x;
                let tdy = state.target.y - state.player.y;
                let dist = Math.sqrt(tdx*tdx + tdy*tdy);
                
                if (dist > state.player.speed) {
                    let moveX = (tdx/dist) * state.player.speed;
                    let moveY = (tdy/dist) * state.player.speed;
                    state.player.x += moveX;
                    state.player.y += moveY;
                    
                    const angle = Math.atan2(tdy, tdx) * (180/Math.PI);
                    playerEl.style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
                } else {
                    state.player.x = state.target.x;
                    state.player.y = state.target.y;
                    state.target.active = false;
                }
            }

            // Move the world inversely to player to simulate camera tracking
            worldEl.style.transform = `translate(${-state.player.x}px, ${-state.player.y}px)`;
            
            checkProximity();
        }
        
        requestAnimationFrame(update);
    }

    /* --- Temporal Glitch Clock --- */
    function updateClock() {
        // Epoch: 2026-03-10 01:22:31 UTC
        const epoch = new Date('2026-03-10T01:22:31Z').getTime();
        const now = Date.now();
        const diffSeconds = Math.floor(Math.abs(now - epoch) / 1000);
        
        const d = Math.floor(diffSeconds / (3600 * 24));
        const h = Math.floor((diffSeconds % (3600 * 24)) / 3600);
        const m = Math.floor((diffSeconds % 3600) / 60);
        const s = diffSeconds % 60;

        const pad = (num) => String(num).padStart(2, '0');
        
        // Even if the date is in the future relative to current time, it acts as an absolute difference counter as per "continually passed since the epoch"
        document.getElementById('clock').innerText = `${pad(d)}:${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    // Start Engine
    setInterval(updateClock, 1000);
    updateClock(); // initial call
    requestAnimationFrame(update);

</script>
