    <style>
        /* Base Styling & Variables */
        :root {
            --bg-color: #0b0c10;
            --text-color: #c5c6c7;
            --neon-cyan: #66fcf1;
            --neon-teal: #45a29e;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(102, 252, 241, 0.2);
            --glass-blur: blur(12px);
        }

        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Press+Start+2P&family=Lora:ital@0;1&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
            overscroll-behavior-y: none;
        }

        /* 3D Scene Container */
        #scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        /* Proxy element to enable native scrolling */
        #scroll-proxy {
            width: 1px;
            /* Will be dynamically sized based on layers */
        }

        /* Layer Core */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transform-origin: center center;
            will-change: transform, opacity;
        }

        /* Matryoshka Doll Shape */
        .doll {
            position: absolute;
            width: 25vh;
            height: 40vh;
            z-index: 10;
        }

        .doll-half {
            width: 100%;
            height: 50%;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: inset 0 0 40px rgba(102, 252, 241, 0.05),
                        0 20px 40px rgba(0, 0, 0, 0.5);
            transition: border 0.3s;
            will-change: transform, opacity;
        }

        .doll-top {
            border-top-left-radius: 50% 100%;
            border-top-right-radius: 50% 100%;
            border: 1px solid var(--glass-border);
            border-bottom: 2px solid rgba(102, 252, 241, 0.6);
            transform-origin: bottom center;
        }

        .doll-bottom {
            border-bottom-left-radius: 50% 100%;
            border-bottom-right-radius: 50% 100%;
            border: 1px solid var(--glass-border);
            border-top: none;
            transform-origin: top center;
        }

        /* Content Container */
        .content-layer {
            position: absolute;
            width: 85vw;
            height: 80vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            will-change: opacity, transform;
            pointer-events: none; /* activated in JS when centered */
            z-index: 5;
        }

        .side-panel {
            width: 32%;
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* General Links & Buttons */
        a { color: var(--neon-cyan); text-decoration: none; transition: 0.2s; }
        a:hover { color: #fff; text-shadow: 0 0 10px var(--neon-cyan); }
        h1, h2, h3 { margin-top: 0; color: #fff; }

        /* Specific Layer Theming */

        /* Layer 0: Hero */
        #layer-0 .content-layer {
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }
        .hero-title {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -2px;
            text-shadow: 0 0 20px var(--neon-teal);
            margin-bottom: 0.5rem;
        }
        .hero-sub {
            font-size: 1.5rem;
            color: var(--neon-cyan);
            margin-bottom: 2rem;
        }
        /* Glitch Prompt */
        .glitch-prompt {
            background: #111; padding: 10px 20px; border-left: 4px solid var(--neon-cyan);
            font-size: 1rem; position: relative; color: #ee4c7c;
        }
        .glitch-prompt::before {
            content: "> Site dynamic build via AI parameters. Refresh for variations.";
            animation: typeGlitch 2s infinite linear alternate-reverse;
        }
        @keyframes typeGlitch {
            0% { opacity: 1; transform: translate(0) }
            20% { opacity: 0.8; transform: translate(-2px, 1px) }
            40% { opacity: 1; transform: translate(2px, -1px) }
            60% { opacity: 0.9; text-shadow: 2px 0 red, -2px 0 blue; }
            80% { opacity: 1; transform: translate(0) text-shadow: none; }
            100% { opacity: 1; text-shadow: none; }
        }

        /* Layer 1: GlglStats */
        .stats-btn {
            display: block; width: 100%; padding: 15px; border: 1px solid #4CAF50;
            background: linear-gradient(180deg, rgba(76, 175, 80, 0.1), rgba(0,0,0,0));
            text-align: center; font-weight: bold; color: #4CAF50; border-radius: 8px;
            margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;
            position: relative; overflow: hidden;
        }
        .stats-btn::before { /* Emulate graph lines */
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(76, 175, 80, 0.4) 10px, rgba(76, 175, 80, 0.4) 12px);
            opacity: 0.3;
        }
        .stats-btn:hover { background: rgba(76, 175, 80, 0.2); }
        iframe { border-radius: 12px; border: none; width: 100%; aspect-ratio: 16/9; }

        /* Layer 2: Ahuzat Dibuk */
        .theme-heatmap {
            background: linear-gradient(135deg, rgba(255, 69, 0, 0.15), rgba(255, 215, 0, 0.1));
            border-color: rgba(255, 69, 0, 0.4);
        }
        .ticker-badge {
            display: flex; align-items: center; justify-content: space-between;
            background: #222; padding: 10px 15px; margin-bottom: 10px; border-radius: 6px;
            border-left: 3px solid #ff4500; font-size: 0.9rem; color: #ddd;
        }
        .ticker-badge:hover { background: #333; transform: translateX(5px); }

        /* Layer 3: 2D Part Orienting */
        #layer-3-bg {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background-image:      
                linear-gradient(rgba(102, 252, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 252, 241, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; opacity: 0; transition: opacity 0.5s;
        }
        .wireframe-btn {
            display: inline-block; padding: 12px 24px; color: var(--neon-cyan);
            border: 1px dashed var(--neon-cyan); background: transparent; 
            font-family: inherit; font-size: 1rem; cursor: pointer; text-transform: uppercase;
        }
        .wireframe-btn:hover { box-shadow: inset 0 0 15px rgba(102,252,241,0.2); border-style: solid; }

        /* Layer 4: Turing Jest */
        .theme-arcade h2, .theme-arcade p, .theme-arcade a {
            font-family: 'Press Start 2P', monospace; line-height: 1.5;
        }
        .theme-arcade h2 { color: #ff00ff; text-shadow: 2px 2px #00ffff; font-size: 1.2rem; margin-bottom: 1.5rem; }
        .theme-arcade p { font-size: 0.7rem; color: #fff; }
        .arcade-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 2rem; padding: 15px; border: 4px solid #00ffff;
            background: #220022; color: #00ffff; font-size: 0.8rem;

        .chrome-top { background: #dfe1e5; padding: 8px 12px; display: flex; gap: 6px; }
        .chrome-dot { width: 12px; height: 12px; border-radius: 50%; }
        .chrome-dot:nth-child(1) { background: #ff5f56; }
        .chrome-dot:nth-child(2) { background: #ffbd2e; }
        .chrome-dot:nth-child(3) { background: #27c93f; }
        .chrome-content { padding: 20px; background: #e8f0fe; }
        .chrome-content h2 { color: #1a73e8; margin-bottom: 10px; font-family: 'Share Tech Mono'; }
        .chrome-btn {
            background: #1a73e8; color: #fff !important; padding: 10px 20px; border-radius: 4px;
            display: inline-block; margin-top: 15px; font-weight: bold; border: none; font-family: inherit;
        }

        /* Layer 6: Hatul Basak */
        .theme-wiki {
            font-family: 'Lora', serif; background: #e0e0e0; color: #202122; border-radius: 4px;
            border-left: 6px solid #a2a9b1; box-shadow: none;
        }
        .theme-wiki h2 { color: #000; border-bottom: 1px solid #a2a9b1; padding-bottom: 5px; font-family: 'Lora', serif; }
        .wiki-btn {
            display: inline-flex; align-items: center; gap: 10px; padding: 10px 15px;
            background: #f8f9fa; border: 1px solid #a2a9b1; color: #3366cc !important;
            font-family: sans-serif; font-weight: bold; margin-top: 20px; border-radius: 2px;
        }
        .wiki-btn:hover { text-decoration: underline; background: #fff; }

        /* Layer 7: Portfolio Meta */
        .theme-meta {
            position: relative; overflow: hidden;
        }
        .theme-meta::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-radial-gradient(circle at 50% 50%, transparent, transparent 10px, rgba(102, 252, 241, 0.1) 15px);
            z-index: -1; animation: spin 20s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Layer 8: The Seed */
        .orb-container { position: absolute; width: 25vh; height: 25vh; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .orb {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #888 20%, #222 60%, #000);
            box-shadow: 0 0 60px rgba(102, 252, 241, 0.6), inset 0 0 20px #000;
        }
        .satellite {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            margin-top: -25px; margin-left: -25px; border-radius: 50%;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); border: 1px solid var(--neon-cyan);
            display: flex; align-items: center; justify-content: center; pointer-events: auto;
        }
        .satellite svg { width: 24px; height: 24px; fill: var(--neon-cyan); }
        .satellite:hover { background: var(--neon-cyan); }
        .satellite:hover svg { fill: #000; }
        
        .orbit-1 { animation: orbit1 10s linear infinite; }
        .orbit-2 { animation: orbit2 10s linear infinite; }
        .orbit-3 { animation: orbit3 10s linear infinite; }

        @keyframes orbit1 {
            0% { transform: rotate(0deg) translateY(-25vh) rotate(0deg); }
            100% { transform: rotate(360deg) translateY(-25vh) rotate(-360deg); }
        }
        @keyframes orbit2 {
            0% { transform: rotate(120deg) translateY(-25vh) rotate(-120deg); }
            100% { transform: rotate(480deg) translateY(-25vh) rotate(-480deg); }
        }
        @keyframes orbit3 {
            0% { transform: rotate(240deg) translateY(-25vh) rotate(-240deg); }
            100% { transform: rotate(600deg) translateY(-25vh) rotate(-600deg); }
        }

        /* Footer */
        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px;
            background: linear-gradient(0deg, #0b0c10 60%, transparent);
            color: rgba(197, 198, 199, 0.6); font-size: 0.85rem;
            display: flex; justify-content: space-between; box-sizing: border-box; z-index: 100;
            pointer-events: none;
        }
        .stopwatch { font-weight: bold; color: var(--neon-teal); }

        @media(max-width: 900px) {
            .content-layer { flex-direction: column; width: 90vw; justify-content: space-around; height: 90vh; }
            .side-panel { width: 100%; padding: 1rem; }
            .doll { width: 40vw; height: 64vw; }
            .hero-title { font-size: 3rem; }
        }
    </style>
</head>

        // Background handler for Layer 3 specifically
        const bgLayer3 = document.getElementById('layer-3-bg');

        // Animation Loop Variable bindings
        const layerEls = Array.from(document.querySelectorAll('.layer'));
        let currentScroll = 0;
        let p = 0; // Absolute progression 0 to 8

        window.addEventListener('scroll', () => {
            currentScroll = window.scrollY;
            p = currentScroll / STICKY_FACTOR;
            requestAnimationFrame(updateScene);
        });

        function updateScene() {
            // Layer 3 background particle grid visibility
            if (p > 1.5 && p < 3.5) {
                bgLayer3.style.opacity = p > 2 && p < 3 ? 1 : 0.4;
            } else {
                bgLayer3.style.opacity = 0;
            }

            layerEls.forEach((el, i) => {
                let z = i - p; 

                let scale = 1;
                let opacity = 1;
                let topY = 0;
                let botY = 0;
                let contentOpacity = 0;
                let isInteractive = false;

                if (z > 0) {
                    // Deeply nested, getting closer
                    scale = Math.pow(0.5, z);
                    opacity = Math.max(0.1, 1 - (z * 0.3)); // Faintly seen behind glass layers
                    contentOpacity = z < 1 ? 1 - z : 0; // Content fades in as it becomes centered
                } 
                else if (z <= 0 && z > -1.5) {
                    // Splitting and passing the camera
                    let splitFactor = -z;
                    // Scale surges upwards (e.g. up to 5x size) simulating camera passing through
                    scale = 1 + Math.pow(splitFactor * 2.5, 2);
                    
                    if (i < layerCount - 1) { // Normal dolls split
                        topY = -(splitFactor * 120); 
                        botY = (splitFactor * 120); 
                    }
                    
                    opacity = 1 - (splitFactor / 1.5); 
                    contentOpacity = 1 - (splitFactor * 2); // Content fades out fast
                    if (contentOpacity < 0) contentOpacity = 0;
                } 
                else {
                    // Passed far behind camera
                    opacity = 0;
                    contentOpacity = 0;
                }

                // Interaction active strictly near focal point
                if (z > -0.5 && z < 0.5) {
                    isInteractive = true;
                    if(z===0) contentOpacity = 1;
                }

                // Apply DOM styles securely
                el.style.transform = `scale(${scale})`;
                el.style.opacity = opacity;

                let topEl = el.querySelector('.doll-top');
                let botEl = el.querySelector('.doll-bottom');
                if(topEl && botEl) {
                    topEl.style.transform = `translateY(${topY}vh)`;
                    botEl.style.transform = `translateY(${botY}vh)`;
                }

                let contentEl = el.querySelector('.content-layer');
                let orbEl = el.querySelector('.orb-container');

                if(contentEl) {
                    contentEl.style.opacity = contentOpacity;
                    contentEl.style.pointerEvents = isInteractive ? 'auto' : 'none';
                    // Optional pop scale on content
                    contentEl.style.transform = `scale(${1 + (scale-1)*0.2})`; 
                }

                if(orbEl) { // Seed layer specific handler
                    orbEl.style.opacity = z < 1 && z > -1 ? 1 : 0;
                    Array.from(orbEl.querySelectorAll('.satellite')).forEach(s => s.style.pointerEvents = isInteractive ? 'auto' : 'none');
                }
            });
        }

        // Initialize state
        updateScene();

        // Footer Stopwatch Logic
        // Timestamp: 2026-04-24 02:04:15
        // Specs: "dynamically calculating and displaying the exact elapsed hours, minutes, and seconds since the timestamp"
        // Note: JS Date parsing treats "T" implicitly relative to local time if not tagged Z, but let's assume raw parsing for simplicity.
        const targetDate = new Date('2026-04-24T02:04:15').getTime();
        const stopwatchEl = document.getElementById('stopwatch');

        function updateStopwatch() {
            const now = new Date().getTime();
            // Using Math.abs to ensure a positive count if current date is before 2026.
            const elapsed = Math.max(0, Math.floor(Math.abs(now - targetDate) / 1000));
            
            const hours = String(Math.floor(elapsed / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
            const seconds = String(elapsed % 60).padStart(2, '0');

            stopwatchEl.innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateStopwatch, 1000);
        updateStopwatch();
    </script>
