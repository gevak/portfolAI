<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geva Kipper // AI Cyber-Gallery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syncopate:wght@400;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-red: #ff004c;
            --neon-purple: #b000ff;
            --glass-bg: rgba(10, 10, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Space Mono', monospace;
            color: white;
            user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* HUD & Overlay */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #blocker {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: opacity 0.3s;
        }

        .brutalist-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px var(--neon-blue);
        }

        .instructions {
            text-align: center;
            max-width: 600px;
            line-height: 1.5;
            color: #aaa;
        }

        kbd {
            background: #222;
            border: 1px solid #444;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
        }

        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Footer HUD */
        #footer {
            height: 40px;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
        }

        #stopwatch {
            font-weight: 700;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* Slide-in Exhibit Panels */
        #exhibit-panel {
            position: absolute;
            top: 50%;
            right: -500px; /* Hidden state */
            transform: translateY(-50%);
            width: 400px;
            max-height: 80vh;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            padding: 30px;
            transition: right 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        #exhibit-panel.active {
            right: 40px;
        }

        .panel-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            color: var(--neon-blue);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            margin-bottom: 15px;
            margin-top: 0;
        }

        .panel-desc {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Buttons & Badges */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        a.hud-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        a.hud-btn:hover {
            background: white;
            color: black;
            border-color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .hud-notice {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            border: 1px solid var(--neon-red);
            padding: 10px 20px;
            backdrop-filter: blur(5px);
            color: var(--neon-red);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div id="blocker">
        <div class="brutalist-title">System Init</div>
        <div class="instructions">
            <p>Welcome to the Cyber-Gallery.</p>
            <p>Use <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or <kbd>Arrows</kbd> to move.<br>Use the mouse to look around.</p>
            <p style="color: var(--neon-blue); margin-top:20px;">Click anywhere to enter</p>
        </div>
    </div>

    <div id="ui-layer">
        <div class="hud-notice" id="interaction-notice">Press [ESC] to release cursor & click links</div>
        <div id="crosshair"></div>
        
        <div id="exhibit-panel">
            <h2 class="panel-title" id="e-title">Exhibit</h2>
            <div class="panel-desc" id="e-desc">Details</div>
            <div class="btn-container" id="e-links"></div>
        </div>

        <div id="footer">
            <div>Architecture generated by Artificial Intelligence.</div>
            <div id="stopwatch">T+ 00:00:00</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. SYSTEM SETUP (Time & UI) ---
        const startTime = new Date('2026-03-24T01:27:28Z').getTime();
        const stopwatchEl = document.getElementById('stopwatch');

        function updateStopwatch() {
            const now = Date.now();
            const diffMs = Math.abs(now - startTime);
            
            const totalSecs = Math.floor(diffMs / 1000);
            const hours = Math.floor(totalSecs / 3600);
            const mins = Math.floor((totalSecs % 3600) / 60);
            const secs = totalSecs % 60;

            const format = (n) => n.toString().padStart(2, '0');
            stopwatchEl.innerText = `T+ ${format(hours)}:${format(mins)}:${format(secs)}`;
        }
        setInterval(updateStopwatch, 1000);

        // --- 2. THREE.JS BOILERPLATE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x020202, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // Spawn at Foyer

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 3. CONTROLS & MOVEMENT MATRIX ---
        const controls = new PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        
        blocker.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => blocker.style.opacity = '0');
        controls.addEventListener('unlock', () => {
            if(!activeExhibit) blocker.style.opacity = '1'; 
        });

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const moveState = { forward: false, backward: false, left: false, right: false };

        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'ArrowUp': case 'KeyW': moveState.forward = true; break;
                case 'ArrowLeft': case 'KeyA': moveState.left = true; break;
                case 'ArrowDown': case 'KeyS': moveState.backward = true; break;
                case 'ArrowRight': case 'KeyD': moveState.right = true; break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'ArrowUp': case 'KeyW': moveState.forward = false; break;
                case 'ArrowLeft': case 'KeyA': moveState.left = false; break;
                case 'ArrowDown': case 'KeyS': moveState.backward = false; break;
                case 'ArrowRight': case 'KeyD': moveState.right = false; break;
            }
        });

        // --- 4. ARCHITECTURE MATERIALS ---
        const floorGeo = new THREE.PlaneGeometry(300, 300);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const ceiling = new THREE.Mesh(floorGeo, new THREE.MeshBasicMaterial({ color: 0x020202 }));
        ceiling.position.y = 8;
        ceiling.rotation.x = Math.PI / 2;
        scene.add(ceiling);

        // Glassmorphism Frosted Walls
        const wallMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transmission: 0.95,
            opacity: 1,
            metalness: 0.1,
            roughness: 0.6,
            ior: 1.5,
            thickness: 2.0,
        });

        const wallBoxes = []; // For simple collision

        function createWall(x, z, width, depth) {
            const geo = new THREE.BoxGeometry(width, 8, depth);
            const mesh = new THREE.Mesh(geo, wallMat);
            mesh.position.set(x, 4, z);
            scene.add(mesh);
            
            // Neon strip at base
            const stripGeo = new THREE.BoxGeometry(width + 0.1, 0.1, depth + 0.1);
            const stripMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
            const strip = new THREE.Mesh(stripGeo, stripMat);
            strip.position.set(x, 0.05, z);
            scene.add(strip);

            // Bounding box for collision
            wallBoxes.push(new THREE.Box3().setFromObject(mesh));
        }

        function checkCollision(pos) {
            const playerBox = new THREE.Box3(
                new THREE.Vector3(pos.x - 0.5, 0, pos.z - 0.5),
                new THREE.Vector3(pos.x + 0.5, 2, pos.z + 0.5)
            );
            return wallBoxes.some(box => box.intersectsBox(playerBox));
        }

        // --- 5. LEVEL GENERATOR ---
        // Corridor layout along Z axis (-). Exhibits branch off on X axis.
        const roomCenters = [];
        
        // Define Architecture
        createWall(-10, 5, 20, 2); // Foyer back wall
        createWall(10, -5, 2, 20); // Foyer Right
        createWall(-10, -5, 2, 20); // Foyer Left

        const exhibitZSpacing = -30;
        
        for(let i=1; i<=6; i++) {
            const z = exhibitZSpacing * i;
            const side = i % 2 === 0 ? 1 : -1;
            const rx = 15 * side;
            
            // Corridor walls (with gaps for rooms)
            createWall(5 * -side, z + 15, 2, 30); // opposite wall solid
            createWall(5 * side, z + 25, 2, 10);  // current wall split part 1
            createWall(5 * side, z + 5, 2, 10);   // current wall split part 2

            // Room enclosures
            createWall(rx, z + 10, 20, 2); // Room front
            createWall(rx, z - 10, 20, 2); // Room back
            createWall(rx + (10 * side), z, 2, 20); // Room cap

            roomCenters.push(new THREE.Vector3(rx, 1.6, z));
        }

        // Exit Room
        const e7z = exhibitZSpacing * 6 - 30;
        createWall(-10, e7z + 10, 8, 2);
        createWall(10, e7z + 10, 8, 2);
        roomCenters.push(new THREE.Vector3(0, 1.6, e7z - 10)); // End terminal

        // --- 6. UTILITIES ---
        const updatables = [];

        function createTextTexture(text, size, color, bg = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            if(bg) { ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,1024,256); }
            
            ctx.fillStyle = color;
            ctx.font = `bold ${size}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 512, 128);
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return tex;
        }

        // --- 7. THE FOYER ---
        const foyerLight = new THREE.PointLight(0xffffff, 2, 20);
        foyerLight.position.set(0, 5, 0);
        scene.add(foyerLight);

        // Hologram Core
        const holoNameMat = new THREE.SpriteMaterial({ map: createTextTexture("GEVA KIPPER", 100, '#00f3ff'), transparent: true, blending: THREE.AdditiveBlending });
        const holoName = new THREE.Sprite(holoNameMat);
        holoName.scale.set(4, 1, 1);
        holoName.position.set(0, 2.5, 0);
        scene.add(holoName);

        const holoDescMat = new THREE.SpriteMaterial({ map: createTextTexture("Engineering at Google // Software Solutions", 40, '#ffffff'), transparent: true });
        const holoDesc = new THREE.Sprite(holoDescMat);
        holoDesc.scale.set(3, 0.75, 1);
        holoDesc.position.set(0, 2.0, 0);
        scene.add(holoDesc);

        const holoWarnMat = new THREE.SpriteMaterial({ map: createTextTexture("WARNING: Topography AI-Generated", 30, '#ff004c'), transparent: true });
        const holoWarn = new THREE.Sprite(holoWarnMat);
        holoWarn.scale.set(2, 0.5, 1);
        holoWarn.position.set(0, 1.0, 0);
        scene.add(holoWarn);

        updatables.push((time) => {
            holoName.position.y = 2.5 + Math.sin(time * 2) * 0.1;
            holoWarn.material.opacity = Math.random() > 0.05 ? 1 : 0.2; // flickering
        });

        // Path lights
        for(let i=0; i<30; i++) {
            const pLight = new THREE.Mesh(new THREE.PlaneGeometry(1, 0.2), new THREE.MeshBasicMaterial({color: 0x00f3ff}));
            pLight.rotation.x = -Math.PI / 2;
            pLight.position.set(0, 0.01, -2 - (i * 2));
            scene.add(pLight);
            updatables.push((time) => {
                const wave = Math.sin((time * 3) - (i * 0.5));
                pLight.material.color.setHSL(0.5, 1, wave > 0 ? wave * 0.8 : 0.05);
            });
        }

        // --- 8. THE EXHIBITS CONTENT ---
        
        const exhibitData = [
            {
                id: 'ex1', title: 'GlglStats (LZ77 Audio Analysis)',
                desc: 'A Python project quantifying the repetitiveness of Israeli pop music charts using LZ77 compression metrics. Visualizing the derivative entropy of commercial audio tracks.',
                links: [
                    { name: 'Live Metrics Site', url: 'https://glglstats.geekip.dev' },
                    { name: 'PyData TLV Presentation', url: 'https://www.youtube.com/watch?v=jrKAtOsj1Lo' }
                ],
                setup: (scene, pos) => {
                    scene.add(new THREE.PointLight(0xff00ff, 5, 20)).position.copy(pos).add(new THREE.Vector3(0,4,0));
                    const boxes = [];
                    const mat = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0x440044 });
                    for(let x=-2; x<=2; x+=0.5){
                        for(let z=-2; z<=2; z+=0.5){
                            const b = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1, 0.4), mat);
                            b.position.set(pos.x + x, 0.5, pos.z + z);
                            scene.add(b);
                            boxes.push({m: b, ix: x, iz: z});
                        }
                    }
                    return (time) => {
                        boxes.forEach(b => {
                            const scale = (Math.sin(time*5 + b.ix*2 + b.iz*2) + 1.2) * 1.5;
                            b.m.scale.y = scale;
                            b.m.position.y = scale / 2;
                        });
                    };
                }
            },
            {
                id: 'ex2', title: 'Ahuzat Dibuk (Tel-Aviv Parking)',
                desc: 'Data scraping and visualization mapping real-time parking occupancy across Tel-Aviv grid systems, revealing urban infrastructure stress points.',
                links: [
                    { name: 'Channel 13 Feature', url: 'https://13tv.co.il/item/news/domestic/internal/parking-902956407/' },
                    { name: 'Mako Tech Article', url: 'https://www.mako.co.il/nexter-news/Article-ae43964b891bf71027.htm' },
                    { name: 'Secret Tel-Aviv Discussion', url: 'https://www.facebook.com/groups/secrettelaviv/posts/10159636301195943' }
                ],
                setup: (scene, pos) => {
                    scene.add(new THREE.PointLight(0xff5500, 5, 20)).position.copy(pos).add(new THREE.Vector3(0,2,0));
                    const hmGeo = new THREE.PlaneGeometry(10, 10, 20, 20);
                    const hmMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, wireframe: true, transparent:true, opacity: 0.5 });
                    const heatmap = new THREE.Mesh(hmGeo, hmMat);
                    heatmap.rotation.x = -Math.PI/2;
                    heatmap.position.set(pos.x, 0.1, pos.z);
                    scene.add(heatmap);
                    return (time) => {
                        const posAttr = heatmap.geometry.attributes.position;
                        for(let i=0; i<posAttr.count; i++) {
                            const vx = posAttr.getX(i); const vy = posAttr.getY(i);
                            const z = Math.sin(time + vx + vy) * 0.5 + Math.cos(time * 0.5 + vx) * 0.5;
                            posAttr.setZ(i, z>0?z*2:0);
                        }
                        posAttr.needsUpdate = true;
                    }
                }
            },
            {
                id: 'ex3', title: '2D Part Orienting (Comp. Geometry)',
                desc: 'A robust C++ implementation for constructing optimal, sensor-less mechanical push plans. Computational geometry applied to align complex polygonal entities.',
                links: [
                    { name: 'TAU Academic Repository', url: 'https://www.cgl.cs.tau.ac.il/projects/2d-part-orienting/' }
                ],
                setup: (scene, pos) => {
                    scene.add(new THREE.PointLight(0x00ffaa, 5, 15)).position.copy(pos).add(new THREE.Vector3(0,3,0));
                    const poly = new THREE.Mesh(new THREE.IcosahedronGeometry(1.5), new THREE.MeshBasicMaterial({color: 0x00ffaa, wireframe: true}));
                    poly.position.set(pos.x, 2, pos.z);
                    scene.add(poly);
                    
                    const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 4), new THREE.MeshBasicMaterial({color: 0xffffff}));
                    p1.rotation.z = Math.PI/2;
                    scene.add(p1);
                    return (time) => {
                        poly.rotation.x += 0.01; poly.rotation.y += 0.02;
                        p1.position.set(pos.x + Math.sin(time*2)*2, 2, pos.z);
                    }
                }
            },
            {
                id: 'ex4', title: 'The Turing Jest',
                desc: 'A gladiatorial arena architecture for Large Language Models. Red Team vs Blue Team competing in algorithmic comedic generation and pun explanation.',
                links: [
                    { name: 'Enter The Arena', url: 'https://jest.geekip.dev' }
                ],
                setup: (scene, pos) => {
                    const l1 = new THREE.PointLight(0xff0000, 3, 10); l1.position.set(pos.x-1, 2, pos.z); scene.add(l1);
                    const l2 = new THREE.PointLight(0x0000ff, 3, 10); l2.position.set(pos.x+1, 2, pos.z); scene.add(l2);
                    
                    const r1 = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x550000, emissive: 0xcc0000}));
                    r1.position.set(pos.x-1.5, 1, pos.z); scene.add(r1);
                    
                    const r2 = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x000055, emissive: 0x0000cc}));
                    r2.position.set(pos.x+1.5, 1, pos.z); scene.add(r2);
                    
                    return (time) => {
                        r1.material.emissiveIntensity = Math.abs(Math.sin(time*10));
                        r2.material.emissiveIntensity = Math.abs(Math.cos(time*9));
                    }
                }
            },
            {
                id: 'ex5', title: 'Rhymes of Israel',
                desc: 'An LLM-powered Chrome extension transforming mundane national news headlines into rhythmic, satirical couplets overlaying browser DOM elements.',
                links: [
                    { name: 'Install from Chrome Web Store', url: 'https://chromewebstore.google.com/detail/eainginjgdkpgolpjniijdihfbeeeklb' }
                ],
                setup: (scene, pos) => {
                    scene.add(new THREE.PointLight(0xffff00, 3, 15)).position.copy(pos).add(new THREE.Vector3(0,3,0));
                    const book = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 1), new THREE.MeshStandardMaterial({color: 0xaaaa00}));
                    book.position.set(pos.x, 2, pos.z);
                    scene.add(book);
                    
                    const pGeo = new THREE.BufferGeometry();
                    const pCount = 500;
                    const posArr = new Float32Array(pCount * 3);
                    for(let i=0; i<pCount*3; i++) posArr[i] = (Math.random()-0.5)*4;
                    pGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
                    const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.05}));
                    particles.position.copy(pos).add(new THREE.Vector3(0, 2, 0));
                    scene.add(particles);

                    return (time) => {
                        book.rotation.y = time;
                        particles.rotation.y = -time * 2;
                    }
                }
            },
            {
                id: 'ex6', title: 'The Meta Portfolio Lab',
                desc: 'A recursive spatial nod acknowledging its own existence. You are currently navigating through a 1:1 scale representation of the matrix logic observed in miniature.',
                links: [
                    { name: 'Re-Loop Protocol (Main)', url: 'https://geekip.dev' }
                ],
                setup: (scene, pos) => {
                    scene.add(new THREE.PointLight(0xffffff, 2, 10)).position.copy(pos).add(new THREE.Vector3(0,3,0));
                    const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1, 32), new THREE.MeshStandardMaterial({color: 0x222222}));
                    pedestal.position.set(pos.x, 0.5, pos.z);
                    scene.add(pedestal);

                    const mazeMini = new THREE.Group();
                    // Just a stylized mini representation
                    for(let i=0; i<10; i++){
                        const m = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1), new THREE.MeshBasicMaterial({color: 0x00f3ff, wireframe: true}));
                        m.position.set((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2);
                        mazeMini.add(m);
                    }
                    mazeMini.position.set(pos.x, 1.2, pos.z);
                    scene.add(mazeMini);

                    return (time) => {
                        mazeMini.rotation.y = time * 0.5;
                    }
                }
            },
            {
                id: 'ex7', title: 'Terminal Out // Social Vectors',
                desc: 'End of active memory buffer. Topography limits reached. Establish external handshake protocols via standardized social network sockets.',
                links: [
                    { name: 'GitHub (//gevak)', url: 'https://github.com/gevak' },
                    { name: 'LinkedIn (//gevakip)', url: 'https://linkedin.com/in/gevakip' },
                    { name: 'Facebook (//geva.kipper)', url: 'https://facebook.com/geva.kipper' }
                ],
                setup: (scene, pos) => {
                    const voidLight = new THREE.PointLight(0xffffff, 5, 30);
                    voidLight.position.set(pos.x, 5, pos.z);
                    scene.add(voidLight);

                    // Void Box (Hides world)
                    const vMat = new THREE.MeshBasicMaterial({color: 0x000000, side: THREE.BackSide});
                    const voidBox = new THREE.Mesh(new THREE.BoxGeometry(30, 20, 30), vMat);
                    voidBox.position.copy(pos);
                    scene.add(voidBox);

                    // Stars
                    const sGeo = new THREE.BufferGeometry();
                    const sPos = new Float32Array(500 * 3);
                    for(let i=0; i<sPos.length; i++) sPos[i] = (Math.random()-0.5)*28;
                    sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
                    const stars = new THREE.Points(sGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1}));
                    stars.position.copy(pos);
                    scene.add(stars);

                    // Console
                    const cons = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 1), new THREE.MeshStandardMaterial({color: 0x111111}));
                    cons.position.set(pos.x, 0.5, pos.z);
                    scene.add(cons);

                    const screen = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 0.5), new THREE.MeshBasicMaterial({map: createTextTexture("> EXIT STATUS 0", 60, '#00ff11', true)}));
                    screen.position.set(pos.x, 1.1, pos.z+0.4);
                    screen.rotation.x = -Math.PI/4;
                    scene.add(screen);

                    return (time) => {
                        stars.rotation.y = time * 0.05;
                    }
                }
            }
        ];

        // Instantiate exhibits
        exhibitData.forEach((ex, index) => {
            if(ex.setup) {
                const updater = ex.setup(scene, roomCenters[index]);
                if(updater) updatables.push(updater);
            }
        });


        // --- 9. HUD / RAYCASTING LOGIC ---
        const panel = document.getElementById('exhibit-panel');
        const pTitle = document.getElementById('e-title');
        const pDesc = document.getElementById('e-desc');
        const pLinks = document.getElementById('e-links');
        const notice = document.getElementById('interaction-notice');

        let activeExhibit = null;
        let lastZoneTime = 0;

        function updateHUD(playerPosition) {
            let inZone = null;
            
            // Check distances to room centers
            for(let i=0; i<roomCenters.length; i++) {
                if(playerPosition.distanceTo(roomCenters[i]) < 6) {
                    inZone = exhibitData[i];
                    break;
                }
            }

            if(inZone && inZone.id !== activeExhibit) {
                activeExhibit = inZone.id;
                
                // Populate HUD
                pTitle.innerText = inZone.title;
                pDesc.innerText = inZone.desc;
                pLinks.innerHTML = '';
                inZone.links.forEach(l => {
                    const a = document.createElement('a');
                    a.href = l.url;
                    a.target = '_blank';
                    a.className = 'hud-btn';
                    a.innerText = l.name;
                    pLinks.appendChild(a);
                });

                panel.classList.add('active');
                notice.style.opacity = '1';
                
                // Audio queue mental note: adding tiny sfx here adds polish but keeping single file simple.
            } else if (!inZone && activeExhibit) {
                panel.classList.remove('active');
                notice.style.opacity = '0';
                activeExhibit = null;
            }
        }

        // Handle Escape interacting
        document.addEventListener('pointerlockchange', () => {
             // If unlocked while in a zone, it means user hit ESC to click links. Hide blocker.
            if (!document.pointerLockElement && activeExhibit) {
                blocker.style.opacity = '0';
                notice.innerText = "Click inside window to resume walking";
            } else {
                notice.innerText = "Press [ESC] to release cursor & click links";
            }
        });


        // --- 10. ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            if (controls.isLocked) {
                // Physics & Movement Setup
                velocity.x -= velocity.x * 10.0 * dt;
                velocity.z -= velocity.z * 10.0 * dt;
                
                direction.z = Number(moveState.forward) - Number(moveState.backward);
                direction.x = Number(moveState.right) - Number(moveState.left);
                direction.normalize();

                const speed = activeExhibit ? 20.0 : 40.0; // Slow down when in exhibit zone

                if (moveState.forward || moveState.backward) velocity.z -= direction.z * speed * dt;
                if (moveState.left || moveState.right) velocity.x -= direction.x * speed * dt;

                // Proposed next position
                const currentPos = controls.getObject().position;
                const nextPos = currentPos.clone();
                
                // Apply X
                controls.moveRight(-velocity.x * dt);
                if(checkCollision(controls.getObject().position)) {
                    controls.getObject().position.x = currentPos.x; // Revert X
                    velocity.x = 0;
                }

                // Apply Z
                controls.moveForward(-velocity.z * dt);
                if(checkCollision(controls.getObject().position)) {
                    controls.getObject().position.z = currentPos.z; // Revert Z
                    velocity.z = 0;
                }
                
                // Keep grounded
                controls.getObject().position.y = 1.6;

                // Check HUD triggers
                updateHUD(controls.getObject().position);
            }

            // Update Exhibits
            updatables.forEach(fn => fn(time));

            renderer.render(scene, camera);
        }

        // Handle resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
